未然聽取一頌九夏工夫一月過克期參究事如何莫嫌老拙頻忉怛浪死虗生數甚多珍重上堂僧問一牛飲水五馬不嘶此意如何師云相識滿天下知心能幾人進云隔江招手便乃橫趨畢竟是什麼眼師云莫謗高亭好僧禮拜師乃云未明心地印難透祖師關欲透祖師關須明心地印拈拄杖云不是心地印卓拄杖云不是祖師關明得透得一大藏教五千四十八卷半滿偏圓權實空有不消一擊卓拄杖一下三腳驢子弄蹄行蹈碎乾坤無寸土喝上堂行住坐臥折旋俯仰打破鏡來全無影像喝一喝志公不是間和尚上堂僧問即色明心附物顯理時如何師云癩馬繫枯樁進云三九二十七牛頭南馬頭北如何是接手句師云百花深處鷓鴣啼僧禮拜師乃云百花深處鷓鴣啼日出東方又落西昨夜一番新雨過今朝流水漲前溪下座上堂真不掩偽曲不藏直白日青天雷轟電激坐斷報化佛頭超出聖凡閫域大藏與小藏演出復演入卓拄杖云一毛師子衆毛畢上堂舉古德道天上無彌勒地下無彌勒十字街頭立被人喚作賊師云天上無彌勒地下無彌勒十字街頭立底是什麼喝一喝云賊賊便下座上堂荊棘林中有通天大路長安市上有陷虎危機透得過者一任八面四方透不過者未免墮坑落塹豈不見鹽官國師一日喚侍者云將我犀牛扇子來侍者云扇子破也國師云還我犀牛兒來侍者無語便是者個道理也靈利漢向者裡下得一轉語實謂清風再振頭角重生非唯鹽官老漢滿面慚惶抑且山僧通身歡喜有麼有麼良久云江上青山老屋頭春色遲箇中消息子能有幾人知上堂舉世尊初生下時周行七步目顧四方分手指天地便云天上天下唯我獨尊後來雲門大師云我當時若見一棒打殺與狗子喫却貴圖天下太平師云雲門好棒可殺驚人撿點將來未免傷鋒犯手山僧當時若見只消道箇浣盆浣盆老漢若也知方管取暗裏抽身免見明中落節事到如今且放過一著何故砒霜鴆毒難拈出蜜水糖湯一例澆上堂兩桂垂陰莫匪少林風旨一華現瑞是皆鷲嶺宗猷而況龍門上客駢臻致此道場增勝庶幾勇猛以廣熏修説甚威音王已前王老師直須打徹毗盧藏中第一義驀拈拄杖卓一下云有意氣時添意氣不風流處也風流上堂一雨普滋三草二木雷聲遠震地上清涼如來説一合相即非一合相且出息不涉萬緣入息不居陰界一句作麼生道良久空生不解岩中坐惹得天華動地來上堂僧問一不做二不休時如何師云水底撈明月進云退一步修安樂法又作麼生師云相逢盡道休官去林下何曾見一人僧禮拜師乃云絶羅籠脫羈鎖雖是善因而招惡果咄老松源與麼説話於唱教門中足可觀光要作臨濟兒孫未得在開福莫有長處麼擊拂子云星河秋一鴈砧杵夜千家小參一毛穿衆穴衆穴一毛收明明百草頭明明祖師意龍睛鶻眼罔測端倪疥狗泥豬虗張意氣五祖和尚云汝等諸人見山僧竪起拂子便作勝解及乎山禽聚集牛動尾巴却作等間殊不知櫩聲不斷前旬雨電影還連後夜雷大衆者箇便是金剛圈栗棘蓬若也吞得透得參學事畢山僧一夏已來公委出入不能與諸人東語西話然亦未嘗不眉毛廝結其奈不覺不知翻成踈外今夜向箇裡搖唇鼓舌撒土拋沙撿點將來大似不識好惡衆中忽有忍俊不禁底出來掀倒禪床喝散大衆山僧大展坐具禮他三拜何也莫怪坐來頻勸酒自從別後見君希上堂舉圓悟和尚示衆云古德道結夏已十一日寒山子作麼生又有道結夏已十一日水牯牛作麼生山僧即不然結夏已十一日燈籠露柱作麼生若識得燈籠露柱即識得水牯牛若識得水牯牛即識得寒山子脫或擬議老僧在你腳底師云千鈞之弩不為鼷鼠而發機三大老也是為他間事長無明開福結夏已十五日了也堂中兄弟盡是諸方煅了底金總不須問著行但行住但住坐但坐臥但臥忽若露柱著衫南嶽去燈籠沿壁上天台狸奴白牯無消息拾得寒山笑滿腮山僧却有箇細大法門為汝説破下座巡堂喫茶上堂早間侍者覆上堂山僧病餘要打睡聽得堂前法鼓鳴又把眉毛重剔起説張三話李四淨行何曾有些子打殺應知狗不噇何事諸人妄相許喝一喝上堂真淨和尚一日舉教中道不見一法是大過患喝一喝云有什麼過卓拄杖云有什麼患復橫按拄杖云德山棒臨濟喝舉世何人解提掇天高地回萬象間總是僧家好時節擲下拄杖云是什麼時節喝一喝下座老真淨可謂知時識節善説法要撿點將來不免大驚小怪所以開福尋常不要捏怪拈拄杖云大衆還見麼若道見見個什麼若道不見却是諸人捏怪靠拄杖云見怪不怪其怪自壞下座上堂一夏工夫餘半月也堪歡喜也堪驚山僧有口不敢道留得雙眉蓋眼睛且道是什麼眼睛若也道得一大藏教八萬四千法門不消一擊若道不得莫道無事好下座上堂舉二十五祖婆舍斯多與外道無我尊論議外道曰請師默論不假言説祖曰不假言説孰知勝負曰但取其義曰汝以何為義曰無心為義曰汝既無心安得義乎曰我説無心當名非義曰汝説無心當名非義我説非心當義非名曰當義非名誰能辨義曰汝名非義此名何名曰為辨非義是名無名曰名既非名義亦非義辨者是誰當辨何物如是往復四十九反外道杜口信伏大慧和尚云婆舍斯多何用忉怛當時若見他道請師默論不假言説便云義墮也即今莫有要與妙喜默論者麼或有箇衲僧出來道義墮也我也知你向鬼窟裡作活計師云騎賊馬趕賊奪賊槍殺賊回天轉地合水和泥教外一宗掃土而盡開福門下今日忽有箇漢出來道請師默論不假言説劈脊便棒還委悉麼棒頭有眼明如日要識真金火裡看上堂僧問摩竭掩室意旨如何師云打破天關掀翻地軸進云毗耶杜詞又作麼生師云一狀領過進云不涉二途如何舉唱師云蛇無頭不行進云與麼則出他古人圈繢不得師云你喚什麼作古人圈繢僧擬議師便打乃云摩竭掩室毗耶杜詞打破天關掀翻地軸山僧與麼答話已是屈辱先宗汝等諸人擬更蹈步向前未免畫蛇添足喝一喝云參堂去上堂好箇中秋節莫言無供養風吹丹桂華清香滿天上諸人眼裡也飽耳裡也飽鼻裡也飽只恐肚裡不飽若得肚裡飽去則不疑佛不疑祖不疑天下老和尚拈出袖裡金鎚打開光明寶藏不涉凡聖路岐便是渡河香象喝一喝上堂真不掩偽曲不藏直一句截流萬機寢息拈拄杖卓一下云寒山拾得祖忌拈香碧眼胡尊性急一語不投機闔國追不及少林面壁弄盡精神只消斷臂師僧三拜而立伎倆既盡心事亦休隻履西歸空棺示迹後代兒孫充滿中國莫不向今日燒牛頭栴檀之香具酥酪醍醐之食用伸追遠用報恩德正眼觀來何異捧漏巵以灌焦釜而終莫能濕所以開福比丘蒸雲門胡餅烹趙州釅茶雖然禮貌粗踈畢竟臭味相入上堂僧問掬水月在手時如何師云弄花香滿衣進云和尚因什麼攙行奪市師云闍梨莫曾到此間麼進云曾到師云大似不相識僧便禮拜師乃云大洋海底蓬塵起百尺竿頭掉臂行三世如來説不到扶桑日午打三更小參一年來一年去來既無從去亦無至北禪分歲勾賊破家汾陽罷參知慚知愧所以山僧三四年間來此與諸人相聚行則與諸人同行住則與諸人同住臥則與諸人同臥起則與諸人同起直饒起倒不同畢竟脫離泥水與麼與麼平地上喫交鬼門中貼卦不與麼不與麼跛驢蹈倒摘茶輪草菴卸下琉璃瓦阿呵呵會也麼一釋迦二元和三佛陀從將支遁鶴喚作右軍鵝復舉僧問雲門如何是雲門一曲門云臘月二十五師云大小雲門盡力只道得到者裡今夜忽有問如何是開福一曲只對他道明日是新年且道與古人是同是別聽取一頌臘月二十五一曲喧今古明日是新年袈裟搭半肩同不同別不別珊瑚枝枝撑著月久立元宵進退兩序上堂十五日已前明中有暗十五日已後暗中有明正當十五日明暗雙忘體用俱寂譬如千燈洞照一室光光交羅各不相借且道是知事分上事頭首分上事諸人分上事莫有道得底麼拈拄杖卓一下云蟭螟睫上放元宵狸奴倒上菩提樹上堂僧問天不能蓋地不能載時如何師云闍梨得自由僧便禮拜而出師云依俙越國倣佛楊州師乃云天不能蓋地不能載依俙越國倣佛楊州打開布袋隨流入流今朝有酒今朝醉明日無錢明日求拍禪床下座上堂日月有晦明虗空沒明晦佛佛體皆同塵塵自三昧拈將須彌盧塞斷香水海動靜不留情是名觀自在上堂舉雲門問踈山如何是法身邊事山云枯樁又問如何是法身向上事山云非枯樁門云還許學人説道理也無山云許門云枯樁豈不是明法身邊事山云是門云非枯樁豈不是明法身向上事山云是門云只如法身還該一切否山云爭得不該門指淨瓶云法身還該者箇麼山云闍梨莫向淨瓶邊會門便禮拜師云雲門也善切磋琢磨若不是踈山老漢幾被打破蔡州今日忽有問山僧如何是法身邊事劈脊便棒若更問如何是法身向上事便與連夜趕出非唯坐斷天下人舌頭且免得靈利衲僧向枯樁邊著到小參二千年前大覺世尊將一條斷貫索穿你天下衲僧鼻孔東土西天無敢違者二千年後者索子落在欲上座手中拈起也眉間挂劍血濺梵天放下也藏海風清波平浪靜當此四月十五結却布袋頭盡十方世界四聖六凡情與無情總在者裡內不放出外不放入莫道諸天散華無路外道潛無門便是釋迦老子再出頭來也卒摸索不著是你諸人二六時中於其中間行住坐臥各不相妨所以道譬如大火聚猛𦦨同時發各各不相知諸法亦如是又如河中水川流競奔逝各各不相知諸法亦如是如是如是芍藥花開菩薩面不如是不如是棕櫚葉散夜叉頭羚羊挂角無蹤迹笑倒溈山水牯牛復舉裴相國云終日圓覺而未嘗圓覺者凡夫也欲證圓覺而未極圓覺者菩薩也具足圓覺而住持圓覺者如來也後來楊次公云終日圓覺而未嘗圓覺者如來也具足圓覺而住持圓覺者菩薩也欲證圓覺而未極圓覺者凡夫也師云者兩箇措大可謂徐六擔板各見一邊山僧與他捏作一團向無星稱子上玷捶將來一箇恰重半斤一箇恰重八兩不作貴不作賤作麼生買拍禪床云莫謂龍門無宿客明朝更試錦標看久立
