body:
  text: 初住集慶路中山開福禪寺語録參學比丘一志元皓等編天曆二年七月十八日入寺指山門云我此法門直出直入中下之流自望不及喝一喝佛殿世尊拈華迦葉微笑咄賴有文殊與普賢尉斗煎茶不同銚據室真不掩偽曲不藏直石裂崖崩雷轟電激轉得身來未有棒喫喝一喝諸山疏一佛出世各坐一華接影連輝互不相借山門疏有主有賓有酬有唱坐斷舌頭一椎兩當指法座云須彌燈王面目見在未善觀瞻為吾作禮便升座拈香云此香恭為祝延今上皇帝聖躬萬歲萬歲萬萬歲次拈香云奉為見住保寧禪寺古林大和尚一爐爇却不圖報德酬恩只貴𮞏相鈍置遂就座無想和尚白椎云法筵龍象衆當觀第一義師乃顧視大衆云只此一會不異靈山莫有為衆竭力者麼僧問丹山鸞鳳九苞文地位清高隔五雲四海具瞻時一見願聞真唱答明君師云千峯朝華嶽萬派肅滄溟進云萬方有道歸明主一句無私利有情師云黃河九曲水出崑崙進云祝贊已蒙師指示向上宗乘事若何師云眼不見鼻孔進云曹溪流非止水一滴忽來千波競起時如何師云退後退後進云平生不解藏人善到處逢人説項斯師云莫謗山僧好又僧問天不言四時行地不言萬物生學人有疑願聞開示師云萬人遐仰處紅日到天心進云野老不知堯舜力鼕鼕打鼓祭江神師云眼見如盲口説如啞進云千古華山山腳下又添潘閬倒騎驢師便喝僧禮拜師乃云建法幢立宗旨拓開無上妙門顯示第一義諦天何寬地何窄青山不青白雲不白十字街頭醉翁子夢裡惺惺三家村裡臭胡猻甚生標格掀翻是非窠窟截斷凡聖蹤由德山棒頭全彰大用臨濟喝下脫體風流垂衣正裳聖天子繼唐虞之化修文偃武賢宰相霈霖雨之秋所以道一毛見神變一切佛同説經於無量劫不得其邊際喝一喝云將謂合有恁麼説話拈拄杖云拄杖子穿過諸人鼻孔即不問梁寶公騎佛殿出山門畢竟成得箇什麼事卓拄杖云千尺鯨噴洪浪飛一聲雷震清猋起復舉祖師云吾本來此土傳法救迷情一華開五葉結果自然成五祖法演和尚云達磨大師信腳來信口道後代兒孫多成計較諸人要會開華結果處麼鄭州梨青州棗萬物無過出處好師云提本分鉗鎚碎情解窠窟還他五祖老人要見開華結果處則大遠在諸人要會開華結果處麼拈却鄭州梨放下青州棗出門便是長安道久立珍重小參鳳凰臺上對三山嘯月眠雲趣自間一疏忽從天外至又移身入閙籃間是知道人行處如火消氷動靜去來該他不著一抽三二添四截鐵斬釘和泥合水有來由無本據擊碎上頭關千華生碓觜豈不見長沙和尚云百尺竿頭坐底人雖然得入未為真百竿尺頭重進步十方世界見全身拈拄杖云騎駿馬驟高樓萬里銀河輥玉毬卓拄杖云有時乘好月不覺過滄洲復舉德山小參不答話問話者三十棒時有僧出德山劈脊便棒僧云某甲話也未問因甚便打山云你是甚處人僧云新羅人山云未跨船舷好與三十棒後來此菴元和尚拈云忒殺倚勢欺人山僧見處也要諸人共知者僧當時若是箇漢待他道你是甚處人便與掀倒禪床踢起便行直饒德山牙如劍樹口似血盆也須倒退三千何故識法者懼師云德山正令當行者僧黠兒落節若謂倚勢欺人屈他先德不少雖然還知此菴老人落處麼劍為不平離寶匣藥因救病出金瓶中秋上堂舉馬祖與西堂百丈南泉玩月次祖云正與麼時如何堂云正好供養丈云正好修行泉拂袖便行祖云經歸藏禪歸海唯有普願獨超物外師云言氣相投機感相應古今盡謂玩月話奇特殊不知馬大師憐兒不覺醜若也據令而行者一隊弄光影漢總好與本分草料免見門戶寂寥拍禪床云禹力不到處河聲流向西上堂僧問以字不成八字不是是什麼字師云點畫分明進云曾有問地藏藏云看取下面注腳且道注腳道什麼師云未會注腳且看正文進云如何是正文師云以字不成八字不是進云和尚莫瞞人好師云你曾問幾人來進云即今問和尚師云却是你瞞我僧禮拜師乃云參禪須透祖師關妙悟要窮心路絶殺人劍下驀翻身活人刀邊流出血曜靈寒顧兔熱四七二三難辨別別別使八極頂目者不自爭衡見斯人兮駕御昂枿上堂舉白雲示衆云金蘃叢叢帶露新采來烹茗賞佳辰浮杯何必須宜酒但有清香自醉人師云白雲老人大似巧媳婦做出無餺飥惜乎知味者少開福效顰亦有一偈重陽黃菊未成花落帽無勞憶孟嘉但得青山長在眼不妨流水去無涯上堂今朝九月半萬事隨時變霜風刮地來木葉盡零亂古人道要識不還義但向萬物凋落處會取是你諸人會也未若也會得旋嵐偃嶽而常靜江河競注而不流野馬飄鼓而不動日月歷天而不周其或未然只知事逐眼前過不覺老從頭上來上堂即心即佛非心非佛不是心不是佛不是物靈光洞耀逈脫根塵躰露真常不拘文字天開地闢日照月臨新羅國裡打鐵火星燒你腳跟賓頭盧尊者忍痛不禁鑽入阿耨達池中去也唵摩尼達哩悉哩蘇盧上堂歸宗事理絶日輪正卓午自在如師子不與物依怙看他古人得恁麼自在得恁麼快活開福者裡波波挈挈百醜千拙即事即理拖泥帶水手指東西眼觀子午喝下驚翻蹍屎豬棒頭敲出金師子且道與古人是同是別相逢自有知音知何必清風動天地客至上堂摩尼珠人不識如來藏裡親收得萬象森羅影現中一顆圓光色非色永嘉大似乞兒暴富開福道摩尼珠誰不識擊碎分文也不直拋向虗空更那邊免使時人挂胸臆然則雲開日出職到威成撞著本色道流恰似泗洲人見大聖小參坐立儼然賓主歷然百千法門同歸方寸河沙妙德總在心源直得無邊剎境自他不隔於毫端十世古今始終不離於當念又説甚運推移日南長至禪之與道拈放一邊妙之與玄置之一處山僧不作佛法商量諸人不作世諦流布明朝起來淨洗了面大佛殿上禮拜燒香依舊只是尋常事例縣橋頭李八伯半醒半醉不覺起來呵呵大笑且道笑箇甚麼壁上安燈盞堂前置酒臺悶來打三碗何處得愁來復舉洞山冬夜喫果子次山云有一物上拄天下拄地過在動用中動用中收不得過在什麼處泰首座云過在動用中山喚侍者掇退果卓師云大阿橫按凜凜神威寶鑑當臺澄澄光采只如掇退果卓又作麼生雲自帝鄉去水歸江漢流小參真宗絶眹妙道虗玄一句截流萬機寢削釋迦掩室於摩竭淨名杜口於毗耶須菩提唱無説而顯道天帝釋絶視聽而雨華鈎頭有餌稱尾無星據令而行總須按過開福今夜年窮歲盡撾三通鼓聚集片時不似北禪烹露地白牛大驚小怪張龍打鳳漉蜆撈蝦但願明年蠶熟麥熟稻熟鼓腹謳歌樂太平六六還他三十六復舉僧問古德年窮歲盡時如何德云東村王老夜燒錢師頌云東村王老夜燒錢𪹼竹聲中又換年好是門前泥力士不將間事污心田上堂一二三四五五四三二一渡水不穿靴黃昏候日出元正啓祚萬物咸新看取千花生碓觜太平元不在麒麟天壽聖節滿散上堂摩醯正眼洞徹十虗迦陵仙音遍周沙界標三才而建立舉四海而安之纘列聖之否圖膺靈山之付囑摧怨破敵運金剛輪發政施仁作師子吼當流虹之瑞旦慶萬世之昌期然則蕢桴土鼓共樂升平堯舜之君猶有化在所以道向上一路千聖不傳萬仞崖頭縱橫得妙卓拄杖云將此身心奉塵剎是則名為報佛恩元宵上堂鏡鏡交輝燈燈相燭境智互融事理俱備喚作華藏性海正是平地揚波直饒盡乾坤大地無纖毫過患猶是轉句不見一色始是半提更須知有全提時節便恁麼去法堂前何止草深一丈放過一著有箇商量山門新舊知事隨年進退因時請得首座表率維那舉唱洗光佛日重整頺綱見前諸德一一循規守矩人人舍短從長信手揭開釋迦老子青蓮華眼徐步蹈著達磨大師生鐵脊梁有底碩學飽參與汝證據無底良辰美景與汝敷揚以拂子畫一畫云好事不須頻話會留將和氣暖肝腸上堂未離兜率已降王宮未出母胎度人已畢釋迦老子不唧𠺕十萬里來九年面壁直指人心見性成佛達磨大師不唧𠺕朝往天台暮歸南嶽撥草擔風尋師訪道衲僧家不唧𠺕拈拄杖卓一下云離四句絶百非動用揚古路不墮悄然機喝一喝上堂國師三喚侍者三應可謂形直影端及乎道箇將謂吾孤負汝却是汝孤負吾便見分踈不下且誵訛在什麼處者裡悟去非唯識得國師亦表參學眼正其或未然三十年後不得道見開福來聖旨至上堂久晴不雨田夫皺斷眉頭久雨不晴衲僧浸爛鼻孔進一步撞倒百億須彌山退一步蹈翻無邊香水海且截斷千差孤危不立一句作麼生道好大衆疊疊綸音下九天融融春意滿林泉一爐沈水一聲佛仰祝吾皇億萬年浴佛施主羞供上堂身口意清淨是名佛出世身口意不淨是名佛滅度有般説話譬如懸百千日月於青冥之中阿誰不見阿誰不知因什麼十箇有五雙當面蹉過且利害在什麼處山僧明明向你道只為你信根少你若信得及了推而行之便是出三界二十五有之日便是證十地滿心之時所以大覺世尊從無始劫發菩提心積功纍德難行能行難舍能舍勇猛精進速得成佛看他從兜率陀天駕日輪香象入摩耶夫人胎藏中處旃檀寶樓閣與諸菩薩説受生法滿足十月於毗藍園無憂樹下右脅降誕當是時也十方佛剎同放寶光九龍吐香水灌沐金色身地湧青蓮華自然棒雙足南北及東西各行於七步分手指天地作大師子吼上下及四維無能尊我者豈不是大丈夫兒成就大丈夫事汝等諸人幸生聖世得聞正法快須信取勤而行之設或暫肯回光則山僧鼓兩片皮搖三寸舌不為分外施主辨供功有所歸擊拂子云我不敢輕於汝等汝等皆當作佛小參有問有答有佛有法無問無答佛法在什麼處竪起拂子云還見麼擊拂子云還聞麼聞見歷然是箇什麼莫匆匆休草草燈籠皺斷眉頭露柱呵呵大笑昨日生今日老兩手競拏瓶裡頂門失却沖天又擊拂子云龐居士來也十方同聚會箇箇學無為此是選佛場心空及第歸喝一喝春風得意馬蹄疾一日看盡長安花復舉僧問睦州一言道盡時如何州云老僧在你鉢囊裡又問雲門門云裂破師云二老各逞神通却被者僧勘破有問開福只向他道相逢且説三分話未可全拋一片心久立上堂十四十五考鐘伐鼓結却布袋頭剎海無行路日不待火而熱月不待風而涼是人知有南斗七北斗八一句又作麼生道良久云幸然平似鏡何用曲如鈎上堂十五日已前有得有失有長有短十五日已後無高無下無黨無偏正當十五洞裡無雲別有天桃華如錦柳如綿仙家不解論冬夏石爛松枯是一年上堂舉五祖和尚云難難幾何般易易沒巴鼻好好催人老默默從此得過者四重關了泗洲人見大聖參師云山僧即不然難難沒多般易易有巴鼻好好元不老默默無所得過者四重關了普州人送賊喝一喝上堂識得一萬事畢衲僧手裡稱錘無端捻得汁出拋三放兩有箇商量不覺秋深夜又長小參道大不有功成不居作無所作為無所為會萬物于自己與千聖而同途九旬制滿自恣當時誰遠誰近誰是誰非文殊大士三處度夏迦葉尊者正令全提一人腳跟下痛領三十一人頂門上猶欠一錐者兩箇老漢諸方決定放渠不過山僧者裡寬之有餘好大哥不思議解脫力妙用恆沙也無極百草頭邊活祖師一言勘破維摩詰復舉應菴和尚云參學人切忌錯用心悟明心地是錯用心成佛作祖是錯用心看經講教是錯用心行住坐臥語言三昧是錯用心喫粥喫飯屙屎送尿是錯用心一動一靜一來一往是錯用心更有一處是錯用心歸宗不敢與諸人説破何故一字入公門九牛拽不出師云好箇一字入公門九牛拽不出妙喜云華姪提唱為人徑捷便是者箇道理也雖然只解理上掃除不解事上建立山僧道參學人直須善用心悟明心地是善用心成佛作祖是善用心看經講教是善用心行住坐臥語言三昧是善用心喫粥喫飯屙屎送尿是善用心一動一靜一來一往是善用心所以道於一切處善用其心自然獲諸勝妙功德諸人若能善用心便知錯用心若知錯用心便能善用心還信得及麼今年桃李貴一顆直千金上堂解制諸方有舉揚中山一切只尋常尋常恰似秋風至無意涼人人自涼豈不見趙州問南泉如何是道泉云平常心是道州云還假趣向否泉云擬向即乖州云不擬爭知是道泉云道不屬知不屬不知知是妄覺不知是無記若真達不疑之道廓然蕩豁如太虗空豈可強是非耶者般説話正如閙市裡揚碌磚相似直是著者方知趙州既是打著當下如暗得燈如貧得寶如渡得船如賈客得海粉骨碎身未足酬一句了然超百億如今者一片磚落在山僧手裡自去年此時離鳳臺來此十字街頭東拋西擲只是未曾輕輕打著一人擊拂子云黃河三千年一度清宣州天寧遺書至上堂鐵牛吼破雙溪月石女含笙悲不徹鶻眼龍睛總不知聾子親聞啞人説山僧二十年前親見草庭老子向萬仞崖頭拾得箇斷貫索到處穿他天下宗師鼻孔及乎應緣而出瑞世天寧水到渠成風行草偃又却用此索穿他天下衲僧鼻孔化緣既畢奄爾真歸撒手那邊全無朕迹所以道聲前非聲色後非色蚊子上鐵牛無你下觜處山僧今日不免倒行此令去也小間下座詣靈前燒一炷香點一盞茶却與他穿了鼻孔何故喫拳須記打拳時下座上堂趙州喫茶睦州擔板喝水成氷蒸沙作飯披萬象獨露全身破微塵出大經卷拈拄杖云權實空有偏圓半滿百般製造由人到底無過是卓拄杖喝一喝上堂深不深密不密昨夜三更黑如漆海神推出夜明符萬象莫能逃形質釋迦自釋迦彌勒自彌勒達磨老臊胡何處尋蹤迹剎竿頭上禮西方九蓮開作黃金色喝一喝上堂心王不妄動六國一時通罷拈三尺劒休弄一張弓古人可謂運籌帷幄決勝千里山僧即不然五鳳樓前聽玉漏須彌頂上擊金鐘一毛頭上三千界雲月溪山處處同開爐上堂今朝十月旦開爐無獸炭倒轉死柴頭光明何燦爛三世諸佛在此光裡轉大法輪六代祖師在此光裡聯芳續焰天下老和尚在此光裡各立門庭光光相羅如寶絲網大用現前清機歷掌有功者罰無功者賞引水澆蔬五老前披蓑側笠千峯上喝上堂昨日十四今日十五大法難明時光易度動則涉塵勞之境靜則沈醉之鄉動靜雙泯則落空亡動靜雙收則顢頇佛性到者裡須知有透脫一句始得拈拄杖云倒跨楊岐驢蹈殺長沙虎擲下拄杖云三歲孩兒抱花鼓莫來欄我毬門路上堂舉寒山子道我見瞞人漢如籃提水走急急走歸家籃裡何曾有保寧勇和尚舉了拍手大笑云有意氣時添意氣不風流處也風流師云然則下坡不走快便難逢保寧老漢腳跟下好與三十棒小參僧問仲冬嚴寒年年事運推移事若何師云昨夜日輪飄桂華今朝月窟出芝草進云仰山近前叉手意旨如何師云奴見婢殷勤進云香嚴叉手近前又作麼生師云大家廝淈𣸩進云去此二途請師別道師云無人處斫額望汝師乃云眹兆未分陰陽已具乾坤既剖萬彚茲彰水肅霜清風高木落突出無位真人一箇箇面前孤迥迥地新羅國裡打鼓大唐國裡上堂洗面摸著鼻啜茶濕却觜七十三八十四把住雪峯趙州放過德山臨濟倒著襴衫舞柘枝萬仞峯前恣遊戲喝一喝復舉圓悟和尚示衆云到即不點一大藏教錦上鋪花點即不到祖師西來金聲玉振且祖意教意是同是別碧潭雲外不相關師云老佛果只解步步登高不解從空放下人前一味拍盲豈信弄真像假山僧與麼批判諸人還證明得麼良久捧上不成龍上堂華綻老梅日南長至笋迸陰崖吉無不利東鄰西舍鐘鼓喧天後巷前街笙簧聒地冷風吹帽正中偏顛雨打窗粗裡細是非榮辱何似生瞎驢不受靈山記客至上堂三世如來同一舌大藏教中無法説衲僧手裡定盤星萬里長天耀孤月首座有長處且不循途轍荊棘林中放步行拔出時人釘根橛先保寧和尚忌日拈香出黃泉又入黃泉穴鼻無繩不受牽倒轉一枝無孔笛蘆華明月滿平川你諸人還知我老和尚落處麼卷四大海水于舌端不見涓滴置微塵剎土於毛孔囊括大千總謂其嫌白雲之語拙愛五祖之説禪夫豈善用黑豆之活法契鷲峰之正傳以香扣爐云相席打令飲水思源盤山會裡翻筋斗到此誰知普化顛上堂竺土大仙心東西密相付以字既不成八字亦不是昨夜三更虎咬大蟲今早起來蛇吞鱉鼻拍禪床云有利無利不離行市生鐵稱錘却被蟲蛀喝一喝臘八上堂日日佛誕生日日佛成道空裡無華折去難水中有月看來好賣狗懸羊一體三寶垢面蓬頭輥出時何異大蟲褁紙帽咄天壽節啓建上堂煩惱無邊誓願斷法門無邊誓願學衆生無邊誓願度佛道無邊誓願成釋迦老子三大阿僧祇劫修習所得法門不出者四句子堪報不報之恩用助無為之化所謂我此法印為欲利益世間故説今日啓建金剛道場山僧亦有四弘誓願一願皇帝萬歲二願重臣千秋三願海晏河清四願民康物阜金香爐下鐵昆崙鼻孔遼天山門頭樓至德如來兩腳蹈地蕢桴土鼓賀堯年紫煙匼匝祥風至上堂天清地寧時康道泰興化令行漆桶不快高唱低酬貴買賤賣寄語諸方不要揑怪下座小參利劒拈來斬是非何妨高駕鐵牛機東村王老燒錢夜正是年窮歲盡時事存函蓋合理應箭鋒拄鬼家活計不要施呈大丈夫兒別有天地我若坐時你須立你若立時我須坐趙州勘破臺山婆子湖要打劉鐵磨千古萬古黑漫漫一曲胡笳少人和元旦上堂昨日是歲除今朝是正旦送舊與迎新司空曾見慣