body:
  text: 住嘉興路本覺禪寺語録參學比丘可興文康等編元統元年臘月二十六日入寺指山門云門門有路達者猶迷捩轉天關是誰知有喝一喝佛殿性覺妙明本覺明妙脫却鶻臭衫卸下膩脂帽三世十方稱善導祖堂文不文武不武佛不佛祖不祖馬頷對驢腮五五二十五據室橫按拄杖云有正偏不犯底手具啐同時底用總須列在下風卓拄杖喝一喝廣教府疏親承佛旨示作王臣以廣教化以福斯民其知有者不在重拈未辨來風試聽宣讀山門疏未入門來有一句子既到者裡半字全無畢竟如何蘇盧蘇盧指法座云高步毗盧頂不稟釋迦文是你諸人常行三昧山僧曲順時宜和泥合水去也遂升座拈香祝聖罷就座上首白椎云法筵龍象衆當觀第一義師云第一義諦非智所知一椎擊碎遍界流輝格外明宗出衆相見僧問突雲雛鳳應昌時炳霧文彪百世師格外有機提祖令好風先發領南枝為國開堂願聞祝贊師云瑞氣逢嘉運靈苗觸處生進云萬歲山頭松不老千秋澗底水長清師云須彌頂上擊金鐘進云祝聖已蒙師指示向上宗乘事若何師云三歲孩兒抱華鼓莫來攔我毬門路進云不因楊得意爭識馬相如師云三生六十劫復有僧出師喝云問話且止只知問禪問道要且不知問頭來處且道問頭從什麼處來竪起拂子云還見麼山僧拂子變作釋迦世尊起道樹詣鹿苑為五比丘轉四諦法輪然後周旋三百法會之中乃至多子塔前以實相無相微妙法門付囑摩訶迦葉傳付將來無令斷絶能事既畢還復本形大衆若喚作山僧拂子又是釋迦世尊若喚作釋迦世尊又是山僧拂子若道山僧拂子便是釋迦世尊釋迦世尊即是山僧拂子未免顢頇佛性儱侗真如且作麼生分得去若分得去便可向無中唱有有中唱無一為無量無量為一小中現大大中現小於一毫端現寶王剎坐微塵裡轉大法輪提祖師印駕鐵牛機或則先照後用或則先用後照或則照用同時或則照用不同時你要識先照後用麼如蛇有角你要識先用後照麼似虎無齒你要識照用同時麼背負須彌肩橫日月你要識照用不同時麼掀翻地軸蹈斷天關喝一喝便與麼隔關山不與麼絶遮攔四海五湖皇化裡吾家曲子萬年歡擊拂子復舉保壽開堂三聖推出一僧保壽便打三聖云與麼為人瞎却鎮州一城人眼去在保壽擲下拄杖便歸方丈師云用劈箭機發千鈞弩固是兵隨印轉將逐符行且畢竟成得什麼邊事拍禪床云天南并地北一舉一時收小參僧問承師有言未入門時有一句子畢竟是什麼一句師云盡力吐不出進云既到者裡因什麼半字全無師云相逢自有知音知何必清風動天地進云遠離中山來赴本覺作麼生是不動尊師云嗟汝在途經日久思量未曉却沉迷進云豈無方便師云任從滄海變終不為君通進云將謂少林消息斷一華重綻劫前春便禮拜師乃云萬仞崖頭通一線佛手未收驢腳現平田放出焦尾蟲那吒眼開菩薩面所以道機輪轉處作者猶迷正令當行十方坐斷直得你面前無我我面前無你自然聲和響順形直影端敲唱雙行主賓道合又説甚麼雲月是同溪山各異要知坐斷天下人舌頭只消無舌人解語驀拈拄杖云拄杖子走遍四天下氣宇如王因甚到山僧手中却與新婦見阿家相似還會麼龍吟霧起虎嘯風生和氣一團春萬里梅花枝上月三更卓拄杖一下復舉風穴初參南院問云入門須辨主端的請師分院以左手拍膝一下穴便喝院以右手拍膝一下穴又喝院舉左手云者箇且從闍梨又舉右手云者個作麼生穴云瞎院拈拄杖穴云作什麼倒奪打和尚去莫言不道院擲下拄杖云今日被黃面浙子鈍置一上穴云大似持鉢不得詐道不飢院云上座莫曾到此間麼穴云是何言與院云好好相借問穴云也不得放過院云且坐喫茶精金躍冶正要鉗鎚赤驥追風豈資鞭影是他南院末上大殺傷慈直到下捎分疏不下本覺者裡設有人問入門須辨主端的請師分便與連夜趕出何故當門不用栽荊棘後代兒孫惹著衣久立小參僧問有物先天地無形本寂寥能為萬象主不逐四時凋且道是什麼物師云杲日當天盲人摸地進云爭奈頂門上輝大寶光腳跟下縱橫十字師便喝僧亦喝師云我喝汝亦喝僧無語師云放過一著乃云年窮歲盡黃梅石女子母團圞日往月來少室鐵牛嘗甘水草嶺南獦獠唱巴歌聲聲總是無生調好大衆九衢人靜大野風清燈籠與露柱爭光耐重對金剛𨁝跳也無玄也無妙快活須明者一竅擊拂子云昨日街頭賣杏華一年春事都來了喝一喝復舉北禪小參云今夜年窮歲盡無可與諸人分歲未免烹箇露地白牛燒榾柮火煮野菜羮唱村田樂且恁麼過何故免得倚他門戶傍他墻剛被時人喚作郎便下座歸方丈時有僧隨後喚云和尚州中有公人到來禪云作什麼僧云勾納筋角禪遽捋下帽子擲於地僧便拾之禪擒住云捉賊捉賊僧即以帽覆禪頂云天寒且還和尚禪呵呵大笑顧維那云作麼生那云潭州紙貴一狀領過師云大小北禪只解捉賊不解殺賊莫有定當得出者麼久立珍重上堂新年換舊年打破又完全衲僧雖不薦鼻孔已遼天看看蟭螟睫上放夜市大蟲舌上打鞦韆喝一喝上堂顧視大衆云會即便會不會便休剔起眉毛白雲萬里便下座歸方丈侍者云何不更道取兩句師便掌云識甚好惡元宵進退兩序上堂以字既不成八字亦不是侍者參得禪畢竟誰相委三腳驢子弄蹄行八臂那吒闌不住覺皇殿上慶賞元宵妙觸宣明成佛子住擊拂子云相逢不飲空歸去洞裡桃花解笑人復舉藥山謂雲巖云與我喚沙彌來岩云和尚喚他作什麼山云我有個折腳鐺子要伊提上挈下岩云與麼則與和尚共出隻手應庵和尚云藥山道頭雲岩知尾雖然頭尾兩全要且不識羞耻師云老應菴只知其一不知其二然儉生不孝義出豐年彼時藥山一個折腳鐺子只消雲岩提上挈下已自有餘較之本覺今日若非兩班賢佐叶力扶持便見灰寒火冷以故不蓄莖虀粒米直教來者飽齁齁地去豈不出他古人還委悉麼雪後始知松柏操事難方見丈夫心俊書記至上堂隔山見煙早知是火隔墻見角便知是牛雲間棒頭洞山打失鼻孔慈明室裡積翠換却髑髏人平不語水平不流欲窮千里目更上一層樓上堂桃華紅李花白燕語鶯啼山清水碧聲不是聲色不是色作者相逢破塵破的觀音菩薩將錢買胡餅放下手却是饅頭管取一大藏中收他不得下座天壽節啓建上堂我此法印為欲利益世間故説在所遊方勿妄宣傳豁開無上妙門普請大家證入便乃如貧得寶如民得王如病得醫如炬除暗頭頭物物普現威權剎剎塵塵全彰海印拍禪床云天上有星皆拱北人間無水不朝東上堂般若如大火聚般若如金剛𦦨般若如塗毒鼓無你近傍分無你挅分無你趣向分豈不見趙州問南泉云如何是道泉云平常心是道州云還假趣向否泉云擬向即乖州云不擬爭知是道泉云道不屬知不屬不知知是妄覺不知是無記若真達不疑之道廓然蕩豁如大虗空豈可強是非耶好大衆古人千門萬戶一時打開了也靈利底便合乘時搆取待你眨得眼來何翅白雲千里萬里拍禪床云滿地落花春已過緑陰空鎖舊莓苔浴佛上堂淨法界身本無出沒萬象平沉虗空突兀大悲願力示現受生寸絲不挂天下橫行以拂子擊禪床云志士苦日短愁人知夜長上堂袖裡金椎一擊開大千沙界絶纖埃祖師不會渾間事直往流沙去不回乃高聲喚云來也來也大衆擡首師云僧堂破香積厨螭吻咬殺佛殿脊上堂舉圓悟與佛燈過溪次驀將佛燈推向水中便問牛頭未見四祖時如何燈云潭深魚聚又問見後如何燈云樹高招風又問見與未見時如何燈云伸腳只在縮腳裡師云佛燈得即得未免帶水拖泥圓悟高即高爭奈使心用行雖然不入驚人浪難逢稱意魚天壽聖節滿散上堂指法座云踞天寧之寶座提鷲嶺之宗綱任是須彌燈王也須倒退三舍便升座拈香云功德林中掀天馥郁華藏海內特地芬芳拈來則瑞靄九重爇處乃歡騰萬國當虹流電繞之日是河清海晏之時本覺臣僧清欲奉為本路衆官爇向爐中祝延今上皇帝聖躬萬歲萬歲萬萬歲陛下恭願道超堯舜德邁羲軒空芥城而聖曆彌昌拂劫石而皇基益壯遂就座召衆云一問一答是影子邊事一棒一喝是影子邊事乃至揚眉瞬目竪拂敲床辨似維摩智如妙德總是影子邊事作麼生是本體邊事莫有向千聖著眼不及處道得底麼問答罷師乃云列聖叢中闡化權掃除空有示真傳一言截斷千江口萬仞峯頭始得玄直得如天溥蓋似地溥擎如日普照如風普吹無一物不是真乘無一法不是妙用舉足下足總是圓覺伽藍護生殺生莫非平等性智便乃張起濟岸帆撥動度人舟於三界海內不著此岸不著彼岸不住中流運載四生梯航九有豈不是大力量人成就大力量事故我當今聖主離兜率降王宮出母胎建皇極金輪御而萬國寧玉燭調而四時序普天率土共仰皇恩草木昆蟲均霑帝澤到者裡不謂不知而不容不謂知之而含育蕩蕩乎無能名焉皓皓乎其可尚已所謂靈山付囑正在於斯一句全提大家薦取還委悉麼洪鈞妙力先天地葉葉華華總是春復舉同光帝謂興化和尚云朕收中原得一寶只是無人肯酬價化云略借一看帝遂托起幞頭腳示之化云君王之寶誰敢酬價師云折錐探地脈後來雪豆云不是興化作家洎乎高價酬却師云斫額望扶桑本覺莫有長處麼聽取一頌敲出鳳凰五色髓擊碎驪龍明月珠千古華山山腳下只應潘閬倒騎驢久立尊官伏惟珍重上堂舉松源和尚示衆云古者道拈起也天回地轉放下也草偃風行冶父則不然拈起也乾坤黯黑放下也瓦礫生光忽有一箇半箇驀然𭣟瞎頂門達磨一宗未至寂寥在師云老松源只見錐頭利不見鑿頭方壽山即不然拈起也南山起雲放下也北山下雨不拈不放時如何三級浪高魚化龍癡人猶戽夜塘水下座散青苗會上堂四十九年無法可説一代時教玉轉珠回透得過者不滯兩邊透不過者無繩自縛壽山有條活路與諸人共行竪起拂子云還見麼始從鹿野苑終至跋提河於是中間密雲彌布遍覆三千大千世界其澤普澍率土充洽山川嶮谷幽邃所生卉木叢林諸藥草等甘蔗蒲萄百穀苗稼悉皆充足幸自可憐生無端雲門手中扇子𨁝跳上天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾擊拂子云錦上鋪花又一層報國希白和尚訃至上堂未達境惟心起種種分別達境惟心已分別則不生於不生法中獨露本來面目直是離相離名絶對絶待破塵破的透色透聲故我報國和尚得此三昧兩處住山單傳正印掃除邪解扶樹此宗能事既畢撒手那邊末後全提甚生光彩且道與他摩胸告衆槨示雙趺是同是別拍禪床云羚羊挂角千峯上更有羚羊在上峯解夏小參昔本不曾結今也何須解解結本無心無縛無脫者恁麼恁麼森羅萬象徹底孤危大地山河通上嶮峻不恁麼不恁麼大陽門下日日三秋明月堂前時時九夏恁麼中有不恁麼不恁麼中却恁麼一切智通無障礙拈燈籠來佛殿裡將山門安燈籠上敢問大衆九十日內還得相應也未其或未然山僧却有箇方便驀拈拄杖卓一下云西風一陳來落葉兩三片復舉明招行腳時到泉州興教坦和尚處坦上堂云行腳高士一人所在亦須到半人所在亦須到明招便問一人所在即不問如何是半人所在坦無語後來却令小師問明招如何是半人所在招云你要識半人所在麼也只是個弄泥團漢應菴和尚拈云我聞獨眼龍果然只具一隻眼今日忽有衲僧問如何是半人所在劈脊便棒更問如何是一人所在便與趕出何故一不做二不休師云等是弄泥團漢應菴老人較些子復成一頌舉似大衆興教提持不受謾明招隨例弄泥團棒頭有眼明如日要識真金火裡看上堂僧問洞山云秋初夏末東去西去須向萬里無寸草處去意旨如何師云渾鋼打就生鐵鑄成進云只如石霜聞云何不道出門便是草又作麼生師云一箇砑郎當一箇福建子師乃云十五日已前透底金剛圈十五日已後吞底栗棘蓬正當十五日解開布袋口衲子路頭通卓拄杖云有星皆拱北無水不朝東中秋客至上堂靈山指月曹溪話月馬祖百丈西堂南泉玩月盤山道心月孤圓光吞萬象光非照境境亦非存光境俱亡復是何物癩馬繫枯樁洞山道光境未亡復是何物黑牛臥死水育王師翁云月在水中撈不上徒勞𭣟碎水中天夜深山寺開門睡月自飛來在面前用盡自己心笑破他人口本覺今日中秋靈山上客垂訪適值滿天風雨既無可修行又無可供養終不拂袖便行未免相與憑危闌倚曲檻推出手面一輪直是清光萬里三關不立開鑿人天四句頓除光揚祖道擊拂子云八萬四千非鳳毛三十三人入虎穴開爐上堂古鏡闊狹火爐淺深柴炭全無光𦦨萬丈無賓主話不用商量殺活靈機何須舉唱語是誑默是謗語默向上有事在懷州牛喫禾益州馬腹脹天下覓醫人灸豬左膊上喝一喝下座祖忌拈香行解相應宗説俱通眼空四海氣吐長虹未離西乾好椎一頓既來東土聊且相容一華開五葉隨分得春風客至上堂達磨西來不立文字直指人心見性成佛者箇説話是人知有只如一大藏教五千四十八卷是佛説是魔説定當得出不妨小玉聲中承虗接響琉璃殿上簸土揚塵拈三條篾束取肚皮到處住山去其或未然且聽壽山拄杖現神變相卓拄杖金椎影動寶劍光寒一鏃三關隨手破謝郎不在釣漁船上堂僧問如何是佛師云面前案山子進云法即不問如何是僧師云三頭兩面得人憎僧禮拜師却問云如何是法僧云明年更有新條在惱亂春風卒未休師云洎不問過師乃云相逢不拈出舉意便知有撥轉上頭關大作師子吼展開驢腳伸出佛手握金剛椎碎窠臼東土西乾何似生個個看來日中斗冬至小參僧問陰極陽生則不問祖師門下事如何師云石笋抽條長丈二進云牛頭未見四祖時如何師云華陰山前百尺井進云見後如何師云祝融峯頂萬年松進云去此二途願聞法要師云休將間學解埋沒祖師心師乃云前佛性命後佛紀綱總在者裡把住則六陰充塞放行則一陽復生不説笋迸石頭不説華開鐵樹只教行者擊鼓小參且免諸人大家瞌睡委悉麼眼若不睡諸夢自除心若不異萬法一如拈須彌山稱作二兩東頭賣賤西頭賣貴任是本色衲僧到此也無辨處豈不見臨濟問黃檗佛法的的大意三度被打六十拄杖如蒿枝拂相似及至高安灘上便解知歸興化道我在南方行腳一遭拄杖頭未嘗撥著一箇會佛法底逗到大覺堂前卸下衲衣痛領一頓却言我於此時親見臨濟先師在黃檗喫棒底意旨諸禪德全鋒敵勝未是作家遺劍刻舟豈堪持論雖然若不藍田射石虎幾乎誤殺李將軍復舉無業國師云若一毫凡聖情念未盡不免入驢胎馬腹裡白雲端和尚云設使一毫凡聖情念淨盡也不免入驢胎馬腹裡師云一毫頭凡聖情念未盡入驢胎馬腹則固是一毫頭凡聖情念淨盡因什麼亦入驢胎馬腹要見無業則易要見白雲則難咄解用不須雙刃劍延齡何必九還丹上堂南泉斬貓趙州戴草鞋而出興化法戰克賓設饡飯便行是皆發揮本有靈光要且不借別人鼻孔出氣所以前日首座説法高聳人天今朝道伴相過光揚宗眼且道山僧鼓兩片皮成得什麼邊事拍禪床從前汗馬無人識只要重論蓋代功臘八上堂二千年前正覺山前明星現時釋迦世尊成等正覺二千年後本覺山中明星現時我此一衆成箇什麼喝一喝覺即了不施功定慧圓明不滯空東澗水流西澗水南山燒炭北山紅泉心濮司判薦亡請小參問答罷師乃云惟心淨土露堂堂自性彌陀不覆藏直下豁開千聖眼更於何處覓西方所以道欲識佛性義當觀時節因緣時節若至其理自彰即今時節已至作麼生説箇自彰底道理莫是痛念父母養育劬勞底是麼莫是棄官辭祿菽水盡歡底是麼莫是慎終追遠懷報罔極底是麼莫是出離生死超越彼岸底是麼莫是娑婆報盡淨土緣興底是麼莫是蓮臺托質華開見佛底是麼莫是聞佛説法證無生忍底是麼莫是既得忍已思念度生底是麼莫是功圓果滿成佛菩提底是麼莫是所作已辦入般涅槃底是麼且喜沒交涉釋迦老子道一念普觀無量劫無去無來亦無住如是了知三世事超諸方便成十力者裡悟去便知成法破法皆名涅槃智慧愚癡通為般若菩薩外道所成就法同是菩提無明真如無異境界諸戒定慧及淫怒癡俱是梵行地獄天宮皆為淨土有性無性齊成佛道如是則故安人吳氏妙善八十二年前生本不曾生八十二年後滅本不曾滅生滅二緣離長空輝一月故母安人既如是孺人錢氏亦如是孺人錢氏既如是現前大衆亦如是現前大衆既如是十方法界若聖若凡若僧若俗若男若女情與無情悉亦如是如是之法佛祖密付莫分彼我彼我無差法王法道廓無涯好大衆淨極光通達寂照含虗空却來觀世間猶如夢中事三世諸佛是夢六代祖師是夢天下老和尚是夢見前大衆是夢生底是夢死底是無説底是夢聽底是夢真如解脫是夢菩提涅槃是夢無明煩惱是夢六道輪回是夢夢破塵勞一物無焦磚打著連底凍正與麼時只如二安人獨脫無依超然邁往一句又作麼生道擊拂子云國土動搖迎勢至寶華彌滿送觀音上堂今朝正月十五壽山貧作富曜滿月之心燈掩繁星於霄路非唯與新舊兩序慶賀元宵抑且要謝雲峯座元遠勤垂顧驀拈拄杖卓一下云夜明簾外舞三臺別有一機佛祖喝一喝佛涅槃上堂釋迦老子道一切法不生一切法不滅若能如是解諸佛常現前及至雙林示滅却摩胸告衆云汝等善觀吾紫磨金色之身瞻仰取足勿令後悔何也今日則有明日則無又云若謂吾滅度非吾弟子若謂吾不滅度亦非吾弟子且作麼生委悉拍禪床云海枯終見底人死不知心上堂一大藏教是箇切腳畢竟正文無人道著你要識正文麼上大人丘乙己化三千七十士爾小生八九子佳作仁可知禮也衆中忽有箇衲僧出來道恁麼提唱實謂聞所未聞山僧不免分付維那明窗下安排忽若更道恁麼提唱料掉沒交涉山僧亦不免分付明下安排何故直鈎釣鯨鼇曲鈎釣龜鱉金雞啼上玉闌干別有佳聲繼前哲喝一喝秀峯長老募緣建塔至上堂舉玄沙侍雪峯行次峯指面前云者一片地好造箇無縫塔沙云高多少峯顧視上下沙云人天福報不無和尚若是靈山授記未夢見在峯云爾又作麼生沙云七尺八尺師云一人平地上掘坑一人虗空裡釘橛後來琅瑘云家肥生孝子國霸有謀臣師云隨風倒柁漢今日秀峯長老正要造個無縫塔遠遠過我不免贈個塔樣良久云會麼高而無上廣莫可極淵而無下深不可測浩浩波光重重山色一道清虗亘古今八面香風惹衣裓擊拂子下座上堂一喝分賓主三玄辨正宗祖師門下客無處不融通只如道毗廬藏中有大經卷量等三千大千世界書寫三千大千世界中事藏在一微塵中只者一塵從甚處得來良久云南天台北五臺便下座清明上堂冬至寒食一百五今朝正是三月六山又緑水又緑一聲欵乃漁家曲山僧昨日偶爾郊行作得一偈舉似大衆華冠不整舍那衣禿帚還隨破畚箕五個老婆三個醜一雙紅杏換消梨下座砌墻栽松上堂兔不遲烏不速九十春光頓周足今朝物候啓朱明依然一水當門緑黃金為墻白銀為屋還他有力量人作此無窮勝福豈不見黃檗謂臨濟云深山裡栽許多松作什麼濟云一為山門作境致二為後人作標榜道了以钁打地三下檗云吾宗到汝大興於世古既如是今豈不然所以雲屋都寺打開寶藏運出家珍磨磚底磨磚礲石底礲石直從根腳做倒下梢峻似銀山堅如鐵壁風吹不入雨打不濕窮天地亘萬世而不撓不搖正恁麼時且功成不處一句又作麼生道擊拂子云千峯勢到嶽邊止萬派聲歸海上消浴佛上堂釋迦世尊未離兜率猶較些子及乎駕日輪香象入大術胎中右脅誕生七手八腳一時呈露却道天上天下唯我獨尊何異蟭螟蟲向蚊子眼睫上作窠於十字街頭揚聲大呌云土曠人稀相逢者少二千年後有個折腳老比丘忍俊不禁道我當時若見一棒打殺與狗子喫却貴圖天下太平然雖賊過後張弓抑且救得一半只那一半落在本覺手裡不免深掘坑子與伊埋却復牽牛踏過直教光芒淨盡痕迹全無何故不見道父為子隱子為父隱直在其中矣小參雨歇江天時當初夏槐陰日永柳岸風清會四海禪流結靈山聖制頓轡於華嚴法界燕坐於圓覺妙場知幻即離不作方便離幻即覺亦無漸次盡大地撮來如粟米粒大拋向面前拈斷貫索穿却衲僧鼻孔直得鷹揚虎視電激星馳逢佛殺佛逢祖殺祖逢羅漢殺羅漢所以道護生須是殺殺盡始安居會得個中意鐵船水上浮竪起拂子云德山臨濟雲門趙州總在者裡説安居法只是鬪唇合觜愛討便宜據令而行不消一擊擊拂子云咄咄咄力囗希昔年覔火和煙得今日擔泉帶月歸復舉臨濟問黃檗云如何是佛法的的大意三度被打六十拄杖遂辭黃檗檗云高安大愚處去徑造大愚愚問云甚處來濟云黃檗來愚云有何言句濟云某甲三問佛法的的大意三度被打六十拄杖不知過在什麼處愚云黃檗恁麼老婆心切濟大悟云元來黃檗佛法無多子愚乃搊住云適來道不知過在甚處如今又道佛法無多子是多少濟向大愚肋下築三拳愚拓開云汝師黃檗非干我事濟便回黃檗檗問云返太速乎濟云只為老婆心切檗云者大愚老漢待來與伊一頓濟云説什麼待來即今便與遂鼓一掌檗笑云者風顛漢却來者裡捋虎須參堂去白雲端和尚頌云一拳拳倒黃鶴樓一躍躍翻鸚鵡洲有意氣時添意氣不風流處也風流黃龍南和尚舉了極口稱讚時真淨云端兄見處與某甲一般龍云你見處作麼生淨擬開口龍便喝云端會你不會師云真淨未曾開口黃龍因什麼道他不會聽取一頌萬煅爐中烈𦦨紅點金成鐵顯全功一椎擊碎渾間事三世如來在下風上堂僧問舉一不得舉二放過一著落在第二時如何師云懷州牛喫禾益州馬腹脹進云雲門扇子𨁝跳上天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾又作麼生師云西川斬畫像陝府人頭落僧禮拜師乃舉五祖演和尚云諸莊旱潦不以為憂一堂兄弟不會狗子佛性話深為可憂師云重處偏墜松源和尚云久聚兄弟正路行者有只是不能用黑豆法難以荷負正宗佛法到此平沉苦屈苦屈師云同坑無異土克由叵耐二大老把他諸人埋向萬仞坑裡若據山僧見處黑豆法有甚難用僧問洞山如何是佛山云麻三斤豈不是黑豆法僧問雲門殺父殺母佛前懺悔殺佛殺祖什麼處懺悔門云露豈不是黑豆法乾峯示衆云舉一不得舉二放過一著落在第二雲門出衆云昨日有人從徑山來却往天台去峯云典座明日不得普請豈不是黑豆法者裡悟去山僧性命在諸人手裡若也蹉過諸人性命却在山僧手裡卓拄杖云路遙知馬力歲久見人心上堂前半夏已去後半夏未來正當今日謂之中夏大衆過去已往未來未至即今事作麼生莫是二邊俱莫立中道不須安麼者般説話是你諸人嚼過了底殘羮剩飯因什麼拶著十個五雙鼻孔索頭在別人手裡且道利害在什麼處一翳在眼空華亂墜今朝五峯先生到來山僧下榻延致雖然儒釋兩歧必竟理歸一揆卓拄杖云薰風作意松翠涼白鳥不飛天在水上堂僧問牛頭未見四祖時如何師云處處緑楊堪繫馬又問見後如何師云家家門首透長安進云見與未見時如何師云鮎魚上竹竿俊鶻趂不及僧禮拜師乃云豁開大解脫門普請大家證入鮎魚上竹竿俊鶻趂不及便下座上堂今朝六月十五準擬説些禪道及乎法鼓一鳴肚裡一時忘了只記得慈明和尚云南山北嶺松北嶺南山草一雨濶無邊根苗壯枯稿好大哥三百法會之中會會説到者裡自是後代兒孫根思遲回當面蹉過別別茫茫普熱紛紛下雪引得學語之流隨例掉棒打月喝一喝下座玄學處士薑公對靈小參法身無相會萬善以莊嚴法眼無瑕截群機而洞照三乘由之而建立五性自此而區分開權實頓漸之門絶生死輪回之徑高超物表妙出聲前玄所不能玄學所不能學雖居有為界示無為法而不滅壞有為之相雖居無為界示有為法而不分別無為之性可以津濟四生梯航九有可以修因證果報德酬恩無事不圓無法不備正與麼時是你諸人要見玄學處士回機轉位超凡入聖處麼拍禪床云三世十方歸一念紫金臺上覺花新上堂拈拄杖顧視大衆云眼中見色耳裡聞聲圓通門戶觸處施呈你擬向個裡覔什麼碗以拄杖趕散師會下有僧云和尚自有禪只不為我説又云不是説不得自是不肯説師聞云把定死蛇頭有禪不肯説滅却臨濟宗何人敢饒舌別別那吒頂上喫蒺䔧金剛腳下流出血上堂僧問説法不應機總是非時語作麼生得應機去師云夜半起來失却牛天明起來失却火師乃云百不知百不會天上人間豈堪對見得徹提得去吉了舌頭三千里金不博金水不洗水夜來月上長珊瑚狸奴倒上菩提樹師一日云文殊普賢起佛見法見貶向二鐵圍山則固是且道釋迦老子還有過也無良久云休上堂頭上是天腳下是地南北東西依舊位中間突出須彌盧八寶七珍光煒煒放便倒扶便起蟭螟睫上放夜市老胡落賺沒人知急携隻履流沙去喝小參二千年前有一轉語四月十五日已前與諸人舉了也所以九十日內只貴見成雖不行棒行喝棒喝初不離其機雖不説證説修修證豈足究其用直得盡乾坤大地如個鐵橛子拋來擲去轉換自由今夜與汝脫却籠頭別資一路豈不見洞山和尚云秋初夏末東去西去須向萬里無寸草處去末後最殷勤石霜云出門便是草截斷腳跟雖然如是還知落處麼拍禪床云晝見日夜見星妙高山色青又青掀翻海嶽求知己撥亂乾坤見太平復舉文殊三處度夏迦葉欲白椎擯之乃見百千文殊在前世尊云迦葉汝欲擯那箇文殊迦葉休去師云世尊扶強不扶弱好與一椎本覺者裡若有個般破規越矩底漢却須變大地作黃金攪長河為酥酪特榻延之何故莫怪坐來頻勸酒自從別後見君希上堂僧問如何是通宗通途師云東去西去進云如何是叶帶叶路師云南來北來僧退師乃云世界恁麼廣闊因什麼坐在者裡動不得拈拄杖云東去西去南來北來金色尊者獨上高臺卓拄杖下座病起上堂昨日病前日病病病相尋無有自性坐斷淨名舌頭倒行摩竭正令擊拂子野狐窟裡産狻猊獼猴各佩軒轅鏡中秋上堂久矣不上堂口邊生白醭侍者來燒請法香拈出秦時舊𨍏輅金剛腦後下一錐空裡磨盤生八角寒山撫掌笑呵呵夜來月向西邊落喝一喝復舉長沙與仰山玩月次山云人人盡有者箇只是用不得沙云恰是倩汝用仰山云作麼生用長沙近前與一蹈蹈倒仰山起來云師叔直下是箇大蟲師云奇怪諸禪德仰山大似勾賊破家當時待他道恰是倩汝用便與一蹈蹈倒直饒岑大蟲有師子爪牙到此也無用處久立重九客至上堂兩兩不成雙三三自成九本色住山人何處尋窠臼卓拄杖云離四句絶百非驢前馬後莫亂針錐上堂摩竭掩室毗耶杜詞咬定牙關不通水泄本覺者裡但管飢來喫飯困來打眠熱則取涼寒則向火今朝十月初一早間喚奴子深開地爐滿堆黃葉方外高人到來且貴大家暖熱只如丹霞燒木佛因什麼院主眉須墮落請大衆下一轉語祖忌拈香此土西天單傳直指護得眉毛打失版齒隻履空棺謾神謔鬼可憐無事人未能笑得你上堂舉一不得舉二放過一著落在第二相罵饒你接觜相唾饒你潑水南泉斬貓作麼生良久人貧智短馬瘦毛長小參即心即佛非心非佛不是心不是佛不是物拈起鐵蒺䔧打破山鬼窟是柱不見柱非柱不見柱是非已去了是非裡薦取腳跟下色線猶存是句亦剗非句亦剗臨濟白拈睦州擔板似者一火太平姦賊亂世英雄總只無佛處稱尊若在如今一時與伊生按過拈拄杖畫一畫云山是山水是水僧是僧俗是俗大盡三十日小盡二十九夜短晝長陰消陽長是人知有只如一畫未形已前吉凶悔吝向什麼處著到者裡饒你似鶻捉鳩未免撈天摸地若只今日三明日四坐消信施仰愧龍天閻羅殿前打鬼骨臀有日在卓拄杖云達磨九年面壁二祖三拜傳心老盧腰石負舂究竟高登祖位選佛若無如是眼宗風那得到如今復舉僧問六祖黃梅衣鉢什麼人得祖云會佛法底人得僧云和尚還得麼祖云我不得僧云為什麼不得祖云我不會佛法師云腦後見腮莫與往來久立上堂夜來擊鼓小參為存家教今日升堂説法慶賀書雲要知祖意西來但聽山呼萬歲下座上堂僧問蟭螟蟲吞却虎時如何師云賞你大膽進云恁麼且退身三步師云章泉福建頭匾似扇僧擬議師便打云一任舉似諸方乃云一法若有毗盧墮在凡夫萬法若無普賢失其境界金圈栗棘覿面施呈擔板阿師水中撈月五祖和尚云山僧有時擬為你吞却又為咽喉小擬為你吐却又為牙齒礙還有為人處也無喝相逢不在頻頻舉達者須知暗裡驚上堂舉一明三目機銖兩萬仞峯頭衝開雪浪乾闥婆王奏樂山河大地盡作琴聲直得須彌岌嶪海水波騰迦葉起舞世尊證明是你諸人因什麼一向瞌睡喝一喝下座小參金烏飛玉兔走暑往寒來總仍舊不涉春緣別有條今朝臘月二十九祖祖相傳佛佛授手一句全提萬機通透三聖問雪峯透網金鱗以何為食峯云待汝出得網來即向汝道三聖云一千五百人善知識話頭也不識峯云老僧住持事煩真不掩偽曲不藏直合水和泥巖標嶽立永嘉大師道師子兒衆隨後三機便能大哮吼若是野干逐法王百年妖怪虗開口便是者箇道理也者箇道理山僧不敢謾你諸人那箇道理諸人也莫謾山僧好何故諸人知處良遂總知良遂知處諸人不知喝丫鬟女子畫蛾眉鸞鏡臺前語似癡自説玉顏難比並却來架上著羅衣擊拂子看藏經上堂以字不成八字不是玉轉珠回輝天鑑地所以道法王法力超群生能以法財施一切能善分別諸法相於第一義而不動敢問大衆釋迦老子四十九年三百餘會橫説竪説直説曲説充滿虗空周遍法界且道是第一義是第二義汝等比丘欽奉聖旨頒降御香一七日中三輪同轉是動不動者裡下得一轉語便見波斯匿王問世尊勝義諦中還有世俗諦否若言其有知不應二若言其無知不應一一二之義其義云何世尊云大王汝於龍光佛時曾問此義我今無説汝亦無聞無説無聞是名一義二義豁開戶牖萬里不挂片雲堯風蕩蕩舜日熙熙行者讓途耕者讓畔且因齋慶讚一句作麼生道拈起少林無孔笛大家吹出萬年歡復舉東印度國王請般若多羅祖師齋次乃問云諸人盡轉經尊者為什麼不轉經尊者云貧道出息不涉萬緣入息不居陰界常轉如是經百千萬億卷豈止一卷兩卷師云大王重處偏墜尊者薄處先穿山僧即不然待問諸人盡轉經尊者因甚不轉經但對云請陛下高垂天鑑設或得魚忘筌靈山付囑有在還委悉麼御樓觀射獵不是刈茅田上堂今朝進退兩序恰值上元佳節況是大朴師兄到來畢竟如何施設教中道譬如暗中寶無燈不能見佛法無人説雖慧莫能了壽山不免倒用太湖三萬六千頃渺瀰之口洞庭七十一二朵峭巍之舌已説見説當説圓融不礙行布行布不礙圓融借婆衫子拜婆年井底蝦蟇吞却月擊拂子上堂即色明心附物顯理驢作驢鳴犬作犬吠三世諸佛不知有六代祖師不知有建立半滿偏圓掃除權實空有水底藏身被火燒一一面南看北斗卓拄杖佛涅槃上堂今朝二月十五萬象森羅起舞世尊入般涅槃壽山擊動法鼓大衆若道世尊滅度是謗佛若道世尊不滅度是謗法若道諸人不會此理是謗僧謗佛謗法謗僧合入無間地獄到者裡出身猶可易脫體道應難直須高高峯頂立不露頂深深海底行不濕腳然後荊棘林裡坐荊棘林裡臥開佛知見示佛知見令諸衆生悟佛知見入佛知見喝知見立知即無明本知見無見斯即涅槃拍禪床云一把柳絲收不得和煙搭在玉闌干開山忌上堂平地上死人無數過得荊棘林是好手今朝三月十五正是夏前春後饒你不住兩頭當處也成窠臼拈拄杖即今慧靜禪師向拄杖頭上吹無孔笛鼓沒絃琴非唯戞玉鏗金直是移星換斗卓拄杖喝一喝上堂師子吼無畏説百獸聞之皆腦裂香象奔波失却威天龍寂聽生欣悅左擊拂子云者箇不是師子吼右擊拂子云者箇不是無畏説諸人耳在一聲中一聲遍在諸人耳不是寂聽生欣悅恁麼恁麼卷舒立方外乾坤不恁麼不恁麼縱橫挂域中日月恁麼中有不恁麼不恁麼中却恁麼下座詣大佛殿啓建天壽聖節上堂僧問國師三喚侍者意旨如何師云老不歇心進云國師因甚却道將謂吾孤負汝元來却是汝孤負吾師云頭上著枷腳下著杻進云伯牙與子期不是間相識師云矮子看戲僧禮拜師乃云三界無法何處求心掀翻藏海別闡玄音諸方按牛頭喫草者裡行自己叢林不説負吾負汝不説照古照今只貴一念相應自然萬境平沉五祖和尚云如馬前廝撲如辟歷閃電會即大富貴不會空對面喝一喝浴佛上堂大衆還見釋迦老子麼未離兜率滿面塵埃既出母胎通身泥土饒你山河大地草木叢林盡為衲僧一一衲僧有無量杓一一杓中有無量香水海直從今日洗至窮劫還得淨潔也無者裡眼親手辦倒轉杓頭便見垢相永離十方清淨其或未然釋迦老子有沒量罪過山僧有沒量罪過不干諸人事下座小參山僧自來嘉禾今夜是第三度為諸人説安居法好大衆香煙起處燈燭交輝法鼓鳴時人天普集便爾散去含元殿上覔甚長安古佛堂前此時參畢更待説佛説祖舉古舉今堅守蠟人如鵝護雪大似屈辱諸人直饒捩轉面皮伸出毛手打破野狐窟宅掀翻荊棘叢林也是舍己從人斬頭覔活恁麼也不得不恁麼也不得目前無法意在目前不是目前法非耳目之所到喝一喝云還知落處麼臨濟大師道我此一喝如金剛王寶劍我此一喝如踞地師子我此一喝如探竿影草我此一喝不作一喝用聖凡情盡能所俱忘拈一莖草作丈六金身將丈六金身作一莖草與麼也得不與麼也得敢問大衆適間為什麼不得如今為什麼却得得不得是不是差之毫𨤲失千里歸雲誰使就青山落花自得隨流水喝一喝復舉僧問睦州高揖釋迦不拜彌勒時如何州云昨日有人問趕出了也僧云和尚恐某甲不實那州云拄杖不在苕帚柄聊與三十師云睦州老漢只解高高峯頂立不能深深海底行忽有問山僧高揖釋迦不拜彌勒時如何只消道且坐喫茶畢竟是賞是罰具眼者辨取珍重上堂本覺今朝結夏為汝約法三章一者日裡一餐二者夜間一寢三者山門頭佛殿裡東行西行不得蹈破常住磚卓拄杖下座師一日坐次有僧云堂中有數人兄弟舉皓布裩法身頌各人下語未審契得師意也無師云好箇消息且舉看僧一一舉了師云相罵饒你接觜相唾饒你潑水要會法身頌更參三十年僧云即今問底是法身是色身師云驢前馬後漢僧便喝師云驢前馬後漢亂叫喚作什麼便打出上堂霏霏梅雨灑危層五月山房冷似氷莫謂乾坤乖大信未明心地是炎蒸老雪竇大似和麩糶貴在一時本覺近日喜雨歡動雷聲拈拄杖云夜來木上座向山僧道明日待我與諸人設箇家燕一要慶賀好雨二要暖熱大衆三要捩正天下衲僧鼻孔卓拄杖云莫怪空踈伏惟珍重下座室中問僧云道得也打道不得也打僧擬議師便打復問僧云你道好打麼僧擬開口師便打出復問僧云適來打得者兩箇僧是麼僧云是師便打出上堂森羅及萬象一法之所印新羅國裡打鼓大元國裡上堂阿耨達池龍王請佛齋賓頭盧尊者亦預其數上堂顧視大衆云便與麼休得也未衆擬議便下座上堂毗盧藏中有大經卷主伴互融理事俱顯及乎點讀開科多是討頭不見山門保護青苗為汝提掇一遍卓拄杖乃合掌云稽首文殊普賢却須管取一百四十大願下座上堂一葉落天下秋是人知有一塵起大地收置而不問騎却聖僧蹈倒水潦是第幾機卓拄杖云龍生金鳳子衝破碧琉璃小參萬里無寸草出門便是草嘉州大象驀翻身陝府鐵牛驚絶倒逢人不出賣狗懸羊打破鏡來天荒地老是則金沙混雜非則玉石俱焚不有本分鉗鎚難明向上一竅卓拄杖云一曲少林無孔笛從來多是逆風吹進退頭首上堂宗門中有四種賓主臨濟大師已嘗點出若也腳未跨門一一辨得非唯不久當作唱導之師抑且不繆為吾家種草其或奴郎不辨玉石不分要稱衲僧未得在豈不見忠國師睡次丹霞適至乃問侍者耽源云國師在麼源云在即在只是不見客霞云太深遠生源云莫道上座佛眼也覷不見霞云龍生龍子鳳生鳳兒遂去國師睡起源舉似前話國師打二十拄杖趂出丹霞聞云不繆為南陽國師喝一喝云不解作客勞煩主人雖然不因夜來鴈爭見海門秋上堂藥山久不上堂院主椎鐘擊鼓分明盡底掀翻猶道一詞不措本覺據令提綱不作者般調度今朝月旦拈香撥開向上一路誰言射虎不真枉發千鈞之弩九日上堂三四五六七八九碧眼胡僧不知有三更收得夜明符天曉起來成漏逗籬下黃華爛熳開龍山落帽霑風埃令人長憶龐居士天上人間不可陪阿呵呵會也麼若也不會山僧更道兩句去也石頭一箇住山斧古往今來稱獨步馬師胡亂三十年誰道少鹽還少醋喝一喝上堂諸方今日開爐本覺辭衆退院耆舊上下相留又把船頭撥轉所以道動若行雲止猶谷神既無心於彼我豈有象於去來去來不以象故無器而不形動靜不以心故無感而不應拍禪床云一等共行山下路眼頭各自看風煙祖忌拈香西天著不得東土著不得破六宗謾有多言對梁王全無朕迹坐久成勞忽轉身春風滿地花狼藉上堂良久顧視大衆云會麼山僧無説汝等無聞無説無聞是第一義驀拈拄杖卓一下云鶴有九皋難翥翼馬無千里謾追風擲下拄杖下座舟中值冬至二三友請小參一道虗明總是自家田地初爻既兆全彰劫外乾坤無去來動靜之殊無取舍是非之異可以騎聲蓋色可以隨流入流可以泛華亭半葉之舟可以盡澤國煙波之勝不舉任公之釣非同濠上之遊擊拂子云劈口一橈已傷鹽醋離鈎三寸休更回頭拍膝云永夜月明天在水鴈聲飛過白蘋洲上堂三日前五日後直須揮劍若不揮劍漁父栖巢古人恁麼道猶欠悟在山僧道三日前五日後執之失度必入邪路放之自然體無去住拍禪床云但行平等事何用問前程臘八上堂深山巖崖有甚佛法冷坐六年全無合殺豁開正眼定乾坤十方世界阿剌剌喝一喝箭穿紅日影誰是射雕人上堂今日要上堂夜來先作夢破的那羅延百發而百中卓拄杖便下座小參僧問承言者喪滯句者迷不涉二途如何進步師云鐵壁銀山萬仞高進云恁麼則瞻仰有分師云自是不歸歸便得五湖煙景有誰爭僧禮拜師乃云破顏一笑豈徒然從此靈山有正傳面目見前如薦得春風不在老梅邊喝寐語作麼我所得智慧微妙最第一衆生諸根鈍著樂癡所盲殊不知我王庫內無如是刀岩頭和尚云若欲播揚大教直須向自己胸中流出將來與我蓋天蓋地咄哉魍魎妖精欺胡謾漢雪峯云師兄今日始是鼇山成道一盲引衆盲相牽入火坑雖然恁麼且作麼生是他成底道莫有道得底麼若也道得萬古長空一朝風月薄批細切儘可與諸人分歲其或未然倚他門戶傍他墻剛被時人喚作郎又爭怪得復舉德山和尚一日謂臨濟云今日困濟云者老漢寐語作麼山拈拄杖濟便掀倒禪床師云是則是兩員猛將然雖力敵勢均其奈無風起浪千古之下未免招人撿點還委悉麼堯舜不彰民自化相逢何必動干戈元旦上堂元正啓祚萬物咸新莫有不涉春緣者麼時有僧出云打鼓弄琵琶相逢兩會家望闕賀正願聞法要師云八方開壽域一氣轉洪鈞進云不涉春緣乞師舉唱師云花須連夜發莫待曉風吹進云如何是德山棒師云義出豐年進云如何是臨濟喝師云儉生不孝僧禮拜師乃云月生一三世如來從此出月生二突出西來祖師意月生三森羅萬象競頭參拍禪床云皇基磅礴三千界寶曆開端億萬年元宵上堂釋迦老子道一人發真歸元十方虗空悉皆消殞五祖和尚道一人發真歸元十方虗空築著磕著若向築著磕著處會得只會得祖師禪不會如來禪若向悉皆消殞處會得只會得如來禪要且未會祖師禪在山僧道一人發真歸元十方虗空性相平等且道是如來禪是祖師禪喝一喝云一釋迦二元和三佛陀自餘是什麼碗脫丘一個擊拂子云今日燒燈令節山門進退兩序大耆舊欽敬堂供佛齋僧水陸陽森羅萬象無不周足因齋慶贊有個頌子舉似諸人休誇水上挂燈毬妙德奇勳合預修珍重法筵龍象衆莫將容易度春秋上堂僧出衆云學人上來擬伸一問師云子過新羅便下座佛涅槃上堂老胡七十九傀儡線索斷飲光尊者來槨裡雙趺現如蛇入竹筒曲性終難斷公案既見成如何為批判不若燒香供養渠從教人道