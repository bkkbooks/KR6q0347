萬國非唯放收在我抑且遐邇不遺山僧如斯舉唱要且不是扶他先作簧鼓後人何故面前自有五百衆中老作家為汝作證還信得及麼擊拂子棋逢敵手難藏行琴遇知音不厭彈上堂山中二三日啓建青苗會開眼與合眼總是法性海三賢固不知十聖何曾會唯有主稼神證此大三昧各乘本願力普應衆生界衆生界無盡此願亦不退稽首毗盧師和南觀自在時有僧出云久嚮本覺元來是箇座主師云你只識箇座主要且不識本覺僧便問如何是本覺師劈脊便棒云烈𦦨豈容蚊蚋泊擲下拄杖便歸方丈永福頴首座至上堂離四句絶百非摩訶衍法夢裡提持敢問大衆夢裡覺裡是同是別若也道得倜儻分明非唯小釋迦無遁形之地便可將鄱陽三百里水面納向鴛鴦湖一滴之中直是不寬不隘無欠無餘還委悉麼驚群須是英靈漢敵勝還他師子兒小參秋風涼秋夜長三期已滿作麼商量以字不成八字不是黃牛角指天四腳垂過鼻我首座出世也我首座牧牛也我首座行腳也我首座來也是法住法位世間相常住威音已前道得正是第二句還我第一句來擊拂子云三要印開朱點窄不容擬議主賓分復舉僧問雲門秋初夏末前程忽有人問作麼祗對門云大衆退後僧云過在什麼處門云還我九十日飯錢來師云者僧貪程太速雲門薄處先穿有問本覺只向道十里長亭五里短堠過在什麼處勸君更盡一杯酒西出陽關無故人重陽永福子有和尚歸上堂開甘露門據甘露室令諸衆生食甘露味永福禪師即其人也茲者龍歸舊窟鳳返丹山草木叢林頓增光彩本覺法弟何幸如之所謂物宜求新人宜求舊無端陳蒲鞋手握赤梢鯉倒跨三腳驢跳出雲峯破桶篐中揚聲大叫云欲上座你只見錐頭利不見鑿頭方豈不聞佛法大事靜退小節山僧被渠一問直得無言可對無理可伸只記得汾陽和尚道三玄三要事難分得意忘言道易親一句明明該萬象重陽九日菊華新喝一喝下座路官馬知事至上堂久雨不晴天道晦冥浸爛鼻孔滴穿眼睛山僧正是煩惱不暇忽然聽得尚書履聲呼童掃榻喚僧點燈抵掌劇談半餉悶中不覺惺惺起來豁開戶牖萬里不挂片雲今朝月望升高座一炷清香祝聖君復云十五日已前未開口一句正道著十五日已後未舉足一步正蹈著正當十五日開口不在舌頭上伸腳只在縮腳裡喝一喝三級浪高魚化龍癡人猶戽野塘水祖忌拈香三乘教外直指單傳手携隻履腳蹈兩船萬里西風卷沙漠不知竇八布衫穿雞足西堂至上堂雞足峯前風悄然能仁堂下浪黏天騰身抹過青霄外一曲胡笳奏未圓山僧數日拋離大衆昨晚歸來得與飲光尊者相見既曰情忘彼我自然道叶主賓提起陳年葛藤直是牽拽不斷衆中莫有一刀兩段底衲僧麼良久云設有也是草裡漢小參天地闔闢陰陽消長衲僧門下有甚伎倆放下拂子拈起拄杖佛來魔來總與一棒從教靈山會上退席五千善法堂前草深一丈且貴正眼流通作個人天榜樣所以五六年來雖則與諸人眉毛廝結其實水米無交明朝節屆書雲不免合水和泥打開東山家燕先舉雲門胡餅次烹趙州釅茶然後掇出洞山果卓只如道有一物上拄天下拄地常在動用中動用中收不得且道是什麼物良久云粗䬸易飽細嚼難飢復舉僧問風穴古曲無音韻如何和得齊穴云木雞啼子夜芻狗吠天明大慧和尚云者黃面浙子恁麼答話要做他臨濟兒孫也未得在或有問徑山古曲無音韻如何和得齊只向他道木雞啼子夜芻狗吠天明師云前行不到末後太過要見條理始終須是金聲玉振聽取一頌木雞啼芻狗吠兩箇老凍膿各長三尺喙古曲無音和得齊安用兒孫作臨濟喝一喝上堂節序推遷又見一陽來復靈光洞耀依然體露真常撥開向上玄關突出眼睛鼻孔釋迦彌勒猶是他奴且道他是阿誰擊拂子云嶺梅殘雪後雲鬢未梳時上堂三世諸佛説不到六代祖師傳不到天下老和尚見不到夜來首座藏主一一為諸人説了也山僧贏得口喫飯且山僧喫飯諸人還得飽也無者裡道得一句直教凡聖混融彼我不二豈不快哉其或未然一曲自歌山自緑此情不與白雲知擊拂子下座小參去年臘月三十日今年臘月二十九少處不減多不添年去年來總仍舊舊者不去新不來新舊何妨自前後所以道礙處非墻壁通處勿虗空若能與麼會心色本來同喝止止不須説我法妙難思諸增上慢者聞必不敬信喝當時五千比丘禮佛而退豈不是皮下有血眼裡有筋豈似如今諸方三百五百聚面團頭如勾闌瓦子相似黑漆拄杖到者裡有屈無叫處衆中莫有滴猊血化驢乳煎鸞膠續斷絃者麼良久卓拄杖空將未歸意説與欲行人喝一喝復舉溈山示衆云如許多人只得大機不得大用仰山乃舉似山下一菴主云只如和尚恁麼道意旨如何菴主云你再舉看仰山擬舉被菴主一蹈蹈倒仰山歸舉似溈山山呵呵大笑師云溈山老漢垂萬里勾駐千里烏騅却向平田淺草中抹住一箇焦尾大蟲諸人要識仰山麼也是官路販私鹽久立元旦上堂古人道拈起也天回地轉應須拱手歸降放下也草偃風行必合全身遠害本覺即不然拈起也群機普應放下也萬化咸新不拈不放時如何擊拂子百年難一遇元日子時春元宵南山和尚至上堂盡法界是一真燈遍塵區是一佛剎靈利漢一蹈蹈翻非唯可以觀光上國獨步大方便乃控佛祖宏機廓人天幽迹好大衆頭峭五嶽眼生三角左刮龜毛右截兔角焦尾忽乘雲雷飛金毛亂觸日月落月裡仙人巧畫眉九逵擺動黃金鐸喝一喝浴佛上堂釋迦已滅彌勒未生今朝正當四月八日天下叢林無有不浴佛者畢竟浴底是什麼佛佛真法身猶若虗空應物見形如水中月且作麼生説個浴底道理豈不見遵布衲在藥山會中作殿主浴佛次藥山云你只浴得者個且浴不得那個遵布衲云把將那箇來藥山休去藥山休去天下人摸索不著將謂遵布衲平地上贏得一籌殊不知正是黠兒落節雖然易分雪裡粉難辨黑中煤小參長期短期日面月面一毛端上乾坤石火光中閃電你有拄杖子與你拄杖子你無拄杖子奪却你拄杖子人平不語水平不流山僧十三年前海上參尋只是遇茶喫茶遇飯喫飯寒則向火熱則取涼朝悠悠暮悠悠不知白盡少年頭逗到被人推出住山把人杓柄寧免顢顢頇頇儱儱侗侗有時半夜穿針有時空中覔縫若非現前尊衆戮力贊成便見將東作西指南為北草滿法堂苔封古屋所以今夏堂中兄弟雖曰不多盡是諸方羅籠不住呼喚不回底漢掃除異見稠林拈却佛病祖病那更永福禪師在此輔車與脣齒相依卓拄杖一曲少林無孔笛逆風吹了順風吹復舉教中道以大圓覺為我伽藍身心安居平等性智乃竪拂子豈不是圓覺伽藍擊拂子豈不是平等性智一一明妙一一天真你若擬心動念即沒交涉且不擬心不動念時如何狗子尾巴書卍字野狐窟宅梵王宮小參一玄門三要路一一當機巧分布門門具足一切門一切門中賓主句喝一喝是賓是主若也辨得可謂動絃別曲葉落知秋其或未然不免別資一路好大衆甬道呈祥瑤階獻瑞老檜舞樓閣之風層壇壯林泉之美方來之士豁爾心開作者之功夫豈虗棄豈不見臨濟大師往在河北建立黃檗宗旨克符普化便乃戮力相成是皆法運當興人天叶贊山僧繆此承乏豈敢妄擬前修莫非諸德痛念法道湮微宗壇委地各施敏手相與扶持追還百代典刑振起一方叢席時當自恣事有變通用舍行藏各得其所卓拄杖云龍得水時添意氣虎逢山色長威獰上堂菩薩覺成就故不與法縛不求法脫不厭生死不愛涅槃不敬持戒不憎毀禁不重久習不輕初學何以故一切究竟覺彼此成佛故大衆如是則無結無解無修無證無取無舍無得無失無是無非無長無短又説什麼萬里無寸草出門便是草卓拄杖云野色更無山隔斷天光直與水相通子有和尚赴仰山上堂最初機末後句把斷要津還同遊戲豈不見小釋迦一日坐次大禪佛到翹一足云西天二十八祖也與麼唐土六祖也與麼和尚也與麼某甲也與麼小釋迦下禪床打四藤條後來雪豆云藤條未到折因什麼只打四下圓悟云胡餅討甚麼汁大衆斬釘截鐵本分宗師虎驟龍驟天然氣宇山僧今日幸遇新仰山發軔之初不免借帔拜年就窠打劫一要見前一衆飽足觀光二要專使參隨普資欣慰三要新仰山展九萬里之修程追數百年之勝軌拍禪床滿堂無限白蘋風明明不自秋江起古林和尚忌拈香不垂巴陵三轉語不作楊岐女人拜以香扣爐云只將此箇報深恩大似藏身露衣帶貴賈精神休賤賣漆桶自來多不快留取雙眉蓋眼睛鳳臺老人相體解小參僧問達磨未來時還有者個消息也無師云是什麼消息僧提起坐具師云兔子喫牛嬭僧拂袖便行師云莫謾山僧好乃云莫更有問話者麼有則逆風把柁無則順水張帆任他八面四方管取縱橫得妙豈不見德山小參不答話問話者三十棒時有僧出劈脊便棒僧云某甲話也未問因什麼便打德山云你是甚處人僧云新羅人山云未跨船舷好與三十棒臨危不悚真大丈夫後來雪豆云你要識新羅僧麼也只是撞著露柱底瞎漢車不橫推理無曲斷東山演祖云山僧今夜為大衆與他古人相見去也待他道今夜不答話問話者三十棒只向伊道某甲話也不問棒也不喫且道還契他德山老人麼到者裡也須是箇漢始得宗師眼目須至恁麼山僧今夜有問即答也不行棒也不下喝一條古路坦然平今古何人敢闌過捎清風拂明月萬煅爐中拈得雪和盤托出示諸人幾箇衲僧能辨別擊拂子庭前鐵樹本無華強被一陽輕漏泄復舉雪峯示衆云若論此事如一面明鏡相似胡來胡現漢來漢現時有僧問忽遇明鏡來時如何峯云胡漢俱隱師云古人可謂隱顯無礙去來自由山僧即不然忽遇明鏡來時如何只向他道禮拜了退且道與他古人相去多少若也道得自然不坐在明鏡裡若道不得且向胡漢邊著到久立臘八上堂毛頭星現出山來此日平生眼豁開大地衆生總成佛與誰携手上高臺除夜小參如來無禪祖師無意明眼衲僧討甚巴鼻一年三百六十日七十二候二十四氣一時過了明朝依舊孟春猶寒即今夜靜更深諸人正好休去歇去若真箇休歇得去佛也不奈你何祖也不奈你何更説什麼生魔死魔煩惱魔五陰魔天魔鬼魔便好出三界破魔網與他衆魔同一手作諸勞侶外道六師是汝之師汝師所墮汝亦隨墮毀於佛謗於法不入衆數阿呵呵會也麼自從舞得三臺後拍拍元來總是歌復舉五祖和尚云祖師説不著佛眼看不見四面老婆心為君通一線便下座師云貪觀白浪失劫手橈莫有撿點得出者麼久立珍重上堂元正改旦一句全提萬機休罷千聖不携紫煙籠帝闕睿算與天齊元宵上堂若論此事正如一燈分為千燈燈燈相續無有窮盡在東則為知事在西則為頭首在方丈則為住持在間寮則為耆舊至於三條椽下七尺單前經行坐臥卷舒出沒莫不以此燈而為佛事一明一切明一用一切用重重主伴歷歷交參無黨無偏無新無故只貴見成受用到頭不涉安排任是疥狗泥豬少他一分不得擊拂子一氣不言含有象萬靈何處謝無私
