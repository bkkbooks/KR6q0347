羅延第一峯頭如此去八臂那吒留不住勘破諸方却再來別有清風動寰宇次韻送仰山珍藏主不然不然如是如是道得分明較三十里金烏破琉璃殼舜若多神剛發惡當陽拶倒鐵圍山歷劫昏衢頓昭廓話盡山雲并海月抹過江湘與閩浙競誇赤驥解追風誰信螳蜋能拒轍斷常已破談真空二邊不立那留中將南作北西為東熱喝痛棒驅雷風次韻贈熙侍者見得到說得好者箇事無少老不明自己擬謾誰才說為人先落草收虎尾踞虎頭謾誇倒嶽仍傾湫提將來無有輕放過之理撞著底是不共戴天之讎忍辱衣慈悲室到此總須勾一筆平田淺草驀翻身佛手未伸驢腳出正覺場須彌座把斷乾坤能幾箇只應侍者解參禪始信祖翁家活大送敬藏主歸永嘉一徑直二周遮大藏小藏水月空華永嘉謾誇一宿覺繞床振錫成聱牙韶陽老師倒一說覿面豈免揚塵沙舍窄從寬欺胡謾漢將長較短把髻投衙盡情列下別有生涯掣動六鼇三島轉直鈎端不在魚蝦送梓藏主北上省師南山北山來自凌霄峯眼光爍爍寰宇空掀翻華藏世界海舉措不墮言思中電轉星飛看布武法戰場中肝膽露叱咤喑嗚陷虎機倒戈卸甲河沙數西祖傳來古鐵鉢誰道年深少提掇碎打零敲不足論千里萬里橫該抹阿師黃金臺上客鶴貌雲樣好標格五位君臣列正偏三玄體用超明白我昔始撾塗毒鼓曳杖來尋岩下路奮翮長驅北海風澤毛笑指南山霧用舍行藏各有時此意未許常人知青山從教映白髮赤驥自合隨龍飛君不見南陽老昔日對揚曾草草大耳驚翻眼底華紫璘喪却衣中寶今兮古兮爭幾何影草不露仙陀婆子母驀然同啐金烏迸出琉璃殼次松月翁韻送清上人佛身無為不墮數往復要須行大路鐵壁銀山拶得開四方八面無回互沒絲毫全體露禪之龍律之虎苦中之樂樂中苦清禪清禪聽我言先天未是心之祖送現藏主現成公案不涉安排一見便見早隔天涯三世如來開眼作夢一大藏教撒土拋沙雪峯三登投子九上洞山洎乎鼇山店中未免從頭列下興化南方行腳不曾撥著一箇會佛法底逗到大覺棒頭深明臨濟在黃檗喫棒意旨政好掘地深埋咄咄如今是什麼時節初冬暴寒長河凍結可行則行當歇便歇此事何須待人說次仰山了堂韻贈齊藏主一大藏教破故紙未解為人先為己眼底才明向上機口頭自沒間言語東山酸餡苦無多嚼破方知滋味美賢也由來固可尊愚也如何便輕鄙魯祖見人即面壁俱胝見人唯竪指隨宜施設有多門究竟還源無別旨一毛端上忽翻身百億毛頭總如是蓋天蓋地更由誰脫體承當都在汝送國清朗藏主歸太平大藏小藏風高月朗全提半提鴈蕩天台羅漢寺裡一年度三箇行者真淨老子甚處得者消息來倒一說對一說明眼衲僧如何辨別即此用離此用太平寰宇迥絶疑猜如此如此俊哉俊哉堪笑當年馬駒子震威一喝聲如雷送道藏主歸蔣山出得靈岩門便入蔣山室摵碎摩尼珠乾坤黑如漆寶公擘開十二面僧繇閣起丹青筆夜半放烏雞觸著泥牛吼正宗堂下草連天三佛家風俱漏逗咄次東山法兄韻送允藏主三乘教外無能過領略得去還仙陀諸方豈乏斷貫索奈此六馬追風何見說虗名掛官府點額曝腮多少苦肯信深山窮谷中別有高標繼先祖我家大兄東山翁玄關一擊千萬重入泥入水寫妙偈且可與子開青瞳前江心無言作偈送暢藏主來靈岩無際仲謀和之會余已謝事因次韻以贈法法本圓成塵塵自參互當知日用中不離寂光土鷺池鷲嶺拋沙土何曾說著到家句三翁苦口力提持密意明明元屬汝可憐王老師不打者破鼓休將理事論迥出言思處龍兮焉用攀鳳也何須附海上橫行儘自由妙德空生俱缺悟送昶藏主真性心地藏日用無差忒截斷萬機先何處尋蹤跡透脫不過金圈金圈吞吐得行栗棘栗棘鐵壁銀山劈面來箇是真人好消息次韻贈仰山繁侍者大仰拋來圓相慈氏豁開摟閣透出向上玄關總是機先妙著千年舊話重行萬里神光閃爍鳥窠吹起布毛畢竟如何領略諸方大有明珠只作豌豆糶却次松月法兄韻送杲上人黑漆漆地明杲杲丈六金身一莖草神頭鬼面謾施呈聖解凡情須淨掃下自無底高無巔毫端特地分天淵破瓶不可作瓶事如電久住芭蕉堅萬里秋光連海嶠霜清大野歸鴻呌朗誦寒山三百篇何待拈花發微笑我觀古佛松月翁老氣往往吞長虹不知禪源倒溟渤俱覺筆陳驅雷風普應群機了無怠天瑞流芳轉光采撲碎驪龍頷下珠一粟真堪眇滄海次韻送靈隱芳侍者國師三喚曹溪一宿會則白雲萬里不會寸釘入木支那竺國兩沒相干四七二三有甚付屬以一重兮去一重湖光㶑灔山空濛不以一重去一重海棠帶雨燕脂紅白髮老僧夢初覺屋角風響聲丁東德山之棒臨濟喝金剛腦後添生鐵糞掃堆邊輥出來笑倒柴桑陶靖節送芾藏主歸翠岩道人天馬駒蹴蹈空寰宇勘破主中賓作得賓中主信腳躍翻華藏海日用頭頭自無㝵眉毛落盡又重生翠岩可怪還堪愛怪也怪不盡愛也愛不徹三千里外謾多情覿面相看政無說無說多情誰與知爛爛黃菊開東籬瓦盆炊黍秋日微清霜滿地黃葉飛送效藏主之國清少林之曲琴無絃一鳴一息三千箇諸方欲和和不全翻腔轉調徒喧闐東山後來下水船逸韻絶出玄中玄節拍于今落誰邊知音未遇還堪憐和風吹衣陽艷天浩興突兀三台連石橋飛雪噴長川豐干一笑寒拾顛送理藏主以字既不成八字亦不是截斷心意識顯示真如理鳳臺主山頭倒卓六月炎天灑霜雹眼裏無筋不易窺腳跟有路通寥廓水就濕兮火就燥擬究宗風須撥草百尺竿頭舞柘枝二三四七俱驚倒次紫擇了堂法兄示智上人韻上既無傳下亦無授截斷衆流涓滴不留杓卜聽虗承訛接謬孰有智人為物所誘合眼作夜開眼為晝病入膏肓神醫莫救絶後再蘇如鐘待扣泉何盜而不飲餌何驕而不嗅物何以而謀新人何以而求舊爾其索玄珠於罔象慎毋役聰明于契詬庶幾契心祖于先天政不必論遙遙之華胄和仲謀兄韻送塤侍者參底未是禪學底未是道真參與實悟無好無不好東山老祖翁求人曾入草日午金雞啼非晚亦非早握手報長廊殊堪慰清抱高風三百年撫掌贈一笑隨聲逐色漢何處尋頭腦道流弓冶子箕裘應自紹平生白雪歌毋勞語山獠送隱侍者向上一著不涉言詮會即便會擬即招愆若是本分人愁甚本分事當知佛與祖盡從者裡去拈須彌山稱作二兩東山老漢可殺生獰用黑豆法換人眼睛松源聵翁更不覩是一絲一糝去不盡動即遭他神鬼領說妙談玄太可憐馬後驢前恣馳騁快須剪斷五色索騰身坐斷千聖頂阿呵呵會也麼古今天地古今山河晝明夜暗日暖風和一曲高歌歸去好擘開千嶂入煙蘿送淨慈明藏主宗門有體復有用後以智先定動棒頭五嶽落崢嶸喝下千江乾洶涌即今拈却棒與喝全與何妨亦全奪戴角擎頭與麼來幾箇死中能得活維楊道友真倔奇一大藏教難羇縻揭開宗鏡照塵剎炯炯璧月揚清輝昨宵為我留一宿話到無言心自足撥轉船頭歸去來斷絃誰把鸞膠續送廣藏主佛法遍在一切處何曾覔得芥子許一芥子許不可得遍一切處俱昭著天之高地之廣日月星辰明朗朗狸奴白牯念摩訶妙德空生剛鹵莾有照有用有罰有賞七棒對十三幾人知痛癢他日孤峯正令行會須揭此毗盧藏送遠藏主歸省白鶴雪心道無方行者未易窺其疆腳跟不動忽蹈著誰謂近在眉睫旁雖近而遠遠而近至無所至那容量春已過日正長入夏更覺南風凉八紘雲收宿雨霽一目萬里天蒼蒼道人昨日離錢唐今秋又云歸故鄉阿師禪心瑩如雪真與松月爭明光往來不往來是藏不是藏除却南泉王老師一曲清歌有誰唱贈模藏主打破鏡來相見了一輪杲日當空耀三世如來不出頭五千餘卷何從討不權不實非偏圓教外所以稱單傳少林直指早成曲瞎驢滅却方超然道流頂門三眼正草偃風行看號令堪悲堪笑老瞿曇昨日定兮今不定送皓藏主我師休居不師其道不師其德不師其當默即語當語即默不師其生擒周金剛活捉白拈賊惟無所師而師之畢竟何如豈不見白雲老祖曾有言一文大光錢買得箇油糍喫向肚裡了當下便不飢又誰管你南天台北五臺清凉山中萬菩薩引得長汀老子拍手笑咍咍咄送慶侍者之淨慈大千總是如來藏宗鏡高懸空萬象赤梢一躍透龍門平湖漲起千尋浪老僧急卷袈裟角看汝青天飛雪雹朝生便是鳳皇兒笑倒松頭千歲鶴次韻送僧歸蜀行甚驢腳馬蹄惹起千疑萬疑要識本來面目好看秋月揚輝多少黠兒落節重來眼上安眉著衣方堪禦冷𦘕餅豈可充飢拶破劍門關子回頭日在松西次育王雪窗韻贈印書記一句子龍無龍總拈却稱長雄灼然不墮言思中單非隻兩非二老胡打失當門齒妙彈無絃誰賞音還我東山左邊底最卓犖端尋常毫毛豈足論短長拶著三關應手破海印湛湛涵秋光跨三賢超十哲頂門別有通天穴滿肚文章一字無賊面似人人似賊送淨慈拱藏主再參前蔣山正宗經頭一字無人識作者相逢拱而默懸河四辨一時乾八萬法門空寂寂湖天雨足凉氣浮翠波蕩漾風颼飂語默商量不到處柳岸數聲黃栗留剔起眉毛眼如月老我何須更饒舌東歸會見鍾山翁自有生機為君說次韻送洽侍者接響承虗真浪受大丈夫兒還肯否便請從頭放下休不然且向東西走今年已過還明年祖意的的教誰傳三喚三呼絶消息未必落在空王前南堂老比丘有口不說禪饒你領得去且不涉語言咄如斯舉唱涴心田須信壺中別有天贈操柏庭趙州說禪真逸格人問西來指庭柏坐令門戶生清風豈唯體用超明白突出楊岐尤傑特栗棘金圈亂抱擲弄蹄驢子快騰驤蹈碎乾坤了無跡兩翁不作知幾年靈山一會還依然剔起頭陀笑華眼攢峯峭壁開青蓮春滿江南又三月柳絮漫天作飛雪為君傾盡此時心昔也不來今不別送杲藏主百丈再參遭熱喝黃檗聞之驚吐舌正宗滅向瞎驢邊衲僧有口難分說慈明易服歸汾陽風餐水宿何皇皇孤標俗三百載高義乃復摩穹蒼不顧危亡何太錯虎頭截得蒼龍角蹈著鴛湖徹底乾萬里秋空飛一鶚韻碩藏主一大藏中無法說道人慎勿生枝節少林直指早成紆我也安能更饒舌千葩萬卉方爭春出頭天外今何人壁立萬仞轉身句一蹴大地無纖塵竪抹橫該君自看寂兮寥兮光爛爛百鍊金為繞指柔直須再入紅爐鍛送慧藏主歸上江兼來能仁清懶圓通約之歸宗玉嶼以戒為身以慧為命演出演入無少無剩開口便吞三世佛嚼碎虗空吐出骨虎頷編須未作家兔頭戴角方奇倔我有一句在汝邊白雲堂下波粘天圓通不開生藥鋪頭陀石被莓苔纏送錫藏主自大仰東還寧親辭親依師年尚少辭師寧親豈容老父母師僧兩不違孝順端稱古皇道白雲孤飛海天碧岸柳江梅得春早我亦有親當一歸斑衣兒啼笑絶倒出家終無在俗理歡笑幾何還懊惱悲歡本自無根蒂情愛牽纏苦懷抱要須揭起大圓鏡愛垢情塵俱一掃只今非往昔非來覺慧發光明杲杲以此報師師謂然以此報親親謂好萬機休罷到家鄉一體無分是僧寶先保寧和尚送宣維那偈弘藏主求和昨夜虗空都撲落天明火中尋得雹威音那畔訪知音曹溪撞著一宿覺大都說話不倒邊折筯攪動蒼龍淵擊碎驪珠亦間事坐看平地波黏天亘古亘今唯有此欲觀前人先所使擡眸何處討三賢舉步等間超十地此宗此宗須自得自得不借他人力同鍋喫飯共床眠肝膽到頭成異域休居唱出南堂酬毗盧藏裡堪遨遊萬法不能為伴侶孤月自解隨三舟送雪竇良藏主妙高臺上雲錦鏡池中月清影落人間孤光滿寥泬四十九年說不到老猿啼斷中岩曉草中逸出睡於菟驚起二靈行鳥道送萬壽真藏主遊台鴈台山鴈山高且寒五月六月飛氷湍山形杖子既在握探賾自可資遊觀危峯爭為寶幢立線路或作羊腸蟠不知應真說何法但見花雨飛漫漫何如撥轉毗盧藏一道神光吞萬象掀翻海嶽更無倫隔靴豈用拳抓癢行可出先保寧贈偈求和樹提婆宗結衲僧舌龜背刮毛針頭削鐵觸著人我無明討甚法喜禪悅三冬枯木滿林華九夏炎天連地雪作家還我老玄沙解道靈雲曾未徹磊磊落落處大段周遮忉忉怛怛時不消一掣萬機休罷而千聖不携兮內空外空內外空逼蛇化龍而尅期取證兮一月二月三四月送法喜滅宗威音已前無授受釋迦枉落然燈後鷲嶺拈華謾泄機少林得髓爭呈醜黃梅夜半築底錯老盧把住元非惡可憐馳逐天下人接響承虗都不覺道人且喜相忘久來去不妨空兩手邁古超今豈等間奪食驅耕咬猪狗君不見當年臨濟辭黃檗禪板拈來與燒却正宗滅向瞎驢邊草裡鐵蛇頭戴角次韻贈思侍者渡水穿雲訪師友朝談天台暮賢首己躬下事合如何拶著人人少知有未善參詳聽我言只者如今誰動口彼此僧中大丈夫何用隨人腳跟走東山頂上闊著步玉几峯前展雙手撥開萬象見全身截斷群機示真吼小根那敢妄摶量佛祖始堪論授受金鴨香銷錦繡帷地戶天門俱脫臼贈南宗南宗密印傳來久十聖三賢不知有拽轉虗空背面看錦縫重重貫牛斗棒頭曷下明真機德山臨濟還堪悲脫窠裂臼領得去風飛雷厲方相宜我是乾坤無事客驗盡銅頭并鐵額朅來拋向大湖中一枕高眠真上䇿用本覺楚石韻贈怡雲屋楊岐石窗好尊宿襟度潭潭如廈屋舉措彌增佛祖光行藏廣布人天福贊成宏智匡慈明等是鷲峯親付囑斷絃妙在鸞膠續與吾一鼓雲門曲高山流水少知音白雪陽春和何速楚翁平生五鳳樓無愧大悲千手目我去靈岩三載回喜見雕甍起平陸柱石端為不世資棟梁豈是尋常木主伴能操不二心今古還同一機軸如風從虎雲從龍似地擎山石含玉大匠固知無棄材善賈何曾有停蓄撮將大千為粒粟體亦足兮用亦足用亦足羅湖不生誰可録贈無為道者歸峯道者稱無為傲睨物表超希夷有時分身遍塵剎直與佛祖爭驅馳佛祖何先我何後為而不為終傑斗夜升兜率晝閻浮問著時人罕知有多少疑眸破壁兀兀堆堆守空寂到頭不會轉身句如此修行有何益要識無為聽吾說孤蟾冷浸千江月波波頓現是尋常處處相逢元不別我心與月同虗間照天照地相循環光境俱忘照自寂一聲鶴唳來雲間次石佛元菴韻送聚維那之龍河新昌石佛聞名久無邊剎海毫端有九霄雲外現全身萬仞峯頭垂隻手衆生顛倒難教化往往東行却西走佛也由來不奈何我又如何開得口道人袖裏黃金椎自堪殞碎魔軍首妙用靈機苟現前不妨觸處為真吼君不見龍潭老人吹滅燈光射七星并八斗子也親承石佛來不知石佛曾言否更從言外訪知音眼中何處存妍醜黑暗女與功德天有智主人俱不受南堂與麼老婆禪未必七分能搆九送輿藏主歸省保福一菴法兄即心即佛與麼住狸奴倒上菩提樹非心非佛與麼去生鐵稱錘被蟲蛀松華為食蓮為衣懸崖峭壁何巍巍把定牢關缺活脫放開線路終相宜藏主近前出隻手撿動金毛師子吼若問靈岩事若何黑黑明明三八九和仲謀韻贈舟維那噓一噓吹一吹腳跟不點地鼻孔大頭垂全身入草處打失兩莖眉聲前非聲布漫天之鐵網色後非色揚遍界之風或喑嗚而叱咤或顧盻以踟蹰高來卷舒方外俊處頴脫囊錐沙場百戰氣浩浩太華一擲空巍巍作家相見有縱奪千聖向上無鉗鎚覺天之日忽已墮魯陽之戈誰與揮馬祖堂前再參句妙峯孤頂清霜飛一喝果然聾兩耳大唐國內無禪師送珍上人回鄉從門入者不是家珍百草頭上覔得全身拈一放一有甚好出此沒彼徒因循衲僧拄杖六七尺敲風打雨驚天人手面靈機絶思算頂門正眼無踈親出生父母只者是凌滅佛祖超常倫蹈著石橋成兩截一聲喝散千峯雲次仙岩仲謀韻贈堯上人究己明宗自為䇿何用迢迢遠相索未離歐阜早差池蹈破吳雲轉懸隔君不見月兮不待風而凉又不見日兮不待火而赫要知生佛兩同源合信曹溪無正脉窮玄微善探賾烏本非玄鵠非白無明煩惱是真如虎穴魔宮總安宅英俊流終逸格九萬扶搖方展翮塵沙劫海剎那間百億乾坤一毛窄敲東擊西喚叔作伯阿剌剌透網金鱗遭點額雪菴瑾和尚偈禪者求和眼中之句句中眼眨上眉毛還不見有時提起金剛王有時獨弄無文印神仙祕訣誰堪傳劫外日月壺中天太白山頭𦦨爐雪鱉鼻徑把長蛇吞送蔣山淵維那歸蜀道人曾見三佛來桶篐脫處心眼開回首成都一萬里峽流春漲爭喧豗君不見德山老漢初出蜀未戰全鋒先銼衄那堪夜參吹滅燈從茲不唱還鄉曲拈得拄杖獰如龍訶佛罵祖鞭雷風如今叢林無此翁作偈且送淵性空送敏侍者訥於言敏於行參方且要求宗匠即今海內誰可師之子行行好尋訪汝不見嘉禾古有雲門翁手面一著驅雷風顧鑑機先重遭撲電光石火從匆匆東山顛佛果瞎特地分身遍塵剎金雞拍翅一聲啼便解人前施孟八示中上人我此法門中大本在見性一見一切見如臨大圓鏡穠纖既可鑑本末自澄瑩迷時聖是凡悟後凡為聖迷悟兩超越聖凡同響影廓然洞無疑參學事已竟次韻贈善上人閲經一大藏教五千餘卷剎剎全彰塵塵頓現耐重撲倒金剛神釋尊不坐空王殿高來低應谷響泉聲暗合明投神彩鬼面爾既擔枷過狀我則據款結案機先領旨討甚仙陀格外明宗早不著便除是本色流一見即便見咄咄咄還知麼直須斬釘截鐵輒莫綴齒粘牙不涉安排群機普應現成受用毫髮無差兩手擎來耳朵中堪容四大海寸絲不掛眼睛裡可著恆河沙揭開摩竭靠倒毗耶天上人間有此沒量大漢騎聲蓋色實謂妙不可加會則目前包褁不會別立生涯熱即取凉寒向火飢來喫飯困來茶次韻示僧道舍人我此一宗不立文字四七二三如水傳器欲得親切去却藥忌匪學而能匪行而至俱胝一指大士千臂知是妄覺不知無記決要完全直須打碎是頭頂天是腳蹈地父子主恩君臣主義辨色分香有眼有鼻可進則進可退則退能使於物不為物使凡聖兩忘自他兼利咨爾僧道固爾初志念茲在茲圓成覺智爾本無求我亦無示廓然現前非言非意宜善護持毋自輕易送曙藏主道人信宿來禾城三反無覔南堂處乃知善財參德雲七日之間亦如是德雲不離妙峯頂山僧豈出南堂裡中途百念忽頓息白鳥蒼煙盡知己握手一笑載以歸尋得匡床倒身睡明朝欲唱還鄉曲睡起先求贈行句我觀汝昔元不來今也何為却言去不來不去兩俱捐故國清風半帆耳山僧為人無實法汝也臨機好看取更說甚麼雪峯老漢九上洞山三登投子撿點將來政是黑山下鬼窟裡活計直饒鼇山店上盡底掀翻何異鄭州出曹門遠之遠矣咄咄咄住住住歸向扶桑更那邊別有光明蓋天地贈徑山經侍者百尺竿頭進一步一步超越河沙數平田淺草驀翻身幾箇解分泥水路荒郊雨後泥水多在江滿江河滿河老農晨興錫苗草作勞群起高聲歌赫日炎炎燒碧漢喜有風生楊柳岸道人不憚泥水深矻矻通身流白汗入門一見忘主賓道義篤切情彌親話盡山頭十年事如夢如幻如浮雲坐到水乾泥亦去雪車往往羅氷柱金鴨香銷意自間別有嘉聲繼先祖贈淨慈戩藏主一大藏教永明旨山色湖光照几永明宗旨一大藏梵語唐言提不起碧海紅塵貼日飛牛胎生得香象兒蹈碎乾坤無朕跡大悲千眼焉能窺天台道流何卓犖未言先領俱昭廓丹山鸞鳳九苞文祥麟只有一隻角示靈隱景岩藏主是大法藏不涉名言衲僧日用諸佛本源豈唯智者親見靈山一會儼然未散即今老僧與汝同處普光明殿揖舍那尊把斷要津不通凡聖掃除露布迥脫根塵咄珍重橫肩鐵拄杖莫教築碎破沙盆送來維那參松月翁真淨界中無一法畢竟度河須用筏幡竿尖上驀翻身誰管石頭行路滑浩然一月千江心松風正奏無絃琴八紘雲靜夜氣肅老龐不作誰知音子欲參玄宜撥草桶底脫時方是了袖裡金鎚影動搖家家門首長安道送壽藏主東歸扶桑道人來自東一舉九萬乘天風探珠不入沙竭宮十年蹈遍中華中中華之中何所遇白日西飛水東注始看楊花作雪飛還驚白雪如飛絮大華磔裂黃河乾己躬下事何顢頇掀翻大藏五千卷一句未始曾開端驀然來見南堂老萬種千般俱一掃曠劫無明當下消先師公案登時了明之下下一榻百尺竿頭恣騰蹈外道天魔總倒戈龍泉太阿初出匣明朝歸去楞伽巔順風依舊三日船親朋有問本參事向道晨朝熱水洗面脫下脫襪打眠畢竟如何咄神仙祕訣父子不傳洞庭謠送本藏主東洞庭西洞庭七十二點浮螺青凉風吹衣日色薄白浪遠接天冥冥盧公高臥歲月老今古有誰同此道涵空閣上豁雙眸長嘯一聲欣絶倒掛角羚羊本無跡之子何須苦尋覓翠雲不動石屏間岸蓼汀花弄秋色壯遊豈是耽奇勝仰止先宗作龜鏡隔江相喚解知歸堪與虗空安把柄台鴈謠送景侍者台山青鴈山青千朵萬朵矗矗攢高冥橫空石梁鬪雪瀑飛流濺沫往往散作銀河星潛奇育秀狀不盡坐殺五百一十六箇聲聞僧嗟豫生緣在其下兩腳未暇躋崚嶒上人從何來便欲舒幽情攀蘿陟磴到絶頂俯視萬象無逃形願言學道亦如此探賾理窟開玄扃吸乾佛海掀翻祖庭使夫寒拾撫掌詎那服膺庶幾懸天心之寶月朗劫外之真燈苟不然者又何必陋燕誇雲鵬而與世俗同愛憎廬山謠送迪首座廬山橫截九江口五老崢嶸欲哮吼曉風吹斷香爐煙玉龍噴雪飛晴晝遠公向來栽白蓮社中人物何超然山靈勒回俗士駕勝地盡囑西方仙陶令攢眉真自咈夜郎有意嗟乾沒還丹浪說透瓶香到頭莫換凡夫骨我生元是山中僧別來轉眼三千齡此日因君話疇昔陡覺秀色盤空青盤空青可攬結清淨之身廣長舌一笑掀翻九疊屏摩訶衍法非言說杯渡尊者祥雲菴偈珩琅渺首座求和十行十住十回向杯渡老人常實相阿惟越致等妙覺壽命光明無有量佛佛境界體性同隨說而行自非強雙溪鐵牛喫一椎等間吞却嘉州象百千如來咸助喜頻伽盛空滿相餉登高望遠意自殊祥雲翠結瓊林上珩琅一關法兄用前韻見招因答之三千里外遙相向弟兄孰謂無心相毛端涌現寶王剎胸次政餘吞海量工夫已到應從容道力未全安可強昔年杯渡今再來截流顧盻真香象瓷罌滿貯黑石蜜妙語緘題遠分餉暮年只合赴嘉招劇談抵掌雲巢上蘆圌室歌并序杯渡尊者應跡宋朝神異非一常荷蘆圌而行至廣陵赴李氏齊置圌中庭云四天王福爾家李欲移圌數人莫能舉有竪子窺圌中四小兒長數寸齊訖提之而去又赴兖牧劉與伯招伯令舉圌來視數十人亦不勝伯即之惟破衲木杯耳宣慈濟西竺蘭若尊者所居也住山熙菴春公欲創丈室榜以蘆圌不遂而終囑其徒智明誼上人為之逾年而成厥孫渺師求余題復和尊者祥雲菴偈韻并敘其大略使刻之云挈箇蘆圌來復往大似全無大人相看渠坐斷珩琅峯脫盡凡情超聖量四王虎踞圌之中感應道交何木強掀翻海嶽驗行蹤蹈碎乾坤無影象下載清風木作杯上方鉢飯人爭餉智明作室吾作歌大書蘆圌榜其上妙乘舟歌并序妙乘舟前御史蒼山之泛宅也治書廉公亮榜其額金山即休為之頌曹溪月翁為之敘可謂具美猶以為不足來徵余言不得已謂之曰真性吾舟也願智吾水也六度萬行吾帆檣篙舵也吾乘之而游乎三界之海流行坎止惟意是適是非之風不得驚寵辱之渦不得溺內無珍異以起盜者之心外無聲色以動觀者之議人方拘拘我獨浩浩人方戚戚我獨怡怡誦華亭載月之章樂鄂渚煙波之趣不住彼此不著中流而錦鱗赬尾或有所遇不亦妙甚矣夫又何必東拂弱水西掠流沙南放炎海北極玄溟浪為無益之游而蕩無所歸哉系之以歌曰天地浩蕩兮放吾之舟萬化無息兮乘之以游返吾心兮復吾性廓然大通兮餘將焉求罷釣收綸兮華亭船子呈橈舞棹兮鄂渚岩頭嗟余生兮季世所不見兮前修開帆捩柁以力追之兮慨情緒之繆悠豈無清風朗月以壯吾之趣兮曾何塵勞妄想之未休匪殘山剩水之可愛兮自無意於公侯有超宗異目之開士兮固宜衝寒冒暑而激揚唱酬殆將濕心浴德於清凉之池兮采芙蕖於芳洲雖薄俗昏墊終莫我知兮亦庶免漱石而枕流渺江漢之無際兮當不限余之去留惟歲寒之高義兮尚或慰乎寂寥之秋止止軒贈張君茂君茂作軒名止止止其所止毋乃是要知真止初不然止無所止方通理疏之所以明其元泥之所以塵勞起漆園老吏豈解事虗空生白謾自喜若能轉物即如來自然躍出虀甕裡六寥寥秋月明山長海闊天冥冥漁歌斷續蘆華汀止止於此將忘情半山古原作咽居榜曰信菴因璉藏主來徵偈偉哉信菴能自信古聖今賢同一印盤結孤峯豈等間棒頭喝下無生忍覺城東際信不及走遍南方無處立彈指聲中得路歸法界重重曾頓入一念不起無浮漚廓然三際空悠悠萬仞崖前布鐵網九重淵底拋金鈎君不見汝家開山真淨翁邁往之氣凌長虹一生善弄大旗鼓力排戲論真宗公作信菴吾作偈落落風規宛然在謝墩吞却寶珠峯還放秦淮東入海竹堂贈琦藏主竹間著此半間屋夢中盡是鈞天曲覺來宴坐寂不動但見繞簷排翠玉風蔌蔌雨蔌蔌月色天光蕩心目神也清骨也清八萬四千毛竅俱通靈君不見東坡道人鐵拄杖敲空有時能作響不問人家與僧舍腳頭到處成真賞又不見當年香嚴老古錐等間一擊忘所知潑天富貴赤骨律卓錐無地良堪悲如來禪祖師意劈箭機鋒建瓴水百尺竿頭掉臂行劄定乃兄三尺觜芥室贈靈藏主道人一室如一芥大小輪圍無不在中有百億須彌盧圍繞無邊香水海一室既爾百室同千差萬別俱圓融毛端寶剎乃其戲似水入水空藏空君觀見行三昧事諸佛衆生本非二聖凡情盡體如如是則名為不思議踈簾高卷心境間團蒲曲几安如山光風霽月相回環孰謂此地非人間煮雪齊贈壽首座道人不烹龍道人不炮鳳道人兀坐深齊中爛煮雪團充法供一飲毛孔生清風再飲肌骨氷玲瓏東土西乾接手句玉應未了仍金舂品字柴頭春滿室紅麒麟誰敢輕觸後夜夢升兜率宮覺來床上伸雙足靜趣軒保安招提古城裡法師作軒名靜趣一心不動萬機間三際泊然如止水軒前修竹參天緑竹下清池浸寒玉妙談般若本無言安用琅函五千軸好風吹折芬陀利權實同時盡昭著靜猶不立趣何存未入此軒須瞥地大樹軒老禪作軒臨大樹樹下栖禪真得趣直將大樹榜禪軒千里求余寫禪句問君此樹何年栽緑雲窣地青崔嵬長天不放日月下挾座只驚風雨來一道陰凉同濟北空盡勞生心意識六十蒿枝痛未伸再思一頓何從得聽夢樓百尺樓頭展雙足一枕黃粱午炊熟江城五月落梅華舉世真成蓋蕉鹿者一曲那一曲天鼓希聲斷還續閉一目開一目起來更把身翻覆三際寥寥萬境間六用門門總休復大原何有建隆眠永嘉謾向曹溪宿風流輸與老溈山二子神通良不俗面湯才去手巾來一碗釅茶濃似粥環翠樓道人高居環翠樓筠面面山光浮白雲朝飛宿雨霽甘露夜注青玉甌長林乘風怒濤吼當暑忽復如清秋金經琅琅華藏海公案了了蒲團頭童子南詢斂念入彈指千劫何悠悠東歸未盡若耶興尚可為子聊一遊聽松堂風來松韻清風去松韻停松堂得松韻六月生清氷重陰覆瑤席時作韶鈎鳴世無寒山子好在誰解聽我欲呼朱絃和此大古音忽聞深㵎泉悠然契吾心空空室道人一室如懸磬榜以空空頗相稱忽然突出三萬二千師子床攝入毫端無少剩謂之有佛面等間成百醜謂之空帝珠寶網光重重空而不空有不有象王回旋師子吼白戰將軍不用兵太平天子垂雙袖㖿嗚咿誰與知水晶簾外天華飛兩頭白牯腳蹈拍三面狸奴舞柘枝歸雲亭作亭竚歸雲雲歸宛亭亭道人本無心淡與雲相應夾徑樹嘉木沿溪羅翠屏人間境逾寂雲白山自青看山坐亭上披雲濯清泠緑雲軒長松翠竹當軒窗奇峯削玉摩穹蒼緑雲隔日南薰凉竺墳魯誥堆滿床道人深居萬慮忘知見散作毛孔香客來問法呼煮湯一試車聲繞羊腸朴菴贈華侍者朴菴朴菴求我歌時之不古如朴何窮奢極侈世所尚懷貞抱素無乃訛朴菴朴菴聽我語羲皇上人葛天氏有耳不聞絲竹音有眼豈知軒冕貴低可穴兮高可巢蓋頭何處無莖茅汙樽杯飫本自足蕢桴土鼓焉用教歲晚忽然情僞作七竅崩分混沌鑿有時拔劍斬風輪驚起泥牛鬪折角我歌此歌居莫嗤大空小空渠得知萬事到頭難準擬早來百鳥䘖花去止堂贈運侍者止堂止堂求我歌三請不止如止何不若如今便休去免教平地生風波止堂止堂聽我語川之方增豈得已倒流三峽迷九淵崩騰澄渟皆此水動兮靜兮誰所作卷兮舒兮亦昭廓寥寥虗室生白光落落靈機洞靈覺動相元無安有止尤搓茅繩縛山鬼銅沙羅裡滿盛油坐斷乾坤只者是靜相亦無安有動百華競作春風夢東山家燕此時開囉囉招兮囉囉送我歌此歌清夜闌萬籟閴寂神思間何人披雲發長嘯一聲迸落千林間承天毅首座號木翁松月翁更曰剛中求正於余余曰剛中其字也木翁其號也為說歌曰阿翁胡為事木訥口不能言意奇倔一機截斷凡聖情裂石崩崖露風骨松月見之呼剛中諸方見之稱木翁一為其字一為號落落總可魁群公君不見牟尼化身千百億多少嘉聲振金石兩元非異一非同究竟真成白拈賊獨木贈林侍者臨濟樹只一株蓋天蓋地曾無遺閻浮金光耀日月無晝無夜香風吹三伏茫茫灑氷雪遍身毛孔清凉徹五濁炎氣悶殺人惆悵無因為伊說獨峯贈昂侍者千山萬山橫玉案一點青螺出天半白雲不作雨聲乾只有鳴禽自呼喚何人坐斷最上頭眼空四海無春秋碧落紅塵兩懸絶菜葉莫遣輕隨流壓破坤維鎮南極五嶽要齊齊不得徑須推倒葛藤樁免使天華惹衣裓無生贈度藏主無生道人來自何繾綣求我無生歌生既元無歌豈有撥火為子揚清波君不見覺海澄圓一漚發四生九有相挨拶若知漚躰本來空始證無生真實說真不有妄亦空推倒百億須彌峯十虗直下頓銷殞三世諸佛無行蹤寂寥寥明朗朗撥轉玄關何倜儻夢中合眼跳黃河豁開兩眼長床上東海魚打一棒等間躍出千重網跛鱉盲龜總不知帝釋修羅俱膽喪嗔不嗔喜不喜笑殺寒林七賢女百種供須不稱情剛然要索無根樹阿呵呵會也麼不萌枝上春風多執死蛇頭懵懂漢放活子仙陀婆無生歌少林曲彈到無絃聲自足泥牛吼破碧潭煙石上栽蓮藕如玉白牛贈昌山主白牛之白白如雪性情迥與常牛別一犂耕遍劫空田四腳慣曾行嵽嵲懶安香嚴稱善牧豈揀平原與幽谷鼻孔遼天不受穿角長未免東西觸牧之既久終相忘水足草足溪風凉火宅商量誘諸子四衢軒蓋何煌煌
