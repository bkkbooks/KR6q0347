body:
  text: 偈頌參學比丘汝現元寶慧朗等編次無想仲謀韻送皎首座靈山密付少室單傳體用不二事理昭然拄杖頭分開太華笠子下蓋覆三千明來暗來指槐罵柳東去西去回坤轉乾石火流星苦未急銀山鐵壁何其堅徐六之板忽放下竇八之衫還破穿休居腳跟不點地孰謂抹過威音前七年四往返掘地尋青天移舟既別水舉棹終逢源將誰脊梁作砥柱用爾鼻孔為司南翻身天岸看日出照耀萬象分妍次仲謀法兄韻送肇侍者世尊三昧迦葉不知破顏微笑蠡測管窺把斷重關黃華元非般若放開線路青青翠竹總是真如棘林中露無邊之蕩蕩平地上峭萬仞之巍巍知所不到心焉可思反常合道提綱挈維此是少林無孔笛為君去也聊一吹自東自西兮將長補短或南或北也夷高就低送慧藏主一字也無說箇什麼放兩拋三弄真象假脫體分明舉得全草菴卸下琉璃瓦拈黑豆換鬼眼睛撥虗空尋針縫罅我面前無你你面前無我南北東西八字打開當明中有暗當暗中有明成住壞空一時裂破德山臨濟小兒嬉靠倒西來胡達磨送徹上人頂𩕳機打得徹無言童子喃喃說妙德空生總未知憍梵鉢提伸出舌丁一卓二滴水氷生放兩拋三雷轟電掣休不休歇不歇雪峯輥毬太孤絶不是玄沙解斫牌爭得清風滿寥泬子從何方來根器乃超越妙悟繼先宗慎勿循途轍況是親承古鳳臺為吾釘取虗空橛贈住首座虗空為口萬象舌塵說剎說熾然說到了依然一字無衲僧眼裡重添屑珠回玉轉分玄微棒頭喝下看提持驀然蹈著頂𩕳竅天外一擲誰能知有時收有時放明暗雙雙真絶唱手面分開萬仞崖目前衝起千尋浪擊石火閃電光銅頭鐵額何能當掃蕩從前野狐窟正好揭示金剛王四句離百非絶憍梵鉢提嚼生鐵毒藥醍醐一道行地老天荒誰辨別雪峯具知客禮祖具足凡夫法空中翻石臼具足聖人法面南看北斗三毬輥出時一舉四十九祕魔手中叉子湖門下狗敵勝與驚群還他師子吼拈起簸箕別處舂大淮南北江西東八十四人阿碌碌髑髏晝夜吟松風送百丈清藏主獨坐大雄峯有什麼奇特轉得一大藏自然超語默神通妙用手面施呈換斗移星聖凡莫測俊鶻捎空亦等間擡眸已過新羅國送懋藏主三千剎海如來藏語默商量總成謗掇轉須彌看指南石裂崖崩難近傍央庠座主還倔奇手面一著謾楊岐當時一席三五百透得金塵端是誰山僧有口無暇說爾也前途好咨決打落天邊白鳳雛七尺烏藤冷如鐵送祖侍者歸溫州有一句到你平地無風怒濤起無一句到你赤腳波斯入閙市不如拈却有與無大開兩眼空全吳鐵牛之機是何物雪華點破烹金爐若不見禾山老人解打鼓聲聲合著道吾舞森羅萬象閙啾啾徹底自分泥水路江上風松間月拔却多年釘根楔永嘉親見領南能便是如今箇時節少林曲調新豐吟千里萬里誰知音歸去西山掃煙榻試把玉線穿金針送霖侍者金剛圈鐵酸餡多處添少處減侍者參得禪一斬一切斬山河大地不見纖塵草木叢林流光發艷築著磕著自痛自知把住放行如影如響釋迦彌勒猶是他奴文殊普賢討甚伎倆坐斷乾坤辨正邪伸手依然不知掌咄送成侍者男兒學道貴有成舉步便合超途程妙高峯頭赫日月大洋海底轟雷震拈來一隻蓬蒿箭任是沙場須百戰五位君臣列正偏三玄戈甲隨機變有時縱全殺全生誰得共有時奪十方剎海橫該抹君不見文遠全師未舉時曾與趙州爭勝劣送明藏主之浙東虗空解講經萬象側耳聽撥轉上頭關拈却佛祖病東去西去前三後三南來北來頭正尾正倒一說對一說鶻眼龍睛若為別平高就下以機奪機顯實開權用楔出楔辨而訥巧而拙逆順縱橫也奇絶君不見蟭螟睫上土壙人稀石火光中霜凝凍結百越三吳正令行誰道同途不同轍送雅藏主道純明日龍翔去索我燈前寫長句滿天風雨作中秋直得千江水東注我也豈曾參得禪信口合著玄中玄釋迦老子不知有大藏小藏安能詮君不見瞎驢滅却正法眼究竟只成擔板漢堪笑東山解放收方便依然沒方便如今此道如泥土塞壑填溝何足數七金山外訪知音夜半蟭螟吞却虎贈普光長老書蓮經募緣起佛殿韶國師道場國師不露頂𩕳句流出曹源一滴水沃日滔天沒奈何浸爛虗空知幾幾通玄峯頂非人間掣斷金鎖開重關百尺竿頭逞伎倆二三四七同舒顏芬陀利華時一現殿閣崢嶸插霄漢要種梧桐待鳳栖普光心印須高提送能藏主之金陵親從道場來相見有何說以能問不能大巧固若拙撥動毗盧藏中寶萬里神光射穹昊古今多少弄精魂出草有時還入草金陵山川皆故國高不可攀深叵測秋風吹老桂華枝腳下鐵鞋生兩翼送蔣山德藏主道林來自江之東天寒歲晚何匆匆橫拈倒用總自可舌本滾滾生雷風藏裡摩尼時一擲五色光芒射空碧南海波斯鼻孔深舜若多神面門黑我觀佛祖初無他乾城飛起陽𦦨波僧繇不識鏡容老此意往往成蹉跎門外驚猋卷黃葉霜白長堤水天接天關地軸總掀翻漢不能收秦不攝送淨慈涇藏主鄮峯深處曾相見一拶虗空成八片雖然補綴得完全未免三頭并兩面君談禪兮我談道議論胡為能恰好西風老桂吹天香大地山河明皓皓君不見茶陵蹈折溪上橋跛驢奮迅騰雲霄至今萬象露風骨低者自低高者高擕李亭前重握手拈得鼻孔失却口笑把如來藏裡珠撒向時人不知有咄送度侍者目前無闍梨鐵鞭擊碎珊瑚枝座間無老僧焦尾徑逐雲雷飛百千三昧入掌握知音豈在鍾子期君不見古皇先生拈華時一笑豁開金面皮承虗接響二千載肩擔背負爭驅馳禾山之鼓不易打少林之笛誰敢吹所以曹溪流萬古清漣觸著波濤忽澎湃滔天沃日橫鯨鯢如今且喜風色定湛湛寒光浸空影一舸乘流解問津太平不用將軍令送初上人混沌未分初一句還成見當機覿面提日面與月面靈利師僧不知有昨夜三更白如晝錦標奪得在何時一機舂斷懸河口汝要參禪宜猛省入得邪時歸得正鄮峯深鎖翠雲寒會應坐斷毗盧頂次絶照翁送小師藻侍者韻萬境紛紜不須遣語默商量看平展威音那畔即如今日用現行誰不見體本無生了無速羅剎身心菩薩面濟北兒孫未必然棒了罰錢須出院送如維那如來禪祖師禪拽脫鼻孔從頭穿智者當機猛提取蹉過只在眉毛邊靈岩豈無興化棒不顧危亡堪近傍道人親見作家來七縱七擒心愈壯干木隨身有如此直下同生復同死又携明月過雙溪一片寒雲映秋水送寧藏主之上藍老胡平生多口業且喜兒孫沒交涉沒交涉處驀翻身直得一華開五葉君不見馬大師即心即佛宏機雄峯卷席奮雄略驚群敵勝超玄微當時拽得鼻孔脫大似死中重得活更言三日耳根聾笑倒山雲并海月道人深入如來藏袖裡神鋒難近傍摟其窟穴窺其蹤謂我此言誠的當壯哉吸盡西江口便是龐公豈知有但教觸處得逢渠何用將身藏北斗上藍法席天下奇鍛凡鎔聖真爐鎚入門相見定相問向道近離鴛鴦湖送畏上人歸省萬壽華國拈一機示一境截斷葛藤須猛省三千里外定誵訛東平打破溈山鏡不屬玄不屬妙吞爍乾坤迥然照海神失却夜明簾長汀拍手呵呵笑倒握金桴擊金鼓木人石人齊起舞八臂那吒撲帝鐘家家門首長安路好箇佛堂須作禮惡水潑人終不悔門外霜風劈面來百越修途宜自愛真藏主求悟菴說答之以偈悟則不無安用說說則不無須用悟悟後還同未悟時說不說兮何足顧大道無門從此入五色祥麟脫羈馽擊碎如來藏裡珠驚倒生公鬼神泣菴外事曾不知耽耽睡虎方藏威解得金鈴掉頭去碧天皓月揚秋輝送明侍者參竺元和尚汝欲參禪須妙悟汝欲弘宗觀列祖列祖皆從妙悟來扶竪真宗亘千古德山臨濟何似生掀天撲地隨縱橫白棒高揮日月落喝聲迅作雷霆轟或全賓或全主互換機先分彼此萬仞崖頭撒手回箇是金毛師子子我昔從師事參學敲打虗空鳴剝剝不惟萬象笑相譍聚鐵等間曾鑄錯此道年來恐難說遇著通人試甄別紫籜峯高豹霧深好把烏藤輕摺折送達侍者路逢達道人不將語默對拈起鐵蒺䔧虗空須粉碎雷卷星飛猛提掇十方剎海橫該抹全身放下看如何解弄死蛇終是活道人道人休問吾問吾枉著間工夫不如卷衣歸故廬奴兒婢使誰家無送慧侍者小艷詩新豐曲斷絃須是鸞膠續育王此語最分明何須更向東西卜輥鐵鼓擲金鐘鳥啼花笑春融融干木隨身擬何適碧崖丹嶂金仙宮我亦乘風欲東去望雲且種無根樹蔚然枝葉覆行蹤便是君來無覔處送機維那機奪機楔出楔正眼還從瞎驢滅破關先下頂門椎百匝千重須迸裂興化當年不知有法戰場中垂隻手克賓出院是尋常直得虗空開笑口祥麟掣斷黃金鎖天上人間豈唯我勘破諸方却再來照乘明珠消一唾送間藏主之金陵絶學無為道人事一抽三兮二添四山前猛虎趂於菟草裡毒蛇吞鱉鼻頂門突出摩醯眼是亦剗兮非亦剗鷓鴣啼斷百華春鍾山倒卓歸雲晚龍藏琅函五千軸頭頭盡是新豐曲江流不盡楚天寬正音畢竟何人續送明侍者歸道場一明一切明一了一切了豁開總持門諸法不相到高高峯頭不露頂千山萬山春晝永深深海底不濕腳李公醉酒張公醒我不孤負汝汝不孤負我放過南陽忠國師把住嵩山破竈墮噫吁嘻無人知桃華落盡楊華飛玉簫我欲吹瑤池只恐鳳皇飛下蹈折梧桐枝送華藏性維那性覺妙明本覺明妙吸乾三萬六千頃之波瀾揭開七十一二朵之煙島堪笑老臨濟三度問佛法的的大意三度被打六十烏藤添了幾多無明煩惱直饒高安灘上頓解知非便乃逆探龍頷倒捋虎須據實商量何似遇飯即餐逢寒著襖全放全收自起自倒出群標格正合如斯廣大門風憑誰繼紹金椎影裡急回頭應怪山僧入荒草送侍者諸法無實相巧辨不能說掃空知見雲焉用辟歷舌毗耶一默三千年黃河之水流接天曼殊大士摸不著贊歎罔及徒拳拳爭如德山臨濟善用事棒喝隨機若風雨此事如今幾箇知分付闍梨自看取送雲侍者歸雲門香林舊入韶陽室紙襖年深黑如漆我今一字不曾談且免後人論得失君不見若耶溪上雲千堆一點不著人間埃變化崢嶸亦何有白銀宮闕黃金臺凉風西來吹爾急擘破玄關求路入浙江潮信正如山渡水莫教雙腳濕送大乘覺首座再參松月翁識自本心見自本性明來暗來頭正尾正大乘菩薩信無疑小根魔子安能知手面擎來百日月毫端涌出千須彌君不見曹溪之流非止水一滴不來波浪起乳峯此語豈尋常克配乃翁三尺觜首座有長處所以到這裡摩挲兩眼對西風白雲卷盡天無滓從容近前與我言再參願求長句為司南忽然樹頭推下金粟香𣯶𣯶撫掌一笑應相諳送仰山初侍者最初機末後著趙州石橋非略彴拄杖頭邊正眼開奧域靈區無鎖鑰君不見仰山放出四門光照天照地何煌煌黃河澄清貫海碧大華突兀摩穹蒼南斗西北斗東空生岩畔華重重小玉頻呼雖有意檀郎認得元無蹤絶思惟休擬議忿怒那吒擎鐵柱坐斷江西十八灘密雲彌布陰凉樹送昂維那之江湘開窗畏嚴寒閉戶礙觀雪跏趺萬慮寂一性自超越道人蹈雪來扣門鐵石骨氣氷霜魂笑我蒙頭紙衾重軟語解使生春溫明朝蹈雪江東去天生有此濟勝具九江江上看廬山還向山頭看江水鄱陽之湖天一角洞庭秀色浮衡嶽白雲飛盡日蒼凉幾點沙漚鏡中落我生豈無江海興老矣無由事馳騁冥心物表只神遊佳處點頭唯自領君不見克賓不入這保社徹底能扶老興化二十烏藤趂出山饡飯吹香滿天下送岐藏主對一說倒一說黃河無聲海水竭三千剎土坦然平八萬法門玄路絶祖師意如來禪取之左右逢其原只今坐斷千聖頂何用顯實重開權或全收或全放逆順縱橫難近傍紅爐焰上結氷華萬仞峯頭翻雪浪歌不徹笑不徹海底蝦蟇吞却月憤怒那吒撲帝鐘金剛腦後添生鐵送朋侍者歸雲門朋用良友用益益友良朋苦難得上何高兮爾不扳下何深兮爾不即扳兮即兮高與深上兮下兮古與今一一從頭遍探討却來聽我無絃琴無絃之琴有聲律河之洋洋山岌岌龐公馬公骨已朽俗耳要聽聽不入雲門古來山水窟雪骨氷相好人物萬壑千岩夢寐中布襪青鞋漫馳突春風浩蕩吹晴波為子一唱雲門歌明朝雲門見親舊定應笑我成蹉跎琦上人求警䇿汝欲參禪求警䇿我正忘言味真樂真樂無涯只自知警䇿多方待君學虗而靈兮寂而妙萬戶千門俱一照除却頭陀解笑華是誰蹈著通天竅氈拍板無孔笛白雪陽春明歷歷百草頭邊聽得真下載清風有何極送聚書記雲居山頭一句子獨龍岡頭不相似翻身蹈著凌霄峯井底蓬塵亘天起驚倒象龍千七百等間擊碎蟠桃核三乘教外論文章一字元來不著畫寂音懵懂潛子癡炊無米飯充朝飢身如椰子膽如斗開口便欲吞須彌我自龜藏老丘壑何從扣門聲剝揚眉瞬目驗來風信是丹山多鸑鷟黃河九曲應已清岐陽阿閣隨所鳴鈞天廣樂政可聽兩耳安用箏笛聲送楚藏主自鍾山回天台省親百丈野狐我自不會一句截流千古無對拈却髑髏前妄想鳥啼花笑千峯上把斷乾坤箇是誰烈𦦨亘天飛白浪鷲領祇園有何說梵語唐言試甄別老胡版齒缺關風九載少林曾漏泄爭如金陵狂寶志杖頭賸有間田地對人劈破金面皮不妨契得西來意長林落葉西風急一曲高歌擬何適白髮慈親正倚門莫道參方無所得咄示志藏主正法眼破沙盆金烏拍翅扶桑暾煎膠續絃豈細事胸次可使吞乾坤君不見曾郎脊梁硬如鐵鼇山雪深凍欲折不是岩頭盡力扶爭得光明滿寥泬又不見瞿曇棄却金輪位半夜翱翔雪山去六載精修萬行林一朝坐斷菩提樹大丈夫兒合如此局促軒籠不相似五須彌頂擊金鐘明月清風安可比送明侍者見松月翁明暗雙雙底時節山僧有口難分說侍者親自峨峯來猶向松江問松月月明正照江上松白雲散盡空噇空一機不借萬境滅赤手自可收全功濟北宗風端若此未必江西不相似要須蹈殺天馬駒方可人前論賓主江南兩浙秋氣深大江滾滾山沉沉一曲兩曲無絃琴天老地老誰知音送琦侍者壽山初退院侍者話行腳築著腳指頭清風動寥廓天台鴈蕩春意深百華競秀春雲陰鑑湖一望八百里賀老不作誰知音雲門六寺可圖𦘕禹穴年深草應隘老夫有腳不能行孤負東州草鞋債送徹藏主徹頭徹尾有一句一大藏教該不得文殊肆辨正忘言淨名杜詞夫豈默君不見乾闥婆王奏天樂大地山河齊應諾飲光善舞不善聽草中露出祥麟角扶桑道人真傑偉萬里東來發玄閟象王蹴蹈振雄風師子嚬呻更無畏我今既老當投間道人且復歸家山後夜滄溟浴紅日一笑懸知倚檣立送天童覺藏主三世諸佛是何物一大藏教是何語直指單傳顯正宗爛爛覺華生碓觜自古上賢猶不識中下之流豈堪測𭣟瞎摩醯鬼眼睛大地山河墨漆黑黑中有白光熙熙敲空作響開愚癡空拳指上實性義隱顯出沒超玄微倒一說兮對一說今古幾人能辨別紛紛墮在光影中大似獼猴探水月偉哉作者何方來江村古寺相徘徊提金剛椎碎窠臼用黑豆法驅英才撒開兩手時一笑照中之用用中照北斗藏身豈偶然南山下雨還同調明朝話別歸魯松鐵船打就成匆匆隔山相喚解相應管取倒行摩竭令送慧禪人禮祖打破髑髏揭却腦蓋四七二三泥團土塊青草堆中撥得著鑑地輝天光爍爍丈夫膝下有黃金握節當胸何太錯錯不錯善斟酌嘉州大像驀翻身陝府鐵牛攧折角次韻贈欣侍者國師三喚失錢遭罪侍者三應認賊為子說什麼牙如劍樹口似血盆檢點將來總是事不獲已等間驀過上頭關自然不在平地裡相唾饒你潑水相罵饒你接觜會則全放全收不會則自倒自起即色明心附物顯理撥火求漚敲空取髓盡情拈出與君看認著依然還不是直須自解倒騎牛我也誰能管得你送煥藏主八吉祥六殊勝一大藏教頭正尾正老胡舌端長復短說盡偏圓并半滿拈來固好拭瘡疣放下豈能登彼岸東山道箇鉢囉娘和柈托出誰承當好手從來自無歒捉賊要須先捉贓摩尼之珠光燦爛永嘉收得良堪歎撒向人前人不知拾礫春池有何限送聰藏主謁晉卿學士為竺元和尚求塔銘歸源老人示真寂草木叢林俱失色眼睛不壞牙齒存火後莖茅掃空碧平生說法如春雷震驚蟄戶迷雲開高風亮節激浮懦傲世絶俗遺紛埃休居後師恰五歲入滅先師十七載叢林未甚嘆寥落尚賴東南有師在師今既往如之何山頽海竭江無波衲子拊膺爭慟哭淚雨不斷空成河君不見湛堂末後一段事赫赫光明在僧史晉卿只今無盡公子也孰知非妙喜須彌為筆天為大書特書不一書南泉遷化正不惡東家作馬西家驢送見書記歸仰山相見已了燒香換茶一語不發彼此作家無端提起五色筆濺得虗空半邊濕撒出仰山圓相來電激星馳海水立尚喜老僧心眼正鐵輪旋頂氣自定坐看天外黑風收但覺平湖淨如鏡從容指似湖上山劇談抵掌開歡顏拂袖還歸集雲去一鏃徑破千重關送操侍者歸道場操則存舍則亡衲僧門下不用商量得念失念無非解脫舉足下足總是道場拄杖頭乾坤廓落鉢囊裡日月交光向去底舍父逃逝却來底久客還鄉全超法報化坐斷威音王平高就下振領提綱左顧右盻兮龍騰霧集前遮後擁也虎嘯風生次仲謀師兄韻贈煥上人不道相似只是不別南北會同上下交徹一句忽當機開口非干舌佛海之龍僧林之月五領三湘七閩兩浙騎聲蓋色也賣弄風流簸土揚塵兮豈存芳烈齧鏃破關斬釘截鐵從頭