front:
  text: 南堂了菴禪師語錄序予壯齡時與千巖長公為方外交千巖以南堂禪師偈贊示予予讀之驚曰是有所證悟者之言也絕枝蔓去町畦而不墮於情識之境不意大法凋零而能見斯人哉千巖以予言為然當時之所見僅一二章耳自時厥後或吳或楚或梁宋或魯衛名僧開士多有謁予浦陽江之上者予既見輙問見南堂否曰見之曰有何言遂各解囊相示見漸多則其心慕之為愈至及來京師其弟子祖灊海壽復持三會語畀予而求為之序讀之連日因獲盡其大觀焉嗚呼據獅子座演如來法其任甚不輕也在他人為之東剽西掠拈綴成篇而椎鑿之痕故在師則渾融無跡不異雲流而天空者矣在他人為之拘滯一隅動輙有礙或得乎此竟遺於彼師於殺活之機縱橫皆自如矣在他人為之氣索神沮不自振而無以應來學之求師乃圓滿充足覃及於諸方矣有若師者其所造詣誠非凡情之可度量哉夫以少林西來惟究心源言辭直截初無隱晦傳至大鑒恐為世諦流布不得不秘護而密持之歷代碩師隨時升降慈憫峻厲各立戶庭其接引雖若有不同所以祛逐妄緣而挽入正途者則一而已矣迨及宋季尚奇騁異背其師授而流於頗僻者漸多有之君子言之未甞不為之太息師能循蹈矩矱惟祖武是繩提唱真乘使人復見大鑒遺意其扶樹正宗之功夫豈小哉予之慕師非一日鉅細之辭皆獲觀焉故知師為獨深而謂非他人之所能及然可惜者師之名位不滿於德使其說法五山布靉靆之慈雲澍滂沱之教雨則其功逮被又不止今之所見而已雖然名外也非內也德內也非外也師內重而外輕者也苟以在外者之崇卑以為在內者之低昂是不知師者也師之行業予既詳書成記勒之堅珉復為讀斯錄者著其說如此千巖在定光中又未必不以予言為然也師諱清欲字了菴南堂其號也族姓朱氏台之臨海人甞住開福本覺靈巖三禪剎云洪武三年歲次庚戌春二月辛酉朔翰林學士亞中大夫知制誥兼脩國史金華宋濂景濂序了菴和尚語錄目次卷第一宋濂序集慶路中山開福禪寺語錄卷第二嘉興路本覺禪寺語錄卷第三平江路靈巖禪寺語錄卷第四舉古卷第五頌古贊語卷第六偈頌卷第七偈頌卷第八法語卷第九題䟦宋濂撰行道記正印撰䟦附錄至仁撰續集序續集行狀
