body:
  text: 舉古參學比丘祖杲得度等編舉德山示眾云今夜不答話問話者三十棒時有僧出禮拜山便打僧云某甲話也未問山云你是甚處人僧云新羅人山云未跨船舷好與三十棒法眼云大小德山話作兩橛圓明云大小德山龍頭蛇尾雪竇云二老宿雖善裁長補短拾重從輕要見德山亦未可在何故德山大似握閫外威權有當斷不斷不招其亂底劍諸人要識新羅僧麼只是撞著露柱底瞎漢師云總謂德山勾賊破家者僧把髻投衙法眼圓明據案結欵雪竇扶強抑弱逐惡隨邪如斯理論要契他古人直是白雲萬里當時者僧若是箇漢見他道今夜不答話珍重便行非唯坐斷德山抑且光揚宗眼舉雪峯普請次自負一束藤路逢一僧峯便拋下僧方擬取峯便蹈倒歸舉似長生乃云我今日蹈者僧快生云和尚替者僧入涅槃堂始得峯便休去雪豆云長生大似東家人死西家助哀也好與一蹈師云雪峯是則下坡不走快便難逢若不是長生未免勞而無功雖然且道雪峯一蹈何似雪豆一蹈舉百丈再參馬祖侍立次祖以目視禪床角拂子丈云即此用離此用祖云爾他後開兩片皮將何為人丈取拂子竪起祖云即此用離此用丈掛拂子於舊處祖便喝百丈直得三日耳聾雪豆云奇怪諸禪德如今列其派者甚多究其源者極少總道百丈於喝下大悟還端的也無然刁刀相似魚魯參差若是明眼漢瞞他一點不得只如馬祖道爾他後開兩片皮將何為人百丈竪起拂子為復如蟲禦木為復啐同時諸人要會三日耳聾麼大冶精金應無變色師云精金百煉要資本分鉗鎚苟非三日耳聾爭見賈增十倍刁刀相似魚魯參差萬古碧潭空界月再三撈漉始應知舉崇壽指凳子云識得凳子周帀有餘雲門云識得凳子天地懸殊雪豆云澤廣藏山理能伏豹師云驢揀濕處尿舉永嘉到六祖遶禪床三帀振錫一下卓然而立祖云夫沙門具三千威儀八萬細行大德從何方而來生大我慢雪豆喝云當時若下得者一喝免見龍頭蛇尾又再舉遶禪床三帀振錫一下卓然而立代祖師云未到曹溪與爾三十棒了也師云大小雪豆續鳧截鶴夷岳盈壑不妨好手據令而行好與二十棒何故曹溪波浪如相似無限平人被陸沉舉仰山指雪師子云還有過得此色者麼雲門云當時便與推倒雪竇云只解推倒不能扶起師云雲門推倒雪竇扶起直饒過得此色也未是金毛師子舉香嚴垂語云如人上樹口衘樹枝手不攀枝脚不蹈枝樹下忽有問如何是祖師西來意不對則違他所問對則喪身失命當恁麼時作麼生即是有虎頭上座云上樹即不問未上樹請和尚道香嚴呵呵大笑雪竇云樹上道即易樹下道即難老僧上樹也致將一問來師云香嚴用盡神通不消虎頭一拶便乃四稜塌地雪竇縱有生機也只扶他不起舉僧問魯祖如何是不言言祖云爾口在什麼處僧云某甲無口祖云將什麼喫飯僧無語雪竇云好劈脊便棒者般漢開口了合不得合口了開不得師云者僧貪觀白浪失却手橈若是箇漢待他道你口在什麼處便與掀倒禪床非唯魯祖高竪降旗且免雪豆馬後喝節舉僧問雪峯古㵎寒泉時如何峯云瞪目不見底僧云飲者如何峯云不從口入僧舉似趙州州云不可從鼻孔裡入僧却問趙州古㵎寒泉時如何州云苦僧云飲者如何州云死雪峯聞舉云趙州古佛從此不答話雪竇云眾中總道雪峯不出者僧問頭所以趙州不肎如斯話會深屈古人雪竇即不然斬釘截鐵本分宗師就下平高難為作者師云雪峯一期答話不知𭺗著趙州痒處趙州忍俊不禁不覺劄著雪峯痛處痛處痒痒處痛一時移在雪竇身上且道者僧還曾夢見也無舉僧問西堂有問有答賓主歷然無問無答時如何堂云怕爛却去那僧問長慶有問有答賓主歷然無問無答時如何慶云相逢盡道休官去林下何曾見一人雪竇云何不與本分草料師云三頭兩面得人憎有問靈岩有問有答賓主歷然無問無答時如何只向他道甕裡何曾走却鼈舉臨濟示眾云我於先師處三度問佛法的的大意三度喫六十拄杖如蒿枝拂相似如今再思一頓誰為下手時有僧出云某甲下手濟拈棒度與僧擬接濟便打雪竇云臨濟放處較危收來太速師云說什麼放去較危收來太速須知臨濟有陷虎之機者僧未具透關眼待他道再思一頓誰為下手便與掀倒禪床非唯坐斷者老漢咽喉抑且出身有路舉欽山一日上堂竪起拳又開云開即為掌五指參差復握云如今為拳必無高下還有商量也無一僧出眾竪起拳山云你只是箇無開合漢雪竇云雪竇即不然乃竪起拳云握則為拳有高有下復開云開則為掌無黨無偏且道放開為人好把定為人好開也造車握也合轍若謂閉門造車出門合轍我也知你向鬼窟裡作活計師云展也不是掌握也不是拳兩頭俱坐斷一劍倚天寒且道還有為人處也無喝西風吹渭水落葉滿長安舉僧問睦州高揖釋迦不拜彌勒時如何州云昨日有人問趕出了也僧云和尚恐某甲不實那州云拄杖不在苕帚柄聊與三十雪竇云睦州只有受璧之心且無割城之意師云雪竇與麼批判深屈古人山僧道睦州和柈托出只是罕遇知音舉棗樹問僧近離甚處僧云漢國樹云漢國天子還重佛法也無僧云賴遇問著某甲問著別人即禍生樹云作箇什麼僧云人尚不見有何佛法可重樹云闍梨受戒多少時僧云二十夏樹云大好不見有人便打雪竇云者僧棒即喫要且去不再來棗樹令雖行爭奈無風起浪師云者僧句裡藏鋒棗樹棒頭有眼說什麼去不再來直須棒了出院舉趙州問婆子什麼處去婆云偷趙州笋去州云忽遇趙州時如何婆便掌州休去雪竇云好掌更下兩掌也無勘處師云將謂胡須赤更有赤須胡舉保壽開堂三聖推出一僧保壽便打三聖云恁麼為人瞎却鎮州一城人眼去在壽下座便歸方丈雪竇云保壽三聖雖發明臨濟正法眼藏要且只解無佛處稱尊當時者僧若是箇漢纔被推出便掀倒禪床直饒保壽全機也較三千里師云手眼通身拳躍相副保壽三聖固是作家若要發明臨濟正法眼藏直是未在雪竇道者僧若是箇漢便與掀倒禪床不是射鵰手徒說李將軍舉僧問無業如何是佛業云莫妄想雪竇云塞却鼻孔又僧問馬大師如何是佛祖云即心是佛雪豆云拄却舌頭師云塞却無業鼻孔拄却馬師舌頭還見雪豆麼有意氣時添意氣不風流處也風流舉德山因廓侍者問從上諸聖向什麼處去山云作麼作麼廓云勅點飛龍馬跛鼈出頭來山便休去至來日山浴出廓過茶與山山撫廓背一下云昨日公案作麼生廓云者老漢今日方始瞥地雪竇云然精金百煉須要本分鉗鎚德山既以己妨人者僧還同受屈以拄杖一畫云適來公案且置從上諸聖什麼處去大眾擬議一時打趂師云德山固是作家爐鞴本分鉗鎚爭奈廓侍者鍛過了底金從他以己妨人畢竟無屈可受靈岩與麼批判莫有為雪竇作主者麼舉保福簽瓜次太原孚上座到來保福云道得與你瓜喫孚云把將來福度瓜一片與孚孚接得便行雪竇云雖是死蛇解弄也活誰是好手者試請辨看師云猛虎口中奪食飢鷹爪下分餐太原較些子保福若具奔流度刃底手待伊擬接便與拋向背後看他把什麼蛇弄舉南泉示眾云道非物外物外非道趙州出問如何是物外道泉便打州云和尚莫錯打某甲向後錯打人去在泉云龍蛇易辨衲子難謾雪豆云趙州如龍無角似蛇有足當時不管盡法無民直須喫棒了趂出師云趙州物外相從善能回互南泉棒頭有準收放自由雪竇雖欲盡令而行未具辨龍蛇眼舉洞山到雲門門問近離甚處山云查渡門云夏在甚處山云湖南報慈門云幾時離彼山云八月二十五門云放你三頓棒山至來日却上問訊云昨日蒙和尚放三頓棒不知過在甚處門云飯袋子江西湖南使與麼去洞山於此大悟雪竇云雲門氣宇如王拶著便氷消瓦解當時若據令而行子孫也未到斷絕師云雲門買帽相頭雪竇因齋慶讚諸人要見洞山麼掀翻海岳求知己撥亂乾坤見太平舉馬祖因僧參乃畫一圓相云入也打不入也打僧便入祖便打僧云和尚打某甲不得祖靠拄杖休去雪竇云二俱不了和尚打某甲不得靠却拄杖擬議不來劈脊便打師云殺人刀活人劍舉興化問克賓維那云汝不久當為唱導之師賓云不入者保社化云會了不入不會了不入賓云總不恁麼化便打乃云克賓維那法戰不勝罸錢五貫設饡飯一堂至來日齋時興化自白椎云克賓維那法戰不勝不得喫飯即便出院雪豆云克賓要承嗣興化罸錢出院且置却須索取者一頓棒始得且問諸人棒既喫了作麼生索雪竇要斷不平之事今夜與克賓維那雪屈以拄杖一時打散師云興化全師出征克賓堅壁不戰及乎力盡技窮未免牽羊納璧雪豆要斷不平直為克賓雪屈會麼雖得一場榮刖却一雙足舉僧問長慶眾手淘金誰是得者慶云有伎倆者得僧云學人還得也無慶云大遠在雪豆代者僧當時便喝復云有伎倆者得一手分付有伎倆者不得兩手分付學人還得也無蒼天蒼天師云長慶和柈托出者僧當面蹉過雪豆忍俊不禁不免按牛頭喫草今日忽有問靈岩眾手淘金誰是得者只向他道物見主眼卓竪又問學人還得也無答云又爭怪得老僧舉大慈示眾云山僧不解答話只是識病時有僧出大慈便歸方丈雪竇云大凡扶竪宗教須辨箇得失且大慈識病不答話時有僧出便歸方丈雪竇識病不答話或有僧出劈脊便打諸方識病不答話有僧出必然別有長處敢有一箇動著大唐天子只三人師云雪竇可使千古流芳與且未得勦絕若據山僧見處直須打了拖出何故大海不宿死屍舉趙州到黃檗檗見來便閉却方丈門州於法堂上叫云救火救火檗便出擒住云道道州云賊過後張弓雲竇云直是好笑笑須三十年忽有箇衲僧問雪竇笑箇什麼笑賊過後張弓師云重門擊柝黃檗過於隄防齧鏃破關趙州慣得其便雖然兩不相傷笑破雪竇鼻孔舉僧問鏡清學人未達其源乞師方便清云是什麼源僧云其源清云若是其源爭受方便雪竇云死水裡浸却有什麼用處侍者問適來成褫伊清云無侍者云不成褫伊清云無侍者云和尚尊意如何清云一點水墨兩處成龍雪竇云猶較些子雪竇不是減鏡清威光要與者僧相見是什麼源其源三十年後與你三十棒師云鏡清一點水墨兩處成龍直得傾湫倒岳雲黯長空雪竇要減他威光與者僧相見且款款地山僧見處也要諸人共知是什麼源其源劈脊便棒直下悟去裂破古今舉僧問香林如何是衲衣下事林云臘月火燒山雪竇云臘月燒山萬種千般翹松鶴冷蹈雪人寒達磨不會大難大難師云大小香林答話也不了僧問衲衣下事却云臘月燒山累及後代兒孫築底分踈不下有問山僧如何是衲衣下事只向他道猶堪齋粥對賓客也勝時人著錦衣舉本仁示眾云尋常不欲向聲前句後鼓弄人家男女何故且聲不是聲色不是色時有僧問如何是聲不是聲仁云喚作色得麼僧云如何是色不是色仁云喚作聲得麼僧禮拜仁云且道與你說答你話若人辯得有箇入處雪竇云本仁也甚奇怪要且貪觀天上既非聲前句後且作麼生入師云雪竇也甚奇怪既非聲前句後作麼生不入舉雲門示眾云世尊生下一手指天一手指地周行七步目顧四方云天上天下唯吾獨尊當時若見一棒打殺與狗子喫却貴圖天下太平雪竇云便與掀倒禪床師云老胡傍若無人雲門一棒打著雪竇掀倒禪床正是助桀為虗舉國師三喚侍者雪竇云點即不到侍者三應雪豆云到即不點將謂吾孤負汝誰知汝孤負吾雪豆云謾雪竇不得雲門云作麼生是國師孤負侍者處會得也是無端雪竇云元來不會門云作麼生是侍者孤負國師處粉骨碎身未報得雪竇云無端無端師云有呼有應盖是尋常負汝負吾翻成特地雲門雲竇不識好惡吹毛求疵拈拄杖畫一畫云當門不用栽荊棘後代兒孫惹著衣復舉僧問投子國師三喚侍者意旨如何投子云抑逼人作麼雲竇云垛跟漢僧問興化化云一盲引眾盲雪竇云端的瞎僧問玄沙沙云侍者却會雪豆云停囚長智僧問趙州州云如人暗中書字字雖不成文彩已彰雪豆便喝僧問雪豆豆便打也要諸方檢點乃成頌云師資會遇意非輕無事相將草裡行負汝負吾人莫問任從天下競頭爭師云雪竇若無後語蹉過國師有僧問國師三喚侍者意旨如何師云年老心孤復成一頌國師年老覺心孤三度頻將侍者呼饒你粉身并碎骨不和酬得此恩無舉僧問智門如何是佛門云蹈破草鞋赤脚走僧云如何是佛向上事門云拄杖頭上挑日月雪竇云千兵易得一將難求師云驢作驢鳴犬作犬吠舉師祖問南泉摩尼珠人不識如來藏裡親收得如何是如來藏泉云王老師與汝往來者是藏雪竇云草裡漢祖云不往不來者泉云亦是藏雪竇云雪上加霜祖云如何是珠雪竇云險百尺竿頭作伎倆不是好手者裡著得箇眼賓主互換便能深入虎穴或不漝麼縱饒師祖悟去也是龍頭蛇尾漢師云南泉入草求人雪竇橫身虎穴且道師祖悟去畢竟承誰恩力者裡著得箇眼便見頭正尾正舉雪峯因僧禮拜峯打五棒僧云某甲有什麼過峯又打五棒雪竇云雪竇不曾與人葛藤前五棒日照天臨後五棒雲騰致雨你若辨得也好與五棒師云什麼處得者消息來山僧道前五棒是騎虎頭後五棒是收虎尾若人辨得領取雪竇五棒不干山僧事舉馬大師令智藏馳書上徑山山接書開見一圓相乃於中下一點封回國師聞舉云欽師猶被馬師惑雪竇云徑山被惑且致若將呈似國師別作箇什麼伎倆免被惑去有老宿云當時坐却便休亦有道但與畫被若與麼只是不識羞敢謂天下老師各具金剛眼睛廣作神通變化還免得麼雪竇見處也要諸人共知只者馬師當時畫出早自惑了也師云欽師被惑國師被惑天下老師被惑至於馬師自惑雪竇無不檢點得出且道雪竇還免得麼山僧到此大似醒人看醉人不覺手舞足蹈喝一喝舉鏡清問僧趙州喫茶去你作麼生會僧便出去清云邯鄲學唐步雪竇云者僧不是邯鄲人為什麼學唐步若辯得出與你茶喫師云鏡清親見者僧是邯鄲人雪竇因什麼道不是拈拄杖畫一畫云有口不得茶喫者多舉僧問雲門如何是法身向上事門云向上與你道即不難作麼生會法身僧云請和尚鑒云鑑即且置作麼生會法身僧云與麼與麼云者箇是長連床上學得底我且問你法身還喫飯麼僧無語雪竇云將成九仞之山不進一簣之土過在什麼處師云若論戰也箇箇力在轉處者僧眨得眼來槍頭早在雲門手裡直得上天無路入地無門雪竇更要進土在還委悉麼箭穿紅日影須是射鵰人舉趙州訪茱萸纔上法堂萸云看箭州亦云看箭萸云過州云中雪竇云二俱作家蓋是茱萸趙州二不作家箭鋒不相拄直饒齊發齊中也是射垛漢師云二老宿爾我同氣情均天倫自然手眼相似雪竇云直饒齊發齊中也只是射垛漢看則有分舉普化與臨濟一日同赴施主齋濟問毛吞巨海芥納須彌為復神通妙用為復法爾如然化躍倒飯床濟云太生化云者是甚所在說說細濟休去來日又同赴一施主齋濟復問今日供養何似昨日化又躍倒飯床濟云太麁生化云瞎漢佛法說甚麼麁細濟吐舌雪豆云兩箇老賊喫飯也不了好與二十棒棒雖行且那箇是正賊師云雪豆與麼道也好與二十棒且道過在什麼處不見道正賊走却邏蹤人喫棒舉三角示眾云若論此事眨上眉毛早是蹉過麻谷出云蹉過即不問如何是此事角云蹉過谷便掀倒禪床角便打雪豆云兩箇有頭無尾漢眉毛未曾眨上說什麼此事蹉過有僧問眉毛為什麼不眨上雪竇便打師云麻谷掀倒禪床三角便打作家作家眉毛為什麼不眨上雪竇便打作家作家前面作家自是麻谷三角後面作家自是雪竇者僧只今莫有欲知此事者麼時有僧出劈脊便打復問云作麼生是此事僧擬議師又打擲下拄杖分明記取舉似作家舉睦州喚僧大德僧回首州云擔板漢雪竇云睦州只具一隻眼者僧喚既回頭固甚却成擔板師云雪竇打失一隻眼者僧喚既回首却是睦州擔板舉岩頭參德山纔跨門便問是凡是聖德山便喝岩頭便禮拜洞山聞云不是奯公也大難承當岩頭聞云洞山老漢不識好惡我當時一手擡一手搦雪豆云然則德山門下草偃風行要且不能塞斷人口當時纔禮拜劈脊便棒非唯勦絕洞山亦乃把定奯老還會麼李將軍有嘉聲在不得封侯也是閒師云家肥生孝子國覇有謀臣雪竇云然則德山門下草偃風行要且不能塞斷人口當時纔禮拜劈脊便打非唯繅絕洞山亦乃把定奯老說得道理好歸依佛法僧舉巴陵示眾云祖師道不是風動不是幡動既不是風幡向什麼處著有人與祖師作主出來與巴陵相見雪竇云風動幡動既是風幡向甚麼處著有人與巴陵作主出來與雪竇相見師云為他閑事長無明舉則川與龐居士摘茶次士云法界不容身師還見我麼川云若不是老師洎答龐公話士云有問有答蓋是尋常川不管士云適來莫怪相借問麼川亦不管士云者無禮儀漢待我一一舉似明眼人去在川拈茶籃便歸雪竇云則川只解把定封疆不能同生同死當時好與捋下幞頭誰敢喚作龐居士師云說什麼捋下幞頭當時便與一蹈蹈倒莫道法界不容身要且覔起處不可得舉僧問雲門一言道盡時如何門云裂破雪竇彈指三下師云白雲萬里舉僧問睦州一言道盡時如何州云老僧在你鉢囊裡雪竇呵呵大笑師云大蟲褁紙帽舉本生以拄杖示眾云我若拈起爾便向未拈起時作道理我若不拈起爾便向拈起時作主宰且道老僧為人在什麼處時有僧出云不敢妄生節目生云也知闍梨不分外僧云低低處平之有餘高高處觀之不足生云節目上更生節目僧無語生云掩鼻偷香空招罪犯雪竇云者僧也善能切磋爭奈弓折箭盡然雖如此且本生是作家宗師拈起也天回地轉應須拱手歸降放下也草偃風行必合全身遠害還見本生為人處也無復拈拄杖云太平本是將軍致不許將軍見太平師云伎倆不如帳樣且道本生拄杖何似雪竇拄杖若也辨得天下橫行其或未然放在臥床頭急要打老鼠舉僧問雪峯聲聞人見性如夜見月菩薩人見性如晝見日未審和尚見性如何峯打三下其僧復問岩頭頭打三掌雪竇云應病設藥且與三下若據令而行合打多少師云前三後三應病與藥據令而行別有一著顧侍者云且道是什麼一著侍者擬議便打出舉太原孚上座參雪峯至法堂上顧視雪峯便下看知事雪竇云一千五百人作家宗師被孚上座一覰便高竪降旗孚至來日入方丈云昨日觸忤和尚峯云知是般事便休雲竇云果然僧問雲門作麼生是觸忤處門便打雪竇云打得百千萬箇有甚用處直是盡大地人喫棒方可扶竪雪峯且道太原孚具什麼眼師云眼眼相覰心心相知僧問雲門作麼生是觸忤處門便打棒頭有眼明如日雪竇云打得百千萬箇有甚用處要識真金火裡看舉安國問僧得之於心伊蘭作旃檀之樹失之於旨甘露乃蒺䔧之園我要箇語具得失兩意僧竪起拳云不可喚作拳頭國云只為喚作拳頭雪竇云無繩自縛漢拳頭也不識師云我不似安國論得論失一語兩意拈拄杖我此拄杖能殺能活活中有殺殺中有活或則殺活同時或則殺活不同時若善用去世出世間無法不備便乃縱奪可觀卷舒無礙若用不得總是無繩自縛舉僧請益雲門玄沙三種病人話門云你禮拜著僧禮拜起門以拄杖便挃僧退後門云你不是患盲復喚近前來僧近前門云你不是患聾門云還會麼僧云不會門云你不是患啞僧於此有省雪竇便喝云者盲聾瘖啞漢若不是雲門驢年去如今有底或拈槌竪拂不管教近前又不來還會麼不應諸方還奈何得麼雪竇若不奈何爾者一隊驢漢又堪作箇什麼以拄杖一時打趂師云玄沙點出三種證候雲門一試九轉還丹幸自可憐生然而病久多變雪竇早是不奈何山僧今日不免作死馬醫去也竪起拂子召眾云者裡悟去合眼可見塞耳可聞閉口可說三十年後不得道佛法無靈驗舉僧問香嚴如何是王索仙陀婆嚴云過者邊求雪竇云鈍置殺人僧問趙州王索仙陀婆時如何州曲躬叉手雪竇云索鹽奉馬師云雪竇只知有王索仙陀婆不知蹉過二員古佛有問山僧如何是王索仙陀婆只向他道退後退後舉鼓山示眾云若論此事如一口劍時有僧問承和尚有言若論此事如一口劍和尚是死屍學人是死屍如何是劍山云拖出者死屍著僧應諾歸衣鉢下打疊便行山至晚問首座問話僧在否座云當時便去也山云好與二十棒雪竇云諸方老宿總道鼓山失却一隻眼殊不知重賞之下必有勇夫雖然如此若子細點檢來未免一時埋却師云吹毛在握遍界氷霜者僧忘軀敢衝雪刃可惜不斬作兩段却向賊過後張弓雪竇雖則一手擡一手搦也只是箇舁死屍漢舉睦州問武陵長老了即毛吞巨海始知大地一微塵作麼生云和尚問誰云問長老云何不領話云我不領爾不領雪竇云墮也墮也復云者葛藤老漢好與畫斷拈拄杖云什麼處去也師云赤洪崖打白洪崖雪竇要畫斷者葛藤墮也墮也舉仰山坐次大禪佛到翹一足云西天二十八祖亦如是唐土六祖亦如是和尚亦如是某甲亦如是山下禪床打四藤條雪竇云藤條未到折因什麼只打四下須是箇斬釘截鐵漢始得大禪佛後到霍山自云集雲峯下四藤條天下大禪佛參山云打鐘著禪便走雪竇云者漢見幾而作爭奈有頭無尾師云小釋迦不能把斷牢關致令者漢擔四藤條到處賣弄不是霍山幾被打破蔡州雪竇云藤條未到折因甚麼只打四下識甚好惡舉玄沙與天龍入山見虎龍云前面是虎沙云是汝雪竇云要與人天為師前面端的是虎師云天龍是虎玄沙是汝大小雪竇要與人天為師別作箇眼始得舉南泉山下有一菴主行脚僧經過謂菴主云近日南泉和尚出世何不去禮拜主云非但南泉直饒千佛出世亦不能去泉聞令趙州去看州見便禮拜主不管州從西過東主亦不管州又從東過西主亦不管州云草賊大敗拽下簾子便行歸舉似南泉泉云從來疑著者漢雪豆云大小南泉趙州被箇擔板漢勘破了也師云渾鋼打就生鐵鑄成雪竇云大小南泉趙州被箇擔板漢勘破只知開口易不覺舌頭長敢謂天下宗師不消此老一覰舉僧問風穴語默涉離微如何通不犯穴云常憶江南三月裡鷓鴣啼處百華香雪竇云曾有人問雪竇對他道劈腹剜心又且如何復云因風吹火別是一家傷鼈恕龜必應有主師云不涉離微全超語默鷓鴣啼處令人憶劈腹剜心露一機別是真人好消息還見二老宿麼拈起少林無孔笛夜深吹過汨羅灣舉岩頭雲峯欽山到德山欽問天皇也漝麼道龍潭也漝麼道未審德山作麼生道山云爾試舉天皇龍潭底看欽擬議山便打欽被打歸延壽堂云是即是打我太殺岩云爾恁麼他後不得道見德山雪竇云諸禪德欽山致箇問頭甚是奇特爭奈龍頭蛇尾爾試舉天皇龍潭底看坐具便摵大丈夫漢捋虎須也是本分他既不能德山令行一半令若盡行雪峯岩頭總是涅槃堂裡漢師云三人行必有一智欽山既道不得雪峯岩頭還道得麼道得道不得即且置雪豆道德山令行一半令若盡行雪峯岩頭總是涅槃堂裡漢只如雪竇還免得也無舉僧問智門如何是般若體門云蚌含明月僧云如何是般若用門云兔子懷胎雪竇云非惟把定世界亦乃安怗家若善能參詳便請丹霄獨步師云蚌含明月兔子懷胎什麼處得者消息來把定世界安怗家且信一半舉烏臼因玄紹二上座到臼云二禪伯近離甚處僧云江西臼便打僧云久聞和尚有此機要臼云爾既不會第二箇近前來僧擬議臼亦打云同坑無異土參堂去雪竇云宗師眼目須至恁麼如金翅擘海直取龍吞有般漢眼目未辨東西拄杖不知顛倒只管說照用同時人境俱奪師云烏臼當軒據坐正令方行者僧自遠趨風𢬵得喫棒若是慣戰作家何處有烏臼也更若未會看取雪竇葛藤舉僧辭大隋隋問甚處去僧云峨眉禮拜普賢去隋竪起拂子云文殊普賢總在者裡僧畫一圓相拋向背後隋云侍者將一帖茶與者僧雲門別云西天斬頭截臂者裡自領出去雪竇云殺人刀活人劍具眼底辯取師云文殊普賢總在者裡大隋只為慈悲之故有落草之談僧畫圓相拋向背後咄者死蝦蟇隋云侍者將一帖茶與者僧是何心行雲門別云西天斬頭截臂者裡自領出去雪上加霜雪竇云殺人刀活人劍好手鑑不出舉雪峯問僧見說大德曾為天使來是否僧云不敢峯云爭解與麼來僧云仰慕道德豈憚關山峯云你猶醉在出去僧便出峯乃召大德僧回首峯云是什麼僧亦云是什麼峯云者漆桶僧無語峯却顧謂鏡清云好箇師僧向漆桶裡著到清云和尚豈不是據款結案峯云也是我尋常用底忽若喚回是什麼被他道者漆桶又作麼生清云成何道理峯云我恁麼及伊你又道據款結案他與麼及我你又道成何道理一等是恁麼時節其間有得不得清云不見道醍醐上味為世所珍遇此之人翻成毒藥雪竇云看他父子相投言氣相合知之者謂粉骨碎身此恩難報不知者謂扶高抑下臨危悚人毒藥醍醐千載龜鑑還會麼者漆桶師云者僧親為天使來無端撞在漆桶裡雪峯鏡清素稱敏手要且救他不出毒藥醍醐千載龜鑑不是知心者徒勞話歲寒舉僧問大梅如何是祖師西來意梅云西來無意僧舉到鹽官官云一箇棺材兩箇死漢玄沙聞舉云鹽官是作家雪竇云三箇也得師云螳蜋捕蟬舉雲門問新羅僧你是甚處人云新羅人門云將什麼過海僧云草賊大敗門云為什麼在我手裡僧云恰是門云一任𨁝跳雪豆云雲門老漢龍頭蛇尾放過者僧為什麼在我手裡恰是劈脊便打師云者僧過得海來恰值落在雲門手裡雪竇推波助瀾可謂小出大遇舉北禪問僧近離甚處僧云黃州禪云夏在甚處僧云資福禪云福將何資僧云兩重公案禪云爭奈在我手裡僧云在手裡則收取禪便打者僧不甘隨後趂出雪竇云奇怪宛有超師之作還知者僧麼只解瞻前不能顧後若在雪竇手裡棒折也未放在師云一不做二不休打人須是鉄拳頭舉睦州示眾云我見百丈不識好惡大眾方集以拄杖一時打散復召大眾眾回首丈云是什麼有什麼共語處黃檗和尚大眾方集以拄杖一時打下復召大眾眾回首檗云月似彎弓小雨多風猶較些子雪竇云說什麼猶較些子直是未在若據雪竇眾集一時打下便休或有箇無孔鐵槌為眾竭力善能擔荷可以籠古今乾坤把斷驀拈拄杖云放過一著師云三段不同收歸上科舉玄沙見鼓山來作一圓相山云人人出者箇不得沙云情知你向驢胎馬腹裡作活計山云和尚又作麼生沙云人人出者箇不得山云和尚與麼道得某甲為什麼不得沙云我得汝不得雪竇云只解貪觀白浪不知失却手橈師云道得也出者箇不得道不得也出者箇不得貪觀白浪失却手橈閑言語舉南泉示眾云王老師賣身去也還有人買麼一僧出眾云某甲買泉云不作貴不作賤作麼生買僧無語臥龍代云和尚屬某甲禾山云是何道理趙州云明年與和尚做一領布衫雪竇云雖則作家競買要且不解輸機且道南泉還肯麼雪竇也擬酬箇價直令南泉進且無門退亦無路不作貴不作賤作麼生買別處容和尚不得師云南泉善賣雪竇善買牙保不來只成賒話不作貴不作賤遇物應緣乘巧便流出天涯也可憐不如且在家中轉咄舉茱萸把一橛竹上堂云莫有虗空裡釘得橛者麼時有靈虗上座出云虗空是橛萸便打虗云莫錯打某甲萸休去雪竇云若要此話大行直須打了趂出師云茱萸空中釘橛靈虗旱地遭釘雪竇不管盡法無民只要話行千古檢點將來總是一隊掠虗漢舉夾山與定山同行言話次定云生死中無佛則無生死夾云生死中有佛則不迷生死互相不肯同上大梅相見了具說前事梅云一親一疎夾問那箇親那箇疎梅云且去明日來夾至來日又問未審那箇親梅云親者不問問者不親夾山住後云我當時在大梅失却一隻眼雪竇云夾山畢竟不知換得一隻眼大梅老漢當時聞舉若以棒一時打出豈止畫斷兩人葛藤亦乃天下宗匠師云夾山失却隻眼住後方知雪竇畫斷葛藤作得天下宗匠雖然李將軍有佳聲在不得封侯也是閑舉僧問保福雪峯平生有何言句得似羚羊掛角時福云我不可作雪峯弟子不得雪竇云一千五百箇布衲保福較些子師云做得雪峯弟子則不無要見羚羊掛角三生六十劫舉僧問長慶羚羊未掛角時如何慶云草裡漢僧云掛角後如何慶云亂叫喚僧云畢竟如何慶云驢事未去馬事到來雪竇云寧可碎身如微塵終不瞎箇眾生眼長慶較些子復云一般漢設使羚羊未掛角也似萬里望鄉關師云長慶恁麼答話瞎却天下人眼去在雪竇道終不瞎箇眾生眼萬里望鄉關舉僧問巴陵祖意教意是同是別陵云雞寒上樹鴨寒下水僧問睦州祖意教意是同是別州云青山自青山白雲自白雲雪竇云問既一般答亦相似其中有利他自利瞞人自瞞若點撿分明管取解空第一師云雞寒上樹鴨寒下水青山嵯峨白雲澹泞祖意教意在什麼處若約撿點分明有利無利不離行市舉趙州示眾云今夜答話去也有解問者出來時有僧出州云比擬拋塼引玉引得箇墼子法眼遂乃舉問覺鐵觜先師意作麼生覺云如國家拜將乃問甚人去得時有人出云某甲去得須云汝去不得法眼云我會也雪竇云靈利漢聞舉便知落處然雖如是放過覺鐵觜夫宗師語不虗發出來必是作家因什麼拋塼引墼諸禪德要識趙州麼從前汗馬無人識只要重論蓋代功師云覺鐵觜名喧宇宙拶著便作屎臭氣人問拋塼引墼便謂如國家拜將當時法眼若解拈出本分草料何止清風萬里雪竇云靈利漢一舉便知落處豈堪共語然雖如是放過覺鐵觜賴有此語舉耽源辭國師歸省馬祖於地上作一圓相展坐具禮拜祖云你欲作佛去源云某甲不解揑目祖云吾不如汝雪竇云然猛虎不食其子爭奈來言不豐諸人要識耽源麼只是箇藏身露影漢師云耽源歸省献箇胡餅馬祖䑛犢自不勝情雪竇云然猛虎不食其子爭奈來言不豐撿點將來恰蹈著耽源影子舉溈山問仰山甚處來仰云田中來溈云田中多少人仰插鍬叉手而立溈云南山大有人刈茅仰拔鍬便行玄沙云我當時若見蹈倒鍬子鏡清云不奈船何打破戽斗僧問明招古人意在插鍬處叉手處招喚某甲僧應諾招云還曾夢見仰山麼雪竇云諸方咸謂插鍬話奇特也大似隨邪逐惡若據雪竇見處仰山被溈山一問直得草繩自縛去死十分師云溈仰父子一問一答未見誵訛却是玄沙無風起浪鏡清云不奈船何打破戽斗一波纔動萬波隨不是明招捋下面皮未免總死在鍬子下雪竇云仰山被溈山一問直得草繩自縛去死十分咄以己妨人舉玄沙問僧近離甚處僧云瑞巖沙云瑞巖有何言句僧云常喚主人公自應諾惺惺著他後莫受人謾沙云一等是弄精魂也甚奇怪沙云何不且在彼中住僧云已遷化也沙云如今還喚得應麼僧無語雪竇云蒼天蒼天師云者僧只是接響承虗道聽途說若親從瑞巖來因甚喚不應雪竇云蒼天蒼天東家人死西家助哀舉雪峯問僧近離甚處僧云覆船峯云生死海未度為什麼覆却船僧無語雪竇代云久嚮雪峯侍者老漢擬議拂袖便行其僧歸舉似覆船船云何不道渠無生死僧再到雪峯舉此話峰云此不是你語僧云是覆船恁麼道峯云我有二十棒寄與覆船二十棒老僧自喫不干闍梨事雪竇云能區能別能殺能活若人辨得天下橫行師云雪峯善問覆船善答者僧有馳達之勞也合與二十棒還委悉麼不因楊得意爭識馬相如舉德山圓明示眾云但有問答只竪一指寒則普天普地寒雪竇云什麼處見俱胝老熱則普天普地熱雲竇云莫錯認定盤星森羅萬象徹下孤危大地山河通上險絕甚處得一指頭禪師云圓明借手行拳雪竇捕風追電畢竟俱胝老子不在一指頭邊舉僧問南院從上諸聖什麼處去院云不上天堂即入地獄僧云和尚又作麼生院云還知寶應老落處麼僧擬議院以拂子驀口打復喚僧近前云令合是你行又打一拂子雪竇云令既自行且拂子不知來處雪竇道箇瞎且要雪上加霜師云南院有不犯之令者僧無自全之䇿雪竇道箇瞎天堂未就地獄先成舉保福問長慶盤山道光境俱亡復是何物洞山道光境未亡復是何物據二老宿總未得勦絕作麼生道得勦絕去慶良久福云情知爾向鬼窟裡作活計慶云你又作麼生福云兩手扶犁水過膝雪竇云俱亡未亡總由我保福因甚麼道未得勦絕灼然能有幾箇諸人又作麼生道免得長慶在鬼窟裡雪竇云柳絮隨風自西自東師云俱亡未亡不離光境盤山洞山總未勦絕長慶鬼窟保福泥犁雪竇風絮自東自西者一隊漢鼻孔索頭盡在山僧手裡一任橫拖倒拽無人知此意雞向五更啼舉大梅聞鼯鼠聲云即此物非他物善自護持吾今逝矣雪竇云者漢生前莾鹵死後顢頇即此物非他物是何物還有分付處也無有般漢不解截斷大梅脚跟只管道貪程太速師云大梅平生脊梁硬似鐵末後向鼯鼠聲中全然放倒雪竇不辯端倪却道還有分付處也無更要截斷他脚跟彌勒下生去舉雪峯示眾云望州亭與汝相見了也烏石嶺與汝相見了也僧堂前與汝相見了也保福問鵝湖僧堂前且置望州亭烏石嶺什麼處相見湖驟步歸方丈福便乃入僧堂雪竇云二老宿是即是只知雪峯放行不知雪峯把定忽有箇衲僧出問未審雪竇作麼生豈不是別機宜識休咎底漢還有望州亭烏石嶺相見底衲僧麼良久云擔板禪和如麻似粟師云我要問雪峯除却望州亭烏石嶺僧堂前什麼處不是相見處我要問雪竇什麼處是雪峯把定放行古人且置即今作麼生設有一箇半箇別休咎識機宜豈不是為眾竭力其或未然只知事逐眼前過不覺老從頭上來舉趙州問大慈般若以何為體慈云般若以何為體州呵呵大笑至來日州掃地次慈却問般若以何為體州放下掃帚呵呵大笑雪竇云前來也笑後來也笑笑中有刀大慈還識麼直饒識得也未免喪身失命師云是精識精是賊識賊又云識得不為冤舉德山一日飯遲托鉢過堂雪峯見云者老漢鐘未鳴鼓未響托鉢向什麼處去山便歸方丈雪峯舉似巖頭頭云大小德山不會末後句山聞令侍者喚來頭至方丈問爾不肯老僧那頭遂密啟其意山至來日上堂與尋常不同頭於僧堂前撫掌大笑云且喜老漢會末後句他後天下人不奈何雖然如是也只得三年活明招代德山云咄咄咄沒處去沒處去雪竇云曾聞說獨眼龍元來只有一隻眼殊不知德山是箇無齒大蟲若不是巖頭識破爭得明日與昨日不同諸人要會末後句麼只許老胡知不許老胡會師云末後一句始到牢關把斷要津不通凡聖巖頭密啟其意赤土塗牛嬭明日上堂與昨日不同疑殺天下人殊不知德山年老成魔不是巖頭領過莫道三年遷化更三十年也死未得在明招代云咄咄咄沒處去沒處去知心能幾人雪竇云德山是箇無齒大蟲若不是巖頭識破爭得明日與昨日不同閉門不造車出門自合轍諸人要會末後句麼海枯終見底人死不知心舉雪峯一日見獼猴乃云者獼猴各背一面古鏡三聖便問歷劫無名何以章為古鏡峯云瑕生也聖云一千五百人善知識話頭也不識峯云老僧住持事煩雪竇云好與二十棒者棒放過也好免見將錯就錯師云前箭猶自可後箭射人深舉僧問國師如何是本身盧舍那國師云與老僧過淨缾來僧將到淨缾國師云却安舊處著僧安舊處復來問如何是本身盧舍那國師云古佛過去久矣雲門云無朕迹雪竇云直得一手指天一手指地爭得無還會麼雲在嶺頭閑不徹水流㵎下太忙生師云國師不得雲門洎好勞而無功總似雪竇未免白日見鬼如今有問山僧如何是本身盧舍那只向他道一氣不言含有象萬靈何處謝無私舉僧門洞山時時勤拂拭莫遣惹塵埃為什麼不得他衣鉢山云直饒道本來無一物也未合得他衣鉢且道什麼人合得僧下九十六轉語皆不契末後云直饒將來他亦不受山深肯雪竇云他既不受是眼將來底必應是瞎還見祖師衣鉢麼若於此入門便乃兩手分付非但大庾領頭一箇提不起設使闔國人來且款款將去師云者僧下九十六轉語正是九十六種外道末後道設使將來他亦不受稍有衲僧氣息雪竇云他既不受是眼將來底必應是瞎還見祖師衣鉢麼若於此入門便乃兩手分付話作兩橛非但大庾嶺頭一箇提不起設使闔國人來且款款將去救得一半舉僧問投子依俙似半月彷彿若三星乾坤收不得師於何處明子云道什麼僧云想師只有湛水之波且無滔天之浪子云閑言語雪竇云投子古佛不可道不知撿點將來直是天地懸隔纔問便和聲打師云投子放頑天下人不奈何雪竇據令未免犯鋒傷手舉洛浦久為臨濟侍者到夾山問自遠趨風乞師一接山云目前無闍梨此間無老僧浦便喝山云住住且莫草草怱怱雲月是同溪山各異坐斷天下人舌頭即不無爭教無舌人解語浦無對山便打雪竇云者漢可悲可痛鈍置他臨濟他既雲月是同我亦溪山各異說什麼無舌人不解語坐具劈口便摵夾山若是箇知方漢必然明窻下安排師云洛浦未出臨濟門氣吞宇宙及至夾山面前直是展手不得似者般漢不打更待何時雪竇云者漢可悲可痛鈍置他臨濟他既雲月是同我亦溪山各異說什麼無舌人不解語坐具劈口便摵見事不平爭忍得衲僧正令自當行舉三聖問雪峯透網金鱗以何為食峯云待汝出得網來却向汝道聖云一千五百人善知識話頭也不識峯云老僧住持事煩雪竇云可惜放過好與二十棒者棒一棒也饒不得只是罕遇作家師云三聖固是透網金鱗爭奈雪峯釣鼇手段聖云一千五百人善知識話頭也不識等閑擺動三山峯云老僧住持事煩坐得船頭穩當雪竇云可惜放過好與二十棒喝小神作麼舉伏牛為馬祖馳書到國師處國師問馬祖有何言句示人牛云即心是佛國師云是什麼語話良久再問更有什麼言句牛云不是心不是佛不是物國師云猶較些子雪竇代云當時便喝牛却問和尚此間如何示人國師云三點如流水曲似刈禾鎌雪竇云是什麼語話也好與一拶見之不取千載難忘師云伏牛也不虗行既識國師又識馬祖雪竇下者兩著不妨好手爭奈落在國師彀中具眼者辯取舉玄沙問鏡清我不見一法為大過患爾道不見什麼法清指露柱云莫是不見者个法麼沙云浙中清水白米從爾喫佛法則未在雪竇云大小鏡清被玄沙熱謾我當時若見但只向道靈山授記也未到如此師云雪竇只知鏡清被玄沙熱謾不知玄沙被鏡清熱謾靈山授記也未到如此謾自己不過舉先報慈問僧近離甚處僧云臥龍慈云在彼多少時僧云經冬過夏慈云龍門無宿客為什麼在彼許多時僧云師子窟中無異獸慈云爾試作師子吼看僧云若作師子吼即無和尚慈云念汝新到且放三十棒雪竇云奇怪諸禪德若平展則兩不相傷據令則彼此俱險還點撿得出麼師云真師子兒善師子吼慈云念汝新到且放三十棒作家宗師天然有在雪竇云平展則兩不相傷據令則彼此俱險鈎在不疑之地舉船子云千尺絲綸直下垂一波纔動萬波隨夜靜水寒魚不食滿船空載月明歸雪竇云者漢勞而無功忽若雲門道一句合頭語萬劫繫驢橛又作麼生免此過良久云莫謂水寒魚不食如今釣得滿船歸師云不貪香餌味可謂碧潭龍雪竇云莫謂水寒魚不食如今釣得滿船歸跛鼈盲龜有甚用處舉投子問巨榮禪客老僧未曾有一言半句掛諸方耳目何用要見老僧僧云到者裡不施三拜要且不甘子云出家兒得與麼沒記僧遶禪床一帀而出子云有眼無耳朵六月火邊坐雪竇云也不得放過纔轉便與擒住便喝云是誰不甘若跳得出不妨是一員衲僧師云老僧未有一言半句掛諸方耳目何用要見老僧是何相待僧云到者裡不施三拜要且不甘出乎爾反乎爾出家兒得與麼沒記靠倒者僧僧遶禪床一帀而出若是德山臨濟棒折也未放在雪竇云也不得放過纔轉便與擒住喝云是誰不甘若跳得出不妨是一員衲僧識甚好惡舉祖師道六塵不惡還同正覺雪竇云拄杖子是塵有什麼過過既無應合辯主所以道糞掃堆頭丈六金身拈向一邊赤肉團上壁立千仞又放過一著直饒八面四方正好連架打師云聞見覺知無障礙聲香味觸常三昧穿却祖師鼻孔換却雪竇眼睛莫有喫得棒底漢麼靠拄杖放過一著舉古云眼裡著沙不得耳裡著水不得有般漢信得及把得住不受人謾祖佛言教是什麼熱椀鳴聲便請高掛鉢囊拗折拄杖管取一員無事道人又古云眼裡著得須彌山耳裡著得大海水一般漢受人商量祖佛言教如龍得水似虎靠山却須挑起鉢囊橫擔拄杖亦是一員無事道人復云恁麼也不得不恁麼也不得然後沒交涉三員無事道人中要選一人為師師云高掛鉢囊拗折拄杖未是無事道人挑起鉢囊橫擔拄杖亦未是無事道人與麼也不得不恁麼也不得然後沒交涉亦未是無事道人一即三三即一木馬火中嘶黃昏後日出喝一喝
