同一笑也老向荒郊學種禾不愁不奈祖庭何三吳旺化逢禪月一國宗風得鳥窠書外有言皆藥石胸中無地著干戈盡知師叔無禪道打鐵為船理則那異畒重觀合穗禾不知談笑入無何主賓道協寧存跡凡聖情忘自脫窠雷動九淵摩竭令日回三舍魯陽戈瀑花飛作懸河辨驚倒龍湫諾詎那松月翁佛生成道涅槃栴檀像觀音五偈善禪人求和佛佛同生是此朝衆生與佛本非遙不能自用香湯沐却把渠來惡水澆悉達打頭呈伎倆雲門好棒出心苗驚天動地男兒事金屋休誇貯阿嬌自從嚴駕越春城六載深山志始平佩項圓光銀漢月通身寒露玉壺氷河沙三昧同時證剎海真乘一道登末法師僧不知有假衣求食謾騰騰大哉無上涅槃門本自無亡豈有存法眼親傳飲光勝宗風不墜釋迦文窮玄極妙流聲教續𦦨聯芳在嫡孫打破虗空求影跡分明一棒一條痕優填只在世情間真佛何嘗去不還相好儼然如滿月雕餿剛爾費沈檀未曾舉手功全著才涉思惟見不寬古往今來同一日煌煌一座紫金山百寶莊嚴妙色身為依為蔭亦侯旬聞思修是三摩地悲智行為千輻輪說法自來空物我散華隨處擁天神圓通境界無關鑰小白香飄海岸春送可上人歸省隆教古鼎圓顱稱釋子難遇是明師鉢水投針處須彌輥芥時無心同鏡像脫頴見囊錐豈謂南詢後重安眼上眉次韻答伯儀張教授危言竦縉紳真氣掃邪氛未展圖南翮先空冀北群尋僧言大道渡水到深雲三教從何立窮源自不分贈岡書記一字不著畫相看眼似眉難教夫子會只許老胡知文彩全彰處機輪妙轉時十方俱一照石火太遲遲贈端禪人默蓮經掩卷轉蓮華寧論歲月賒未明窮子喻難到法王家雨露無高下根莖有等差頭頭開示處功行幾恆沙次韻送心侍者欲作宗門客先須發大心苟非師子吼那副象王任著著超方處頭頭顯妙音豁開行腳眼山海未高深和晦機和尚韻贈定上人大海波心立千峯頂上行胸襟無日月手面有權衡梅柳春光動湖山雪意晴那伽定中句全死又全生和松月法兄韻送明首座遊五臺蹈著臺山路真成汗漫遊劍眉何凜凜殺氣只浮浮可數無餘子難當這一頭曹溪好風月碧淨冷涵秋次韻送阜上人一日復一日千山又萬山要明心地印須透祖師關道韻誰堪並塵緣自絶攀權衡俱在手應笑管窺斑送顯維那禮五臺驀直臺山路誰誇陷虎機未言先勘破携手即同歸師子空中現頻伽腳下飛天華政多事繚亂撲禪衣次韻贈蔣山輔侍者不住朝廷寺間居近道傍依然遇賓客顛倒著衣裳況爾鍾山至難將北斗藏鷹窠出威鳳談笑發天香送緣藏主之金陵息菴息不盡又欲去金陵宇宙空雙眼江山老一藤發揮無盡藏紹續祖師燈莫學暹禪者無言戀碧層示昂禪人要明行腳事不用別馳求滅得偷心盡方知道念周蕩蕩空三際昂昂出一頭懸崖能撒手脫體更風流次韻贈志侍者把住犀牛扇堪稱席上珍莫為斷佛種須作利生因百煉金除礦重磨鏡絶塵飄然來又云一箇自由身次韻贈本侍者啐相投處難教子母知斯須能不異遠大始堪期自信皆由我群居更問誰八紘雲散後一月正流輝次韻送宗侍者再參蔣山大法宜修學明師勿久離須知末後句不是最初機掛拂遭呵處升堂卷席時紙衣抄不到携手孰同歸次韻送檀維那道人曾法戰叱咤破金城去就鴻毛重勛名海嶽輕瓶盂過擕李節候近清明百越三台路徜羊不計程次韻悼感聖雲菴之子喜不兼持身只守謙開門臨野水為客卷踈簾古寺如風穴宗乘繼此菴話頭元自在今後許誰拈行腳走三千探珠下九淵倒拈苕帚柄痛掃野狐禪已辦今生事還思未了緣老胡真軌在挈履過西天未來先寄信欲去又牽衣白髮憐吾老朱顏借爾輝有懷弘道統無命與時違千聖頭邊路還同把手歸勉菴贈邵上人要會此門風須憑䇿勵功孜孜忘早夜矻矻感秋冬自棄溝中斷相成爨下桐一拳活業千古繼先宗鈍潛贈頴上人鋒芒都去盡似兀又如癡萬境不相到一真聊自怡忘機猶罔象藏密是便宜自昔知音者獨存王老師次蔣山正宗韻送琦侍者扇破索牛兒千鈞弩發機正宗誰復論秋月自揚輝砧杵千家動雲天一鴈歸西川回未得易服問東崎竺元和尚山謳四首壽藏主求和投老無所營身安萬事足雖承教外傳還把楞伽讀東峯多土酥西塢富溪蔌一飽謝塵世焉用銜花鹿茫茫六合中箇箇無非客一人萬夫敵六馬御朽索魯陽不揮戈白日即西落咄哉老趙州八十方行腳我有無絃琴中含太古音豈無少林曲不入時人心白鶴千年歸丹鳳一日吟嗟嗟精衛子弗顧滄海深我有無孔笛有口誰解吹吹者不易得聽者誠難知空山晝寂寂草座春依依一箇黃栗留啼上高高枝禮應菴祖塔不受雲居腦後錐却來虎穴奮全威關情最是梅陽老遙付楊岐五世衣禮大梅祖塔爛梅無色又無香碎嚼猶堪誑老龐劄定馬師三寸舌倒流東海入西江和皎首座雜言韻一靈不昧古猶今妄想塵塵自陸沉合浦明珠生蚌腹凉秋白月到天心得失雙忘語意真當機拶倒主空神千門萬戶無關鑰八臂那吒現半身送光知客歸雙溪入門深已辨來風莫是機先有路通後夜雙溪弄明月却疑身在水晶宮悼報國希白和尚無常既到趣行裝浴罷更衣即坐亡潮落海門新月上不知全體露堂堂大涅槃城此日開廓周沙界淨無埃為人方便知多少親切無如者一回四大分飛五蘊空此時端可定綱宗廣長舌相吞寰海伸出炎炎火聚中送德茂鑑三禪人禮祖湘南潭北路悠悠不若春風百草頭後夜匡廬看瀑布大江如練月如鈎五葉流芳滿大唐黃金靈骨轉難藏鐵鍬正好頻提挈休問湖南堠子長祖師靈骨遍乾坤一段光明徹曉昏鑑在機先如不會却成容易上人門和竺元和尚間居雜言韻童子南詢錯較量又尋初友見清凉眼睛只在眉毛下庭際春深草自長于時無夢老巖房問道何須太著忙據令提綱成特地聽他梁燕說真常世路難行滑似苔山居容易得心灰時人自是不肯到老子柴門終日開寒山拾得是勍敵百靈龐老非同參雲自高飛水自下馬頭向北牛頭南皮髓碎分憐鼻祖箭鋒相拄笑三平八坳九垤山中路只許孤雲管送迎金剛正印獨心傳不在威音大劫前數筆遠山滄海日一溪流水緑楊煙拾枯煮雪烹月團博山煙細瓷甌圓香嚴大仰小伎倆原夢直到溈山前示僧六十蒿枝痛不痕攔腮一掌為知恩虎頭虎尾齊收處三世如來總滅門送僧雪曲陽春調未高海天空闊看鯨濤轉身蹈著通玄頂八十翁翁著繡袍形山有寶莫他求坐斷乾坤百念休飛瀑界開千丈石亂雲堆裡看龍湫馬師一口吸西江昨夜三更月到窗懶瓚巖前黃獨火春風吹長葛藤樁廬山山下大江橫帆飽東風水正生窣堵波中無佛祖虗空背上有人行今無受也昔無傳一句全超曠劫前未入門時先辨的大江煙水碧連天次韻悼華頂無見和尚世出世間無別法涅槃生死豈殊途祥鱗掣斷黃金鎖萬里長空桂魄孤短髮𣯶𣯶耿夜光身前身後總堪傷頂王三昧無人見空使波旬笑一場海天空闊暮雲低華頂峯高北斗齊月照石床群動息夜深還聽木雞啼擊碎渾崙吐又吞此時消息許誰論霜鯨喚醒輪迥夢業海無邊佛本根送魁藏主歸省竺元和尚鄮嶺真傳一暮翁擘開千嶂倚長松羚羊掛角無蹤跡逐塊韓獹豈易逢根塵脫盡耀靈光日用何曾有覆藏路入籜峯三月盡好風吹綻百華香送靜維那歸越上三過堂前法戰回鑑湖風月擁高臺水華不著間塵上還許青山送影來析玉峯講主送小師皓侍者偈教門深廣若塵沙說妙談玄路轉差凡聖兩忘知見盡大千都是法王家容易如何得到家百城煙水渺無涯腳跟未動筍鞋破凉月正高松影斜子去要須明直指即是杪欏塔廟東拈起別峯相見事講臺華雨正濛濛靈山只是笑拈華出窟金毛弄爪牙辟歷一轟天地黑坐觀巖電掣金蛇送相胤慧明四禪人之金陵寶珠峯下是金陵煙水遙連鐵甕城今古幾多興廢事江山無口為君評百尺層臺古意深隔江煙靄暮沉沉鳳皇不作梧桐老疲馬自嘶楊柳陰真慧華敷覺苑春月林星渚淨無塵世波不動安禪石雲葉偏隨自在身道過雪竇不歸鄉強項仍饒硬脊梁落日古臺三百尺六朝煙樹蒼蒼送炬禪人歸省瑞岩萬里惺惺石上舊因緣落在闍梨父子邊九萬里程歸一瞬海天霜夜月孤圓次韻示興平二禪客當機突出句中玄語默商量總未然推倒門前案山子閻浮樹在海南邊擬報人間兩不平腳跟正好喫烏藤春光只在梅花上何用重敲火裡氷病中病無起處藥無靈四壁秋聲獨照燈五濁世中安樂法分明說與枕頭聽𮌎中不著元字腳室內自生金色光三際湛然諸境寂屋頭風撼鐵琅璫追和西丘太師祖梅屋偈韻大白山頭第一層一枝春信見無能何年飄落人間世散作長街六月氷送修知客修無修句如何舉門裡出身身裡門千歲岩前歌一曲天香桂子落紛紛送靜上人歸雲門明知靜是真消息却要橫身閙市中一箇白雲無住著又隨孤月掛長松送忠侍者省師秋高木落鴈聲稀天外欣逢白鳳歸紙襖莫教文彩露阿師全用險崖機和訥無言十二時歌韻十二時誰與知眼上隨分安雙眉神珠謾逐黑月隱白雲自傍青山飛半夜子睡著是人呼不起清風皓月四簷秋輸我幕天廉席地雞鳴丑錯認七星為八斗馬駒蹈殺天下人石頭可是能真吼平旦寅一窗紅日破群昏幾多猶作夢中夢一炷清香為返魂日出卯只箇平常心是道眼中童子面前人斑白何須讀黃老食時辰白頭傾蓋無故新向來梵志語言好吾猶昔人非昔人禺中巳知音賴有寒山子拶倒毗耶不二門上大人兮丘乙己日中午三十三天擊天鼓乾闥婆王總未知迦葉無端起來舞日昳未敵體有誰分觸背萬機休罷即歸來一法何曾在門外晡時申一喝當機體用分不知雪嶺同風句何似雲門透法身日入酉暗裡也須垂隻手見聞都道透根塵舌本何曾離得口黃昏戌萬象森羅同一律月明照見夜行人一二三四五六七人定亥八穴七穿堅固鎧鬼山之下驀翻身抹過無邊香水海阿呵呵見也麼有佛無佛須經過飢來喫飯困來睡天上天下如吾何四威儀行不與人共行蹈著腳下苔生堪笑空生未了無諍還同有爭住不與人共住鐵鞭擊珊瑚樹山中明月一家門外白雲何處坐不與人共坐省得修因證果解開三篾肚皮贏得口吞飯顆臥不與人共臥惺惺何若懡㦬待得玉兔走來不覺金烏飛過次韻送滿鎮成康四上人禪子心如滿月明定乾坤句合相呈三千里外親携手九曲黃河徹底清滿懷傾出鎮海珠仰山却道無言語爍破乾坤驚倒人雪裡芭蕉不知暑欲成大樹作陰凉撥草參方道念長回首宜春臺畔路胸中知見自含香千岩萬壑趣何多戲海金鱗出網羅滿院清香噴簷蔔莫教孤負老維摩送金山柏首座禮峨眉金鼇背上急翻身西望峨眉道念淳要識普賢真面目碧天霜月帶重輪資福道元法兄惠筆且謂少助貫華之興答以二偈坐斷禺泉正令新猶能把筆寄陳人何如自用腕頭力點出嵩山萬古春遠遣宣毫助貫華要看靈豔吐天葩老來無許間心力此事而今付作家癡絶翁所賡白雲端祖山居偈忠藏主求和間居無事可評論一炷清香自得聞睡起有茶飢有飯行看流水坐看雲夢回樓上曉鐘鳴落月穿窗夜氣清政喜世間緣業盡靜聽童子課經聲淨智如如本妙圓不分凡聖體皆然只今六用俱休復即是威音大劫前一性虗間百念停剩將雙眼掛空青深村院落無塵土萬本長松繞石屏送欣藏主禮永安塔掃空邪說顯真乘只有藤州一箇僧試看永安山裡月只今猶是著書燈寄報忠直菴不赴芝雲也自高鴛湖且可泛輕舠長竿留取釣東海一舉三山連六鼇寄謝石山孤月雪山風月平分豈等間倚天長劍在眉間可憐鷲嶺拈花日只有頭陀解破顏心月孤圓道念堅自應般若有因緣超然迥出塵勞外不見南堂也會禪萬里青霄一桂輪照空群象淨無塵滿身風露不知冷光境亡來有幾人紹續宗風在己躬掀翻藏海十三重須知佛祖垂慈處超出情塵語路中黃岩淡葛偏宜暑絶勝青州做得衫却寫伽陀遠相報前三三與後三三贈宗嵩妙三上人參禪學道悟真宗三要三玄一句中舉步蹈翻千聖頂碧天紅日自西東千峯影裡看嵩山正是秋風落照間大地撮來如粟粒曾郎不是誑癡頑妙唱不搖三寸舌真機只在一毫端頂門竪亞金剛眼六合還從掌上看送尹侍者高披紙襖出南湖空盡塵勞一物無好向金陵訪知己前頭大有赤鬚胡次天寧空海韻送珂維那袖裡金鎚解放收風光盡在月波樓豁開兩眼空寰海帷幄毋勞更運籌送南華立首座曹侯溪上南華寺那羅延射堅洛叉半座平分風與月寶林輝映衲袈裟雨窗示聚上人空階滴滴雨中聽不覺思量到鏡清迷己衆生多逐物不知真聽本無聲滴滴空階妙指陳返聞聞後見全真後生未達圓通境莫謗如來正法輪悼建長竺仙法兄五住招提盡大方座中冠蓋擁朝行雷音遠震扶桑國繕寫歸家作寶藏承虗接響喚來來把得瓢苗石上栽二十餘年真一夢海風吹得訃音回難提結就稜伽頂個是東方最勝幢活葬死埋但了了者回推倒葛藤樁送心侍者省雲岩藥山室裡弄師子不出雲岩手段高萬仞崖頭輕返擲却來平地起風濤送明藏主遊廬山一大藏教是切腳正文畢竟許誰明大江直上三千里突兀康山照眼青送壽首座兜率宮中說夢回幡竿尖上舞三臺釋迦老子不知有白牯狸奴笑滿腮聞北山悅堂歸東禪兼簡永懷嶽雲卷衣歸食故山薇誰似山翁解見幾養得身心同孺子自栽松竹護禪扉才話休居憶永懷白頭兄弟已生埋村田角落凶年裡馬麥風規自偶諧次韻答中山行可西國古航四友睦州擔板志彌敦接得韶陽嗣老存多少後生遭落賺一時埋沒向宗門花擘將來鐵突崙劫空空劫鎮長存龍睛鶻眼何曾會三世如來共一門出得一番白汗了平生毛病盡無存神醫拱手巫咸走不信膏肓是活門祖翁一箇破沙盆東挈西提活計存煨藥煨湯又煨粥絶勝騎馬傍人門次松月法兄韻送行宏二上人巧織吳姝不用梭鴛鴦擲出奈渠何郎君子弟爭先看箇箇齊穿水上靴正愁吾道少人行江上俄然見雨簦說與捧爐神著便莫教翻却煮茶鐺覺首座送松月翁遺硯至作偈贈之法社凋零法運衰法燈已滅法幢摧人天慟哭波旬笑狼藉春風又一回電光影裡急翻身剎海真成一聚塵遺我陶泓亦何用尚須磨盡世間人雲門拄杖化為龍飛入曹溪硯水中鼓得風雷動天地依然皓月掛長松無位真人乾屎橛正法眼藏破沙盆爭似曹溪寧馨子金香爐下鐵崑崙此本心悼偈之句也次淨慈平山贈祖灊首座韻長憶盧公倚石屏無邊風月滿懷清何如智覺懸宗鏡半座平分接晚生湖上千峯列翠屏湖中秋水帶霜清永明宗旨無今古細浪含風取次生次龜峯道元韻悼薦福竺源禪師戴角披毛異類身全生全死顯全真巢湖水涸魚龍泣去作他方轉化人五濁波中駕鐵船須彌峯頂浪滔天一聲鐵笛三千界彈指人間八萬年去無所去與麼去法門折却擎天柱來無所來應再來煩惱海中傾法雨鐵蒺䔧椎當面擲優曇鉢華火中開可憐滯殼迷封者盡逐聲前句後來大闡宗風只一拳蕩除露布葛藤禪南巢湖頭五六月氷滿長街雪滿天黃金真人鐵面相弗立一塵重掃蕩涅槃城外展生機春風不在花枝上入佛何妨又入魔知他為我我為他定盤星上論輕重斤兩元來不較多宗說俱通不二門當機一喝怒雷奔金圈栗棘間家具驗盡師僧鐵鶻崙巢湖番水定宗綱引得波旬笑一場三際斷時心行滅通身是口錯論量真誠意思脫空歌減處成添少處多萬里碧霄雲散盡一輪霜月照松蘿寄九巖道純兼簡石佛清遠石佛擡眸看九巖弟兄情分自相諳遙知話到難難處抹過前三與後三春雨春山箏蕨肥不知塵世有危機何當借與安禪石同看孤雲自在飛聞明巖穆菴出世衣到松源更不傳一生只是捻空拳如今兩手都分付密意明明在汝邊送忠藏主暮春燈下重相見話到三更又四更待得雞鳴便分首大江東去不勝情寄景山嶽雲無愧軒中無愧翁將無作有自融通誰知千里同風事不在玄沙白紙中屋裡溪聲屋外山一心不動萬機間只知坐得蒲團穩不覺高風滿世間悼定慧大方佛日西傾不奈何奮身揮起魯陽戈向來入空操戈者火後爭收設利羅彩鳳翻空出盛時金烏爍破五須彌全身跳入火中浴後世無勞問髓皮吾衰不復夢周公公識吾衰豈夢中勝熱高風冠今古硯池無底火燒空善惡由來只兩岐閉眸作夜亦奚為鄭公筆力堪扛鼎來寫禪師活化按鄭明德所撰銘其略云至正十六年春師出世住平江定慧時方兵興戎旅占住佛屋緇徒多戚戚者師曰何不休去歇去師語默跌宕不可測識謝院事客靈岩山華首座房盛稱路總管周侯義卿之賢且曰我將火化須侯作證明十八年九月八日侯以郡事登靈岩山時蘇録判善長賈典史天瑞從師聞侯至欣然出迎陪侯夜話曰某將此月十四日即此山火化侯其為我證明兼吾教下衰侯念佛世尊付囑國王大臣為法外護侯慎無忘此言至十三日復以詩寄侯詩曰昨日岩前拾得薪今朝幻質化為塵殷勤寄語賢侯道碧落雲收月一痕侯雖得詩亦未深信復以偈決別衆人是夜請於華乞以燥薪疊高棚仍借一龕坐去華謂薪當從命龕則無有指前一木床語華曰此亦足矣華如師言十四日朝登殿與衆僧別即登柴棚兩皆析燥薪薪得火即烈焰熾然於大火聚中其祝香有日靈苗不屬陰陽種根本元從劫外來不是休居親說破如何移向火中栽於烈焰中度數珠與華曰聊當記憶於是僧俗四衆始驚信拜禮煙焰所至多得舍利且聞異香身盡火滅骨骸不壞者二舌根齒牙侯聞驚怛不已為悼章二且為建塔靈岩乞為之銘云云別衆偈曰前身元是石橋僧故向人間供愛憎憎愛盡時全體見鐵蛇火裏嚼寒氷兵後過三塔即事雨後鴛湖入望長巋然猶是魯靈光有無願力如何說只聽風甌為舉揚次韻答景山南洲空盡塵緣一草菴且無佛法許人拈蘭峯老子情懷好華偈時時到水南大是招提小是菴最關情事未曾拈一千七百野狐話今日何人在斗南志清隱至贈以四偈未來相見早開懷何用橫機拶險崖竺國不傳唐土信自家門裡隔天涯二十年來話始圓不知竇八布衫穿掀翻海嶽求冤對擘破虗空作兩邊大而無外小無中明暗雙忘體用空薩埵競酣三昧酒獼猴自具六神通天無四壁地無門栗棘拈來吐又吞百草頭邊千聖眼祖翁一箇破沙盆次韻答雪崖森羅萬象作參隨北斗南辰位弗移瞥轉機輪上頭看此心只許老胡知話頭那復究離微妙處難教佛祖知一片雲間不相到轉頭人境已都非不用欣欣不用悲今何時也古何時九還丹外無真藥換盡凡胎莫厭遲處世難為是強顏有懷須到古人間間人自有間人骨不是間人不易間三界無家總是賓道存何處不相親滿身塵土寧須洗洗到無塵正是塵水因風動靜無時山與雲高不自巍彼我兩忘心跡泯杳然長與世相違次前韻答芷首座無邊風月自追隨看盡江山腳未移楖栗杖頭消息在莫教容易使人知鶻眼龍睛妙入微未曾拈起已先知五年隔闊重相見一句當機掃百非方今佛法最堪悲正是叢林掃地時誰與天宮問彌勒利生時至莫教遲幾年不得見氷顏只隔俞溪一水間看得清平時節近未應長似老僧間荒郊無可燕高賓道術相忘意自親提起祖機千七百幾何曾未透金塵平田淺草轉身時蹈著孤峯萬仞巍莫怪南堂衰颯甚從來無順亦無違懷仲文覺民一宗三弟大雄山腳斷飛鴻華頂峯頭路不通七十二翁天一角鄰雞三唱五更鐘次韻答景德雲海法兄白粲挨開苜蓿盤貫華翻水墨光鮮早來打鼓普請看塞破華亭載月船常山銘贈真藏主猗與常山不變不滅寂然靈然有若其截匪見其始孰覯其終鑽之仰之維堅維隆既極其踵復徹其頂廓然大觀默然自領華開葉落春去秋來一瞬萬古惟常山哉坐禪銘示琳藏主四威儀中唯坐最安眼如木𣔻口似磉盤外絶諸緣內心無喘三際泊然一真自見父母未生是此面目了了常知不背不觸我即諸佛諸佛即我猛著精神毋事慵惰昏荒睡眠癡暗之獄馳驟攀緣猿馬之屬性體昭廓前境自忘隨機應變光明之幢虗白銘示杲侍者一真法界含吐十虗洞然明白不隔毫𨤲即虗即實即白即黑性相平等體用俱寂寂而常照以觀其徼照而常寂以觀其妙行住坐臥不離是中是謂無用之用熾然作用無功之功大哉聖功爾道人果入此三昧於一切法乃得自在瑞田銘贈祥上人惟我瑞田不耘而秀靈根固深異苗翻茂匪术匪芝芳騰四時合乃同頴分而兩歧雨露霜雪不失其節刈穫舂炊慰彼飢渴詎田能瑞我瑞于田我亦何有化育之元清隱銘贈志藏主水之清能鑑乎物心之清物莫我汩吾固知隱於道者與時偕行不悖不忽政不在食首陽之薇而後見夷齊之風骨噫嘻碧海澄秋兮神山突兀少林銘贈效藏主道人伊何少林是效行解相應宗說俱到三乘教外獨傳此心芳聯𦦨續耀古騰今舍而他之無乃自欺反己而觀物莫我遺觀者何人心是何物斫水求痕捫空揣骨心思路絶言語道斷廓然現前月當霄漢大哉少林列聖所欽八紘無際萬年垂陰友石銘贈琪侍者有美如琪而友于石磨錯之至光潤外射豈無厥質昧于修治日月既逝悔亦奚為士之於道其可自忽念茲在茲前佛後佛此宗銘贈任首座猗與此宗天然而妙無正無偏有用有照如大火聚不可近傍如塗毒鼓聞者皆喪一門超出萬古徽猷鷲峯倒卓曹溪逆流竺先銘贈元侍者威音已前五竺之先是第二句孰知其然釋迦未出達磨未來拈華了也斷臂何哉於此透脫全機與奪上下四維橫該竪抹優曇鉢華九枝秀草青天冥冥紅日杲杲聽松軒銘贈聞首座松本無聲因風而鳴乃若廣樂張之洞庭我耳本靜物來斯應心精遺聞默默自領彼既無作此亦奚受一根返元六用仍舊松之青青風之冷冷爾聲爾色孰經孰營聲不自聲色不自色由我見聞乃彰爾德爾德不有我心亦空淨洗兩耳聽此松風北窗銘贈旻首座北窗下羲皇上寂寥寥明晃晃有清風來莾蒼琴無絃松自響或禪那或梵放不求真不斷妄忘能所滅影象擔板漢難近傍擬入門拶折膀西軒銘贈立信中少室西來單傳直指以心印心如水入水後代兒孫以曲為直不辨東西豈知南北非信不立道在其中神而明之廓然大通是故此軒以西自榜有問如何痛領一掌蒲室銘示毅本中猗彼道人編蒲養親直以佛法𢌿之雲門法有以付親有以報古之今之是則是效我築是室以名配實巨屨小屨惟縝惟密粥之得金甘旨是任匪甘匪旨聊慰我心舊蒲既盡新蒲既續事親之心何日而足臥氷泣笋勞而罔繼惟此室蒲欽于世世心華室銘贈吾藏主異哉此室燦然心華萬境空寂三際不譁極小同大隱若毗耶客來問法活火煮茶視彼一默殆無以加於斯妙悟智山法芽趣解脫道住法王家我作銘言永矢弗誇庶幾覽者隳彌戾車真際銘贈詣首座道初凡厥有生同一真際覺妄為因能所斯蔽既失正覺反合塵勞棄本逐末舍父而逃從冥入冥由妄續妄苦海沉淪死生流浪豁然靈悟合本妙覺覺妙元明無脫無縛真以妄立妄滅無真凡名聖號幻影毛輪幸自元無若為打破更問如何泥多佛大覺照銘覺而常照照而常覺一性圓明萬機昭廓覺者為誰照者何物能所頓空全體出沒不於三界而現身相乃知此室無背無向經行坐臥常在其中匪召而應風虎雲龍硯銘并序雲岩經藏記黃太史為死心禪師作也有以其親墓志劖于陰死心見而詬之辟歷析其半為灰燼而藏記儼然厥後藏殿回祿亦不存抑有數爾天曆間治殿基僧於深土得小片吾友秀實翁求得之斫而為硯三分其厚廣則十倍之縱又倍其廣之半秀潤如紫玉背有佛字實魯直書也求余作銘銘曰火炎崑岡玉石俱焚其不壞者粹然而溫斫而為硯天葩吐芬覆視其陰有佛之文匣而藏之不見其跡炳然金軀隱于聚墨善知衆藝四十字母於以發之以迪群有性空銘諸法本來空無自性一句當機十方普應四十九年橫說竪說石上栽華水中捉月作是觀者名為正觀翠微禪板臨濟蒲團密室銘於穆是室綿綿密密八面四方針劄不入別有一機電激星馳大千剎海不隔毫𨤲左轉右轉即隱即顯山冷雲寒波澄月現大冶銘大冶洪爐星飛火迸點鐵化金鍛凡鎔聖萬鈞之器何莫由斯一模鑄就豈假鉗鎚不有其體孰彰其用道合乾坤風行雷動介石銘孰據於德介然如石將從之遊以究厥極石兮石兮其介若此人兮人兮胡不相似我心匪石不可轉也地老天荒孰知豫者咨爾介石持之有常匪玉其蘊而有耿光則堂銘我此法門以悟為則一室洞開中虗外寂絲毫繫念瞥起情塵六鑿交鬪三途業因一心不生萬境自淨燕坐其中是大圓鏡博山煙滅午鼎風傳草深一丈真規凜然知足軒銘贈燈藏主受想坑穽色聲鴆毒何以處之安分寡欲智照戶牖法堂床褥壞衲纏身甘露實腹淡然無營物莫我瀆月冷風高山明水緑是故此軒名曰知足鑑止軒銘欲觀乎動必鑑其止我性本靜有若此水前波既息後波不隨鑑兮鑑兮清且漣六窗洞開宿雨初霽止兮止兮海印三昧性空銘自性元空不可描貌一念不生何其昭廓清淨本然周遍法界入此法門自忘知解寒灰烈𦦨槁木陽春聖凡情盡覿體全真白雲山舍銘贈塤書記青山之青白雲之白舍於兩間亦孔之適實際理地不受一塵而山而雲幻影毛輪舍者為誰適亦何有一心不生萬法無咎三際一息大千一區吾非斯人其孰與俱涵春室銘我此環堵中虗外密一爐松火半窗紅日擁衾而坐展腳而睡豈不懷思立雪斷臂仰高而局俯厚而蹐融融涵春乾乾夕惕山堂銘天目之山綿亘千里磅礴逶迤屹然東峙偉哉崇福踞乎其陽惟茲夢菴始搆斯堂八窗既闢萬景獻酬亦有師賓能如西丘西丘已矣遺風亹亹何以銘之高山仰止
