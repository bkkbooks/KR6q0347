body:
  text: 偈頌參學比丘汝現元寶慧朗等編天印示普侍者覺天無雲海波靜萬象森羅同一印聖凡情量莫能該爍破面門應自信鐵牛之機本如此言下承當不相似令行吳越在于今誰解同生復同死印泥印水還印空二三四七俱潛蹤暗合明投總兒戲抹過虎穴并魔宮印空印泥還印水賓則全賓主全主曹溪脫出未為奇擒得盧陂始堪喜印室印水還印泥玉犬夜吠金雞啼紫綬煌煌揭日月金章隱隱蟠虹霓祖也無傳我無授去來且可空雙手相逢有問護身符好與攔腮摑其口滅宗示胤侍者瞎驢滅却臨濟宗黃河九曲不敢東東山拋出暗號子鐵蛇彩鳳盤晴空堪笑堪悲川土苴覿面當機看腳下打失眉毛萬事休引得傍觀笑聲啞宗風似此爭不滅此心合對瞎驢說說向瞎驢驢不聽喝聲迸落千巖月東白贈升侍者金雞拍翅扶桑暾萬國皓皓開乾坤少室西來豈無意後生欲見嗟無門五葉千燈輝震旦一色明邊何爛爛更從向上透玄關曠劫重昏蕩然散碧海澄澄照虗室萬象莫能逃影質堪笑當年老趙州眼前渾是金州漆思遠贈傳侍者祖祖相傳有何說地久天長無斷絶無端滅向瞎驢邊添得兒孫釘根楔此楔欲出出者誰神仙祕訣超離微山青山黃日月老屋前屋後花信稀傳兮遠兮我與爾思而不思知幾幾東雲贈海侍者道人心地如雲海隨風行空了無礙曉來一片橫日東萬里濃陰覆天外在東為東何定方卷舒出沒皆相當釘釘著兮懸掛著南陽指出談宗綱有眼衲僧誰不見未達此心遭境眩逐物迷真意轉移識性紛紜日千變我願人人如此雲贊之不喜罵不瞋動既無營靜無住飄然寂爾超緣塵雲兮雲兮許多好人果如雲少煩惱得時行志作甘霖一洗炎埃潤枯槁物外示道侍者道非物外物外非道以要言之孰臻其奧南泉拂袖便行馬祖看得恰好木葉落盡四山黃金雞拍翅千江曉宗遠示世侍者未分天地誰為祖接響承虗自今古竺國支那兩下看扶桑日輪正卓午威音已後威音前著著落在兒孫邊馬駒蹈殺不足怪瞎驢滅却方堪憐日可冷兮月可熱此事如何對人說關心大段是寒梅盡把春光都漏泄默堂贈辨侍者淨名一默喧今古塵塵剎剎開門戶散華天女解隨邪擘破虗空旋修補八紘雲盡清晝間踈簾半捲來秋山道人有口且掛壁坐聽萬象提玄關鐵馬嘶風木雞呌野水自流華自笑碧眼胡僧暗點頭妙德空生曾未了雪窗贈瑩藏主雙峯歌雪窗寶華雪窗歌兩口無一舌奈此二老何拈却廉纖與直截推起松窗進明月鷺鷀飛入蘆花中一片清光對寥泬莫問少林深幾多莫問雪山高嵯峨蹲鴟出火香噴鼻一飽之外安知他雪窗見我作此語點首掀眉心唯唯滿幅書來一字無前路逢人休錯舉大明贈韜侍者大包無外還同小明察秋毫未忘照大而無大明無明不妨蹈著通天竅通天之竅既已開九野蕩蕩無纖埃翻思龍潭撲滅紙燭處爍爍雲漢遠近俱昭回燒却疏兮焚却鈔蚋解螢光何足道坐斷孤峯正令行瞎棒盲枷真草草道人光明非小大耀古騰今長不夜九烏射盡一無存把得栗棘渾崙吞無我贈吾藏主我自無我誰為誰鐵笛把得縱橫吹雲門一曲敲出鳳皇五色髓洞山五位擊碎驪龍明月珠向去底如猫捕鼠却來底似井驢通紅了也再下一椎大唐國裡火星迸新羅燎却黃門須性海贈明書記覺海澄圓性清淨湛湛寒光浸空影一波才動萬波隨便有六凡兼四聖我觀動靜初無作只為妄能生妄覺覺妄元空達本真一道虗明自昭廓君不見靈山拈華伎倆盡少室單傳重鑄印三交謾駕鐵牛機臨汝全提還弄引南堂五月松吹凉茶甌滿泛毛孔香客來問話莫啓口只有棒喝無商量秀岩贈挺首座千岩秀出萬物表下視乾坤一何小散華無路到諸天只許青山自圍繞青山不㝵白雲飛丹崖豈逐春風老擬問巖中事若何春來拂曉聞啼烏愚中贈哲藏主威音已前無正句何從立許間名字愚中之哲哲中愚意外遣言言外意摩竭掩室開口難毗耶一默心自間契詬離朱兩俱失罔象自得同癡頑癡兮頑兮幾多好困來一覺和衣倒鼻息如雷喚不應開得眼來天大曉手指東西話南北肚飢買箇油糍喫畢竟愚中事若何直待當來問彌勒樂菴贈常首座世間之樂色與聲一菴冷淡誰留情千峯萬峯聳寒碧道人得之雙眼明眼既樂兮心亦樂心空眼空樂何著無著樂虗空亦空空有華開與華落華開華落春復秋世間萬事空悠悠一菴冷淡只如此無樂之樂將焉求是禪悅是法喜口不能言心自語木人撫掌唱陽春石女含笙和流水一拍一拍高復低玉兔搗藥金雞啼拈出青原白家酒清稅爛醉如春泥月鏡贈滿書記碧海飛來大圓鏡吞爍乾坤無少剩靈山指出未全真東平打破方相稱光鏡俱亡是何物舜若多神露風骨蚩尤倒走軒轅驚今古何人敢輕忽香巖贈芷首座栴檀香風滿岩谷蘭芳芷秀同芬馥萬木千林競獻酬鼻觀無聞心自足道人坐我巖之中遍身毛孔吹香風八萬四千身衆海互相涉入俱融通舉一毛端衆毛集一一香光翠雲濕不出普賢毛孔中誰道心聞無路入夢菴贈一侍者未結此菴先作夢夢入華胥選梁棟菴成夢覺兩茫然八表十虗空洞洞或擎拳或竪指遮莫謾神并呼鬼金雞啼上玉闌干山是山兮水是水椿庭示壽藏主春八千秋八千一瞬萬古何茫然緑疏含風夜氣肅朱簾卷雨朝容鮮濟北豈從穿鑿得睦州謾自相成全既然黃檗棒頭揭出佛法的的大意安用大愚肋下痛築三拳總是桑條著箭柳幹出汁說甚擔泉帶月覔火和煙翻身一擲抹過五天皮膚脫盡見真實閻浮猶在海南邊古音贈韶藏主我有太古音不是今時曲馬師曾一彈清風滿林麓無絃舉手難絶聽意自足禪窗春雨餘依依遠山緑中山贈頴侍者突突兀兀撑空虗青青黯黯何孤危不偏不倚露一機除是頑石無人知首陽餓夫工採薇豈識空生巖畔天花飛噫吁嘻亘千百載兮其誰與歸太虗太虗無門絶關鑰扣之作聲鳴剝剝萬象森羅側耳聽石人木人齊應諾金烏東升兔西墜天風吹華落香雨道人燕坐寂不動笑看須彌同鼓舞我與太虗真體合絶點純清離紛雜電光影裡急翻身石火星中恣騰蹈未明此旨成掠虗靠實說話難提持直向虗中了真實始知實外元無虗虗兮實兮今復古有相無相何足數說與聰明道者知打破將來重捏聚空巖空巖好空巖好住來歲久無煩惱蒲團禪板儘相忘竹杖芒鞋隨起倒有時坐選甚少林胡達磨一念全超曠劫前不覺日輪頭上過有時立水色山光淡相入拂曉清風劈面來過雲小雨霑衣濕有時行一片夕陽天外橫信意不知山遠近躋攀或與猿虎爭有時臥曲水枕頭消一箇不奈多情黃栗留幾𣅍好夢都驚破空巖好空巖好落華滿地無人拂人空法空空亦空如何說與時流道雪山匝地漫天雪三尺千山萬山齊一色普賢失却香象王蹈碎虗空尋不得六花飛入銀碗中瓊林玉樹光玲瓏重巖邃谷香草茁白牛穩臥忘西東瞿曇半夜逾城去掉頭不顧金輪位脫將袞服貿皮衣回首人間不知處牧石道人牧牛如牧石鞭索不施終省力樅然遍界露迥迥寂爾虗間還默默有時一曲溪東西長堤緑草煙萋迷人間萬事不入耳席地且聽黃鶯啼空海覺海無邊空索索白日東升月西落蒼龍睡穩初不知頷下神珠照寥廓信手一擊百雜碎騰身已在須彌背不犯清波意自殊他家自有通人愛自牧我有水牯牛生來惟自牧鞭繩既在手且免東西觸原上春草青原下春水緑隨宜不多求得飽意自足如是三十載養之頗純熟豈無他人稼示之非所欲毛色日已化頭角空自全既不逆人意又不蹊人田三春農事罷一堤楊柳煙人牛兩何有庶以終天年空漚覺海澄圓一漚發起滅無從自虗豁廓然全露十方空四生九有和根拔空自非空離我所囊栝無邊入環堵金雞曉拂扶桑枝玉兔夜輾珊瑚樹漚中之空空中漚隨機鼓蕩成沈浮沈浮本來無實性六鼇一掣隨金鈎我開此室還自榜榜以空漚豈相誑踈簾半卷篆煙青三際寥寥餘鏡象贈陸平原兼示灊姪諸子一從海宇吹腥風三年蹤跡如轉蓬平原道人情分濃招我卜築平原中灊能結搆進負舂矻矻蹇蹇忘秋冬虀不滿甕粟不鍾煙笻雨笠何憧憧君不見雄峯作息與衆同大溈橡栗成禪叢又不見栽田博飯楊岐翁一旦扶起臨濟宗吾今老矣百事慵眼頭白雙耳聾不作俗子悲途窮不圖聞望傾王公只願皇化浹浴佛道隆時和歲稔舟車通飛潛動植得善終一丘一嶽皆天宮送壽藏主世尊祗是付金襴迦葉何須到剎竿且喜鳳臺無授受免教開福有相謾鵷雛眼底風光別蚊子眉間境界寬一擊虗空成粉碎却來平地滾波瀾送英侍者回彰教禪者三年在侍傍機先一著解承當到家不用多言語叉手惟知聽舉揚破柱疾雷驚熱喝倚天長劍發寒光忽然倒嶽傾湫去方信龍於淺處藏慧藏主微格外提持之句格外提持也不難面前推倒鐵圍山祖師鼻孔曾穿却外道頭皮有甚頑情與無情都是妄法非有法自成間一毛頭上三千界知與何人共往還復藏主寂照寂一念無生洞十虗才分靜躁即懸殊維摩室裡金光現善法堂前寶網舒舉足便須超限量到家何必問程途只今六用成休復禪板蒲團儘自如送輦真巴大師再之補陀頻伽飛出海門東日照扶桑萬國紅法體只如今日見潮音還與舊時同天無四壁心何壯劫有三祇業自空童子南詢真軌在杖頭隨處得春風送空上人之金山德雲端坐妙峯頭山自高寒水自流三際不興諸境寂萬機俱泯一心休舟橫野渡潮聲夜更轉星河桂魄秋金錫影搖天地動潛鱗衝起釣鼇鈎答渭友竹寄傳燈録劫外真燈豈易傳祗應滅向瞎驢邊試從七佛探深委堪與諸家辨正偏脫印誰驚文彩露同風自覺道情全壽山有眼不識字留在明窗伴暮年次松月法兄韻送京維那歸省龍翔勛業於君較幾籌獨知真樂在無求江西老宿誰非馬社裡遺民自姓劉舉話罕聞當路虎逢人休說過窗牛只應興化能延敵不似群兒輥繡毬送淨藏主遊浙我忘言也汝亦忘言擘破三玄作兩邊開口便能吞佛祖轉身端可利人天三乘教外機關少百草頭邊體用全剔起衲僧行腳眼大江南北興悠然送忍侍者上徑山不向楊州聽落梅只思洗眼看全提山頭赬尾拏雲去井底黃塵白晝迷聖解未除猶滯殼凡情才盡自忘蹄諸方五味都拈却花滿千岩水滿溪次韻江心無言方外乾坤方外乾坤豈易窮同中還異異中同萬機不墮境根識一念頓超空假中頑石有時能點首太虗無跡可形容豁開戶牖歸來也相見依然在別峯靈澄和尚山居偈寶藏主求和西來無意與人言開到梅華自換年三事壞衣殊稱體一頭華髮任齊肩行收落葉供茶鼎坐倚蒲團對瀑泉世出世間都是夢孰論身後與身前次松月翁韻送承天藏維那禮祖未了目前須用了已明心地更何求巴蛇昨夜吞香象陝府今朝灌鐵牛馬祖下人阿録録桐城投子道油油只今此話無人舉看盡青山自白頭贈隱禪人默法華經七喻三周一默收無人能到最深幽權機可向聲前薦實相那容紙上求菩薩涌升金地裂天龍恭敬寶華浮豁開火宅光明藏携手同乘露地牛送雲蓋師首座歸隆興東土西乾妙不傳現成公案亦昭然睦州豈是間擔板黃檗難教在下肩南浦鶯華春滿路西山煙雨翠摩天諸方腳債都還了一曲松風兩耳邊送琬上人之四明兼柬翠山大朴蹈遍吳雲志未灰又思入海看蓬萊金剛石上頻伽見玉几峯前窣堵開問法問心何卓犖尋師尋友莫徘徊憑君說與翠岩老留取眉毛頷下栽送璘上人遊四明天台省親揭翻父母未生前行腳參方話已圓萬法不離心地印好山都在屋頭邊鄞江有水通三島方廣無雲見五天秋滿乾坤風信好卷衣歸趁浙東船次松月翁韻送育王