body:
  text: 住平江路靈巖禪寺語錄參學比丘祖運志道等編師於至正五年七月十一日入寺指山門云撥開向上玄關掃蕩聖凡途轍萬古乾坤一朝風月佛殿世尊三昧迦葉不知一會靈山儼然猶在據室此是從上老宿烹佛煉祖煅聖鎔凡之地新長老平高就下舍窄從寬且放你諸人吐氣拈院疏權衡在手與奪臨時政化宣流風行草偃拈江湖疏鐵心石腸河舌海口贊之則碓觜生華毀之則佛面百醜贊毀不及處面南看北斗指法座云大眾還見麼須彌頂上闊著步大千剎海清風起便陞座拈香云此香結為寶絲網散作光明雲爇向寶爐祝延今上皇帝聖躬萬歲萬歲萬萬歲陛下恭願文明齊北極睿筭等南山次拈香云此香遇賤則價重娑婆遇貴則分文不直爇向爐中奉為前住保寧古林茂和尚用酬法乳之恩斂衣就座上首白椎云法筵龍象眾當觀第一義師云若論第一義法鼓未鳴人天未集已前見得猶虧一半何況一椎擊碎影迹不留苟非具眼衲僧未免喚鐘作甕莫有定當得出者麼時有僧出眾云祖師心印鐵牛機直要當陽決是非第一峯頭垂隻手塵塵剎剎盡知歸為國開堂願聞法要師云萬人遐仰處紅日到天心進云一統乾坤歸聖化萬人叢裡奪高標如何是出世邊事師云橫按鏌鎁全正令太平寰宇斬癡頑進云如何是三世諸佛不知有師云一字不著畫進云如何是狸奴白牯却知有師云古錦寫回文進云千聖不傳真妙訣灼然能有幾人知便禮拜師云且莫詐明頭師乃云石門𡾟險鐵關牢舉目分明萬仞高四十年中重到此始終不隔一絲毫好大眾湛湛湖光平開鏡面青青山色上插雲霄乃智積應現之方誠圓照嘉遁之所繼茲芳躅實愧非才不免向普賢毛孔寬著程途維摩掌中拓開世界直教四聖六凡重重普會風不鳴條雨不破塊天清地寧時康道泰報不報之深恩揚不揚之真化拈起鐵蒺䔧驪珠盡擊碎千古萬古黑漫漫填溝塞岳無人會喝一喝復舉僧問趙州晝升兜率夜降閻浮為什麼摩尼珠不現州云道什麼僧擬進語州云毗婆尸佛早留心直至而今不得妙師云還見趙州立地處麼王令已行天下遍將軍塞外絕煙塵久立尊官伏惟珍重小參只者是只者是金不愽金水不洗水是句亦剗非句亦剗揭開萬里神光提出倚天長劍三登九到滯殻迷封撩起便行白衣拜相山僧今者椎碎蟠桃核得見舊時仁拽將師子峯與天平山鬪額且貴大家知有自餘七十三八十四癩馬繫枯樁黑牛臥死水有甚共語處拍禪床云好雨洗將殘暑去凉風吹得早秋來復舉僧問雲門佛法如水中月是否門云清波無透路僧云和尚從何得門云再問復何來僧云便與麼去時如何門云重疊關山路師云雲門善舞太阿著著有出身之路這僧貪觀白浪失却手橈雲岩不惜眉毛與汝拈却水除却月還見佛法麼喝一喝久立珍重解夏小參釋迦不出世達磨不西來佛法遍天下談玄口不開便與麼去可殺省力山僧四月十五日在萬壽山中結夏今朝七月十五日又向靈岩山頂解夏然雖有解有結畢竟無去無來無去無來冥通三際非中非外洞徹十方以此發揮祖道以此建立宗乘以此成就毗尼以此弘範三界是你諸人還見山僧麼拈拄杖卓一下云莫怪渠儂多意氣他家曾蹈上頭開復云說東道西拋沙撒土截斷葛藤休去歇去珍重上堂昨日雨今日晴依舊中秋月色明四海高賓團欒打坐諸莊耆舊趲促收成智積擎拳懽喜叢林又見重興卓拄杖云但行平等事何用問前程祖忌拈香千燈續𦦨五葉芬葩明來震旦暗度流沙關空鎻夢年年事一炷栴檀一盌茶上堂舉松源和尚云目前無法意在目前不是目前法非耳目之所到驀拈拄杖云切忌認驢鞍橋作阿爺下頷雖然如是有時乘好月不覺過滄州師云三咬下見骨一舉四十九喫飯了噇眠幾箇能知有所以山僧尋常與諸人眉毛廝結只是未曾道著箇不字何故如是卓拄杖云禍不入謹家之門上堂道由心悟豈假外求法離見聞言詮罔及三世諸拂只可自知六代祖師全提不起山僧今日不是峴山師兄到來又安敢妄通消息卓拄杖云客來無茶點蒿湯備禮儀小參即心即佛咄非心非佛咄不是心不是佛不是物咄竪起拂子云雲門大師在者裡咄咄咄力㘞希禪子訝中眉垂畢竟是何宗旨臨濟大師云赤肉團上有一無位真人常在汝諸人面門出入未證據者看看時有僧出濟便擒住云道道僧擬議濟便拓開云無位真人是什麼乾屎橛殺人刀活人劍乃上古之風規亦今時之樞要龍睛鶻眼一透便可驅耕夫之牛奪飢人之食驅耕夫之牛令他苗稼滋盛奪飢人之食令他永絕飢虗政如上將軍臨陣破敵制鼓搴旌寸刃不施橫屍萬里直教四夷入貢八表來歸豈不是大丈夫兒成就大丈夫事其或未然仲冬嚴寒季冬極寒莫把是非來辨我浮生穿鑿不相關復舉僧問長慶有問有答賓主歷然無問無答時如何慶云怕爛却那僧又問睦州州云相逢盡道休官去林下何曾見一人師云二員古佛與麼答話可使千古流芳苦要坐斷衲僧咽喉則未可在今夜有問靈岩有問有答賓主歷然無問無答時如何只向他道冬至寒食一百五上元定是正月半久立上堂化育之本物我同途生佛之元古今不易所以雪峯道盡大地撮來如粟米大拋向面前漆桶不會打鼓普請看卓拄杖云六爻未動群陰塞一氣潛回萬彚新臘八上堂釋迦世尊未離兜率已降王宮未出母胎度人已畢因甚却道子夜逾城六年苦行明星現時始成正覺若也道得不繆為嫡子親孫其或未然掩鼻偷香空遭罪責除夜小參德山小參不答話人貧智短趙州小參要答話馬瘦毛長靈岩今夜小參有問即答無問即休終不將珍珠作豌豆糶却豈不見南泉和尚云王老師自小牧一頭水牯牛擬向溪東放不免食他國王水草擬向溪西放也不免食他國王水草不如隨分納些些總不見得雖然如是未免笑破衲僧鼻孔且道衲僧有甚長處還委悉麼一年三百六十日一日還他十二時禪客相逢只彈指此心能有幾人知復舉道吾真和尚云鋒刃上𨁝跳微塵裡走馬勞勞去復來箇是知音者師云真點胸名不虗得撿點將來也只是三步四步未見七跳八跳在靈岩今夜分歲無可與諸人暖熱隨分也說四句燈籠拜露柱露柱拜燈籠明朝添一歲含笑舞春風為嘉興善慶雲岡長老對靈小參大用現前大機圓應截斷聖凡途轍除生死根源便見無邊剎境自他不隔於毫端十世古今始終不離於當念全心即佛全佛即心無一法不是真乘無一物不是妙用所以道處處真處處真塵塵盡是本來人真實說時人不識正體堂堂沒却身全體與麼來全體如是住住則孤鶴冷翹松頂去則片雲忽過人間竪起拂子云無量壽世尊即今在山僧拂子頭上放大寶光其光清淨無壞無雜三世諸佛於此光中成等正覺轉大法輪六代祖師於此光中直指單傳聯芳續𦦨天下老和尚於此光中各立化門播揚大教現前大眾於此光中各務本業器量堪任順寂慧明通濟廣福雲岡長老於此光中始自受生出家具戒六十二年間成就勝業不可思議所謂以精進攝懈怠以持戒攝毀禁以布施攝慳貪以慈悲攝瞋恚以禪定攝亂意以般若攝愚癡福資善慶建立大乘澤及榮枯全章寶印能事既畢奄爾真歸末後全提甚生光彩至竟不離此光而與山僧兩得相見豈唯與山僧兩得相見亦與現前大眾兩得相見豈唯與現前大眾兩得相見亦與諸山宿德天下老和尚兩得相見豈唯與諸山宿德天下老和尚兩得相見亦與三世諸佛六代祖師兩得相見豈唯與三世諸佛六代祖師兩得相見亦乃與無量壽如來兩得相見大眾雲岡長老於無量壽如來光相之中不起于座而入龍奮迅三昧去也擊拂子云行樹影搖金地月一池香散白蓮風上堂修山主道二破不成一一法鎮長存若作一二會永劫受沉淪山僧道二破即成一一法永無存不作一二會擺手出迷津恁麼恁麼一莖草玉殿瓊樓不恁麼不恁麼玉殿瓊樓一莖草恁麼中不恁麼不恁麼中却恁麼橫吞栗棘竪透金圈拈三條篾束取肚皮到處住山去豈不坐斷報化佛頭擊拂子云有意氣時添意氣不風流處也風流復舉臨濟栽松次黃檗問云深山裡栽許多松作什麼濟云一為山門作境致二為後人作標榜道了以钁打地三下乃噓一聲師云大眾還委悉麼黃檗有陷虎之機臨濟用劍刃上事喝路從平處險人向靜中忙佛涅槃上堂釋迦已滅彌勒未生正當今日佛法付在靈岩手裡把住也乾坤失色放行也日月交輝且道把住為人好放行為人好擊拂子云志士苦日短愁人知夜長上堂言無展事語不投機一句截流萬機寢息智積大士於無生中示現受生即不問智者大師親見靈山一會儼然未散什麼處得者消息來若也道得首座有長處藏主定不識藏主有長處侍者元不知所以道譬如河中水川流競奔逝各各不相知諸法亦如是喝一喝清平世界切忌訛言便下座上堂大眾山僧二三日來同穆菴首座往洞庭回禮恰值宿靄初消水色天光一碧萬頃逮乎到岸風雨驟作雲霧晦冥明覺堂前盤桓信宿昨早開船又值大明東生景物澄霽反思前日所見境界纖毫無有於其中間求其起滅之相了不可得今朝月望陞堂大方高士雲輸川委莫有為山僧點得出底麼拈拄杖若點得出分付拄杖子若點不出靠向臥床頭急要打老鼠靠拄杖下座聖節啟建上堂今朝三月十有七天壽聖節啟建日大家圓證金剛心摩訶般若波羅蜜上堂古德云我說法要譬彼天澤汝緣合故當見其道山僧今日與諸人眼眼相見心心相知不是緣合且作麼生是見道這裡會得人情若好喫水也肥若也不會近在眼睛中遠過河沙國結夏小參正因出家正因行脚正因辨道正因為人三世諸佛是你六代開士是你天下具大眼目尊宿是你何以如此所因既正感果亦真脫若因地不真果招紆曲以若所為求若所欲魔軍是你魔民是你外道六師是你之師彼師所墮汝亦隨墮謂之妄想根苗謂之地獄種子謗大般若出佛身血千佛出世不通懺悔所以道若人欲了知三世一切佛應觀法界性一切唯心造達磨大師遠從南竺來至中華傳持此心直接上根二祖云我心未安乞師安心達磨云將心來為汝安二祖云覔心了不可得達磨云為汝安心竟一印印定透頂透底上無攀仰下絕己躬常光現前壁立萬仞無端雲門手中扇子𨁝跳上天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾到者裡三世諸佛也摸索不著六代開士也摸索不著天下具大眼目尊宿也摸索不著是你諸人又向什麼處承當若承當得去何必九旬禁足三月護生堅守蠟人無繩自縛便可以無邊虗空為一壇場無央數劫為一期限於一出入息內承事過現未來恒沙諸佛脩行證入恒沙法門即諸佛智現魔王身登刀山入火聚吞栗棘透金圈婢視聲聞奴呼菩薩正恁麼時且喚你作佛則是作魔則是拈拄杖云魔之與佛總與穿却鼻孔卓拄杖一下無孔笛吹雲外曲相逢知我者還稀復舉黃檗問百丈從上相承底和尚如何指示於人百丈據座黃檗云後代兒孫將何傳授丈云我將謂你是箇漢便歸方丈師云百丈便歸方丈黃檗豈辨端倪若是山僧待問從上相承底如何指示於人劈脊便棒更問後代兒孫將何傳授便為連夜趂出還委悉麼棒頭有眼明如日要識真金火裡看上堂研池拍拍浪翻空箇是吳中第一峯三萬頃湖歸眼底二千年事在胸中涅槃妙性無留礙圓覺伽藍自混融嚼碎東山鐵餕餡始知風味不雷同天壽節滿散上堂金剛正體普應塵區般若靈光綿亘沙劫天地以之而覆藏日月以之而照臨風雨以之而順時雷霆以之而號令江河以之而流注山岳以之而穹崇萬類以之而資生聖人以之而現瑞直得四夷稱慶八表歸仁樵唱漁歌交相鼓舞且林下臣僧如何舉唱只將此个真消息仰祝吾皇萬萬春復舉宋太宗幸大相國寺見一僧看經帝問云看底什麼經僧云仁王護國經帝云既是寡人經因甚在卿手裡僧無語後來雪豆顯禪師代云皇天無親惟德是輔師云大人具大見大智得大用向聖凡莫測處下這一著雖然不動聲色直是駭古震今若非雪豆深辨端倪往往只成虗設今朝滿散陞堂臣僧重為頌出丹山鸞鳳來阿閣御殿簫韶奏九成野老不知黃屋貴六街猶聽靜鞭聲謝秉拂上堂法王法力超群生能以法財施一切善能分別諸法相於第一義而不動諸禪德諸供養中法供養最無前無後一時周遍堂中首座前日為眾作那一場佛事不同小小山僧觀來實謂今古罕聞雖然眾中莫有不受者般茶飯底麼喝意氣不從天地得英雄豈藉四時推上堂舉楊岐和尚示眾云舉古人一轉公案供養大眾良久云口只好喫飯師云作家宗師天然有在雖然撿點將來大似傷鹽費醋靈岩今日也舉一轉語供養大眾便下座上堂一出一入一動一靜一彼一此一語一默且道山僧與諸人還有間隔底道理也無若道有間隔那裡是有間隔若道無間隔那裡是無間隔於此緇素分明九旬無虗棄之功百劫在今時之用其或未然緇田無一簣之功鐵圍陷百刑之痛所以道霏霏梅雨洒危層五月山房冷似氷莫謂乾坤乖大信未明心地是炎蒸喝一喝歸依佛法僧下座請維那上堂機不離位墮在毒海智不到處切忌道著古人恁麼道大似人家新婦子有甚共語處山僧者裡則不然造次必於是顛沛必於是有什麼機有什麼位有什麼忌有什麼諱拈拄杖云這箇是興化打克賓底拄杖擲下云有伎倆者收取下座巡堂喫茶上堂舉陸亘大夫問南泉云弟子家中有一片石亦曾坐亦曾臥如今欲鐫作佛得麼泉云得大夫云莫不得麼泉云不得雲岩云坐即佛不坐即非佛洞山云不坐即佛坐即非佛保福云南泉看樓打樓雲岩洞山一起一倒五祖戒云南泉只解移風不解易俗雲若洞山夢中說夢五祖演祖云夫善知識須明決擇為什麼他人道得也道得他人道不得也道不得還知南泉落處麼白雲為你注破得又是誰道來不得又是誰道來師云如上老宿各出一隻手扶樹南泉撿點將來總欠勦絕若是問著山僧只向他道用鐫作麼非唯善赴來機抑且不失宗眼上堂三世諸佛日日出興大藏靈文時時顯露諸莊禾苗正青山門作福保護諸人未開卷時是一段義諸人正開卷時是一段義諸人既開卷後是一段義所謂初善中善後善其義深遠其語巧妙直是純一無雜具足清白梵行之相過去諸佛已說現在諸佛正說未來諸佛當說卓拄杖野水自添田水滿晴鳩却喚雨鳩歸上堂舉子湖和尚忽一夜於僧堂前呌捉賊大眾昔驚有一僧從堂中出子湖擒住云捉得也捉得也僧云不是某甲湖云是即是只是你不肯承當師云子湖好與二十拄杖何故誣人之罪以罪罪之上堂東山演和尚云病來又病皮黏骨可殺驚人抖擻起來無一物却較些子行不成步語聲低描也描不成𦘕也𦘕不就鼻孔依然高突兀築著礚著好大眾古人發揮到無發揮處直是驚天動地邁古超今山僧一夏已來病來病去病得起來內不見有四大五陰外不見有山河大地上不見有諸佛下不見有眾生中不見有自己淨躶躶赤洒洒沒可把幸自可憐生無端侍者進退一段公案未了今朝月望拈香底拈香揖客底揖客濡毫底濡毫請法底請法直要山僧向太虗空中大書皇帝萬歲四字莫有為山僧代筆者麼舉起拂子云文明齊北極睿筭等南山擊拂子下座上堂今朝七月一一夏相將畢汝等參玄人也須明得失喝得又得箇什麼失又失箇什麼擊拂子白雲乍可離青嶂明月難教下碧天解制小參秋風淅淅玉露溥溥蟬噪林間蛩吟砌下揭示生佛未具已前一段奇特大事借使千聖出頭各以出過天女辯才音聲善巧發揮莫過於此所以道欲從觀音門入者蝦蟆蚯蚓與汝發機欲從文殊門入者墻壁瓦礫與汝發機欲從普賢門入者一亘晴虗森羅萬象與汝發機豈不見鏡清一日問僧云門外什麼聲僧云蛇咬蝦蟇聲清云將謂眾生苦更有苦眾生一日又問僧云門外什麼聲僧云雨滴芭蕉聲清云欲得不招無間業莫謗如來正法輪一日又問僧云門外什麼聲僧云簷頭雨滴聲清云眾生顛倒迷己逐物僧云和尚尊意如何清云洎不迷己僧云洎不迷己意旨如何清云出身猶可易脫體道應難好大眾劍輪揮處日月沉輝寶杖敲時乾坤失色欲明恁麼事須是恁麼人若是恁麼人愁甚恁麼事即今秋初夏末兄弟家東去西去前途忽有人問如何是恁麼事畢竟作麼生祗對若道不得木上座與汝代一轉語去卓拄杖自出洞來無敵手得饒人處且饒人復舉仰山夏末上問訊溈山溈云子一夏都不上來在下面做得箇什麼仰云鉏得一片畬種得一籮粟溈云子可謂不虗過一夏仰山却問溈山云和尚一夏作得箇什麼溈云日裡一餐夜後一寢仰云和尚亦不虗過一夏道了不覺吐舌溈云寂子何得自傷己命師云溈仰父子大似萬仞龍門動即生風起浪爭如靈岩這裏一夏以來上既無言下亦無語自然平怗怗地還委悉麼水歸大海波濤息雲到蒼梧氣象閑然雖如是更聽一頌鉏畬種粟功非少飽飯安眠德不孤倒腹傾腸都說了不知秋色在庭梧久立珍重上堂一葉落天下秋神仙何必更封侯一塵起大地收萬里銀河輥玉毬卓拄杖有意氣時添意氣不風流處也風流進退頭首并謝大雲長老上堂一椎便就揭開華藏十三重不假一椎抹過無邊香水海兩堂下喝賓主歷然照用同時與奪自在便見大雲彌覆六合清風甘澤順時百果成熟且結角羅文一句作麼生道趂時蓋却屋乘時刈却禾輸納王租了鼓腹恣謳歌上堂年年是好年日日是好日因什麼三年一閏九日重陽青青翠竹總是真如黃華無非般若因什麼道得之於心伊蘭作栴檀之樹失之於旨甘露乃蒺䔧之園雲門道盡乾坤大地無纖毫過患猶是轉句不見一色始是半提更須知有全提時節如何是全提時節參末宗西堂至并謝頭首上堂一大藏教道什麼如是我聞先已錯廣福堂前正令行空裡磨盤生八角主賓互換縱奪臨時掀翻大海躍倒須彌擊拂子大湖三萬六千頃月在波心說向誰上堂更月已來有三種奇特大事諸人還猛省麼昨早陞堂拈香祝贊是第一種奇特事夜來小參為存家教是第二種奇特大事今朝擊鼓慶賀書雲是第三種奇特大事每一種奇特事有百千萬億種奇特事為其眷屬過去諸佛已說未來諸佛當說見在諸佛正說過去菩薩已聞未來菩薩當聞見在菩薩正聞說已說了聞已聞了畢竟奇特事在什麼處擊拂子鴛鴦繡出從君看不把金針度與人上堂舉一不得舉二放過一著落在第二二由一有一亦莫守一心不生萬法無咎就地捉將黃葉去入山推出白雲來臘八上堂半夜逾城六年苦行忍凍吞飢做盡伎倆明星現時正眼豁開便道盡大地眾生具有如來智慧德相只為妄想執著不能證得於是起道樹詣鹿苑便有涅槃音法僧差別名咄也是為他閑事長無明上堂首座已出世首座已行脚掀翻華藏海撼動黃金鐸萬仞峯頭不露身擡眸始信乾坤窄上堂入城思量上堂歸來舉似大眾只恐聽事不真未免喚鐘作甕便下座上堂前無釋迦後無彌勒中無自己鐘樓上念贊床脚下種菜甜瓜徹蔕甜苦瓠連根苦時有僧問心不是佛智不是道還端的也無師云喫飯止飢飲水定渴僧云智不到處切忌道著作麼生師云塞却耳根分明聽取僧擬進語師震威一喝便歸方丈小參今夜又是臘月三十日了也你諸人一年三百八十四日內所作所為神通光明不可思議因什麼特地忘却鼓聲纔動大小雲臻擬聽山僧說黃道黑山僧又豈肯向淨地上拋沙撒土塗涴諸人蓋為諸人分上各有一段神通光明實謂不可思議還信得及麼還撿點得出麼其或未辨端倪山僧不借眉毛却須為汝點出你諸人眼處所有神通光明不可思議你諸人耳處所有神通光明不可思議你諸人鼻處所有神通光明不可思議你諸人舌處所有神通光明不可思議你諸人身處所有神通光明不可思議你諸人意處所有神通光明不可思議你若心不附物意不停玄眼處便可作耳處佛事耳處便可作鼻處佛事鼻處便可作舌處佛事舌處便可作身處佛事身處便可作意處佛事一根既爾諸根亦然一法既爾諸法亦然一人既爾諸人亦然所以知事能作知事佛事頭首能作頭首佛事耆舊能作耆舊佛事大眾能作大眾佛事脫若彼我混融能所俱泯知事便可作頭首佛事頭首便可作知事佛事頭首知事便可作耆舊大眾佛事耆舊大眾便可作頭首知事佛事譬如摩尼映於五色又如帝網交光相羅一一融通無壞無雜豈惟諸人分上如是三世諸佛亦如是六代祖師亦如是天下老和尚亦如是山僧亦如是拄杖子亦如是拈拄杖即今拄杖子以本有自性神通光明却作德山臨濟廣大佛事去也卓拄杖喝一喝復舉三角示眾云若論此事眨上眉毛早已蹉過時麻谷出眾云眨上眉毛則不問作麼生是此事三角云蹉過也麻谷便掀倒禪床三角劈脊便棒師云二員古佛然則縱奪可觀其奈傷鋒犯手山僧者裡自來未曾提著此事諸人也未曾眨上眉毛中間固無蹉過不蹉過底道理諸人既不掀倒禪床山僧也不劈脊便棒自然聲和響順形直影端非唯主伴互融抑亦人天欣悅擊拂子水歸大海波濤息雲到蒼梧氣象閑上堂岩居閴寂遠塵囂多謝同人訪寂寥心月有光吞萬象普天無夜不元宵所以道當明中有暗勿以明相遇當暗中有明勿以暗相覩明暗各相對比如前後步咄這裡是什麼所在說明說暗說前說後咄道火何曾燒却口佛涅槃上堂僧問摩胸告眾入般涅槃釋迦老子誑謼閭閻合與三十拄杖和尚合作麼生師云你也合喫六十拄杖進云過在什麼處師云癡人棒打不死師乃云如來不出世亦無有涅槃以本大願力示現自在法拈拄杖不是大願力卓拄杖不是自在法舉起也千身彌勒放下也隨處釋迦只為諸人眨上眉毛却入娑羅雙樹間去也靠拄杖見之不取千載難忘上堂毗盧藏中有大經卷量等三千大千世界書寫三千大千世界中事藏在一微塵中擊拂子只這一塵向什麼處得來塵既不可得經亦何有於此薦得未離兜率已降王宮未出母胎度人已畢豈不見德山初參龍潭便云久嚮龍潭及乎到來潭又不見龍又不現潭云子親到龍潭一印印定透頂透底上無攀仰下絕己躬常光現前壁立萬仞因甚却向吹滅紙燭處方始腦門著地便乃拈一條白棒佛來也打祖來也打畢竟誵訛在什麼處喝一喝選佛若無如是眼宗風那得到如今上堂僧問以字不成八字不是是什麼字師云一大藏教裡尋取進云恁麼則輝天鑑地去也師云爍破闍梨面門僧又問雲門放洞山三頓棒意旨如何師云沙裡無油又問鳥窠吹起布毛又作麼生師云石中有髓進云如何是祖師西來意師云金鎚影動進云如何是佛法大意師云寶劍光搖進云為復只這是為復別更有在師云海裡須彌日月高僧禮拜師乃云以字不成八字不是一大藏教輝天鑑地雲門放洞山三頓棒沙裡無油鳥窠拈起布毛吹石中有髓金鎚影動寶劍光搖海裡須彌日月高拍禪床下座天壽聖節啟建上堂三千年黃河清五百歲聖人出胸中懷日月掌中握乾坤金輪御而萬國寧玉燭調而四時序光昭文武德邁犧軒八方歌有道之君四海樂無為之化正與麼時且知恩報恩一句作麼生道一氣不言含有象萬靈何處謝無私浴佛上堂舉遵布衲在藥山會中充殿主浴佛次藥山云你只浴得這箇要且不俗得那箇遵云把將那箇來山便休去師云大眾還知二老落處麼其或未善參詳山僧與諸人點出只浴得這箇不浴得那箇是第一杓惡水把將那箇來是第二杓惡水這兩杓惡水無古無今無高無下一時潑出了也三世諸佛回避無門六代祖師回避無門天下老和尚回避無門眾中莫有不受這般惡水底麼良久云舉頭天外看誰是箇般人小參未言先領會無邊剎境於毫端未舉先知融十世古今於當念見前眾等適茲夏首莫不踞菩薩乘脩寂滅行同入清淨實相住持以大圓覺為我伽藍身心安居平等性智如斯標致足可觀光撿點將來未免笑破衲僧口豈不見雲門大師道盡乾坤大地無纖毫過患猶是轉句不見一色始是半提更須知有全提時節大眾你要識全提底時節麼我若全提去便須荒却院散却眾是你諸人擬向什麼處措足事不獲已隨汝顛倒所欲南斗七北斗八多處添些子少處減些子有時拈一莖草作丈六金身有時將丈六金身作一莖草或則於無中唱有或則於有中唱無或則於聖中顯凡或則於凡中顯聖或則於賓中辯主或則於主中辯賓或則有證而有修或則無修而無證或則先照而後用或則先用而後照或則照用同時或則照用不同時是皆從無住本立一切法如將蜜菓換苦胡蘆豈有實法與汝持論喝一法不存翳汝眼睛眼睛不明世界崢嶸卓拄杖劈開華岳連天秀放出黃河到海聲復舉古者道這一片田地分付來多時也我立地待你搆去法眼云這一片田地分付來多時也我坐地待你搆去佛果云這一片田地分付來多時也我今與汝當面慶懺師云立地待你搆坐地待你搆慶懺別有上聞未免違時失候山僧道這一片田地分付來多時也自是你不肯承當且道過在什麼處良久云在家疑是客別國却為親久立珍重上堂今朝四月十五隨分椎鐘擊鼓燈籠動地放光露柱掀天起舞揭開臨濟三玄抽却雲門一顧擊拂子發機須是千鈞弩聖節滿散上堂金剛正體洞徹十虗般若靈光該羅萬有昭昭於心目之間而相不可覩晃晃於色塵之內而理不可分與天地同一覆燾與日月同一照臨與山嶽同一穹崇與江河同一流注所謂佛佛授手祖祖相傳若聖若凡皆承恩力慶逢嘉運仰祝堯齡一句當陽如何舉唱劫石有消日君恩無盡時上堂古德道護生須是殺殺盡始安居會得箇中意鐵船水上浮山僧道有生還有殺無殺亦無生不勞鵝護雪管取蠟人氷這箇說話前日首座已說今日山僧現說異日諸人當說已說現說當說不出者箇時節且道是什麼時節茫茫普熱紛紛下雪倒流四河再發枯枿臨濟德山特地癡枉費精神施棒喝雖然如是誰知遠煙浪別有好思量上堂僧問離四句絕百非請師直指西來意師云拈燈籠來佛殿裡將山門安燈籠上進云還有為人處也無師云若無舉鼎山力千里烏騅不易騎僧禮拜師乃云離四句絕百非西來祖意獨露當機拈燈籠來佛殿裡將山門安燈籠上咄若無舉鼎山力千里烏騅不易騎上堂時節不相饒今朝五月五東家釘桃符西家懸艾虎孤峯絕頂頭也須資一路拈起須彌椎且擊虗空鼓翻身躍倒鬼門關大地山河無寸土喝一喝下座請提點上堂楊岐栗棘蓬東山鐵餕餡多處添些子點即不到少處減些子到即不點萬機俱赴八面玲瓏一句全提風行草偃擊拂子龍得水時添意氣虎逢山色長威獰上堂一葉落天下秋一塵起大地收國師三喚侍者無端賣弄風流靈巖則不然大空升堂小空入室擊拂子多虗不如少實小參第一句下薦得堪與佛祖為師第二句下薦得堪與天人為師第三句下薦得自救不了三句內則不問三句外道將一句來若也道得不妨坐斷報化佛頭超出聖凡途轍又何必九旬禁足三月護生堅守蠟人無繩自縛豈不見文殊三處度夏迦葉欲擯文殊乃見百千萬億佛剎一一佛剎各有文殊悉現在前世尊云迦葉汝欲擯那箇文殊迦葉休去可惜許將成九仞之山不進一簣之土當時迦葉見世尊恁麼道只消便擊椎一下和這釋迦老子一時擯出豈不頭正尾正當時既已放過如今合作麼生擊拂子但存心地正何用問前程復云敘謝已畢擬舉一段因緣供養大眾其奈有妨久立然而知是般事便休得也且作麼生是此事喝一喝今朝七月十四珍重上堂安居禁足此土西天向上一路千聖不傳卓拄杖清淨界中纔一念閻浮早已八千年上堂二三日來智積大士向這裡與諸人說發生萬物無礙法門不到得雷聲浩大雨點全無直得頭上漫漫脚下漫漫若非諸人咬定牙關未免浸爛鼻孔山僧即今與汝本去也萬人遐仰處紅日到天心上堂僧問智不到處乞師指示師云南天台北五臺進云只如古人道切忌道著道著則頭角生又且如何師云識法者懼師乃云一塵入正受諸塵三昧起坐斷上頭關千華生碓觜雲門大師道平地上死人無數過得荊棘林是好手只知開口易不覺舌頭長時有僧出云恁麼則堂中上座有長處也雲門云蘇嚧蘇嚧雲門若無後語爭服得人若是真正衲僧直須荊棘林裡坐荊棘林裡臥前面牛頭獄卒後面馬面阿傍左邊銅柱鐵床右畔烈河灰刃中間吞底熱鐵丸飲底洋銅汁於一晝夜有萬生死求一毫苦相了不可得求一毫樂相亦不可得求一毫不苦不樂相亦不可得然雖如是要作半箇人也未得在作麼生得十成去良久云劈破華山雷未迅照開滄海月非光瞎驢滅却正法眼直得哀聲滿大唐進退頭首上堂今朝九月九萬物隨時候滿泛茱萸茶何用菊華酒畢竟醉兀兀不似長醒醒諸人若也信得及便見堂中上座決有長處知得堂中上座決有長處便知釋迦老子橫說竪說直說曲說四十九年重重敗闕知得四十九年重重敗闕便知興化堂前饡飯吹香克賓維那全鋒敵勝知得克賓維那全鋒敵勝便知古雪竇抑揚有準韓大伯笑裡藏刀知得抑揚有準笑裡藏刀便知國師三喚侍者三應將謂吾孤負汝却是汝孤負吾雖然且道節文在什麼處擊拂子閃電爍開千聖眼好山多在大湖中上堂僧問和尚未見保寧時如何師云眉毛在眼上進云見後如何師云鼻孔大頭垂進云恁麼則全承渠力去也師云夜半放烏雞師乃云三世諸佛向火𦦨上轉大法輪演出一大藏火𦦨為三世諸佛說法三世諸佛立地聽演入一大藏拈出一大藏與誰論出入鮎魚上竹竿俊趂不及離四句絕百非小玉聲中得路歸活袞袞阿剌剌千里萬里橫該抹小參大智非名真空絕跡欲得現前莫存順逆盡十方世界是箇華藏海盡十方世界是箇舍那身一椎便就塞壑填溝不假一椎輝天鑑地可以弘揚祖道可以建立化門可以全主全賓可以同生同死其或情存限量識昧圓常枯木巖前寧免蹉路僧問趙州如何是不錯路州云識心見性是不錯路妙喜云棒打石人頭剝剝論實事不用作禪會不用作道會你要得不錯路直須是識心見性始得且作麼生是識底心見底性有般漢便道有水皆含月無山不帶雲恁麼見解正是鄭州出曹門大眾好本天下同豈不見兜率悅和尚云撥草參玄只圖見性即今上人性在甚處既見性了即脫生死眼光落地時作麼生脫脫得生死即知去處四大分散時向什麼處去前箭猶輕後箭深你禪和家出叢林入保社正是為什麼邊事你若能識自本心見自本性了便如白衣拜相等閑平步丹霄出一言施一令自然風行草偃水到渠成且不用倚人門戶傍人墻壁便乃能驅役一切人一切人無有能驅役汝者豈不是大丈夫兒成就大丈夫事若也尋言覔句逞解逞能以有思惟心測度如來圓覺境界如取螢火燒須彌山終不能著以拂子畫一畫云今夜群陰剝盡明朝一陽復生大家履踐通天路莫向時人行處行復舉五祖演和尚云僧問趙州如何是祖師西來意州云庭前栢樹子恁麼會便不是了也僧問趙州如何是祖師西來意州云庭前栢樹子恁麼會方始是師云一等是恁麼說話就中因甚有是不是山僧借婆帔拜婆年去也幽幽寒角發孤城十里山頭漸杳冥一種是聲無限意有堪聽有不堪聽久立珍重上堂舉保寧和尚云若說佛法供養大眾未免眉須墮落若說世法供養大眾入地獄如箭射去此二途當說什麼三寸舌頭無用處一雙空手不成拳師云用盡自己心笑殺他人口上堂雪嶺六年弄巧成拙出得身來天闊地闊好事大家知今朝臘月八仙巖仲謀和尚遺書至上堂杜城山頂打鳳羅龍黃池水邊張蝦釣鼈逗到衣錦還鄉一味斬釘截鐵如今傀儡線索斷五色祥麟步天岸有伴何妨却再來了却先師舊公案且先師公案作麼生了卓拄杖喝一喝上堂恁麼恁麼真不掩偽不恁麼不恁麼曲不藏直恁麼中有不恁麼不恁麼中却恁麼南天台北五臺一大藏教五千四十八卷半滿偏圓權實空有鳥窠吹起布毛侍者便悟去即不問兔頭截角道將一句來明招云這裡風頭稍硬且歸暖處商量大眾隨至方丈明招云纔到暖處便要瞌睡以拄杖一時趕散通方上士未舉先知後學初機椎聲斷後上堂顧視大眾云這裡莫有作家戰將麼時有僧出眾云盡大地是箇問頭和尚作麼生答師云遍虗空是箇答語是你作麼生領僧云萬福師云拄杖不在苕帚柄與你三十僧云諸方有明眼人在師云你莫是患盲麼僧無語師喝云將謂是收燕破趙之才元來也做未得行間小卒在出去師乃云若論戰也箇箇力在轉處到者裡直須通方上士本色英流寸刃不施全鋒敵勝其或未然擬議不來髑髏粉碎卓拄杖喝一喝下座為曙講主下火幾時不得問平安今日重來已涅槃寶鐸自從天上去金棺還向火中焚某人親見老南高提正印四河翻辯兩董名藍不離百界千如妙闡一心三觀能事既畢袖手來歸高臥一菴大忘人世以火把打圓相敢問大眾且道者箇是假觀耶空觀耶中觀耶若向者裡科點得出便見暘谷講師六十四年前無假不空無空不假六十四年後全空即假全假即空正當六十四年中假空俱不立中道亦非安直饒與麼批判得去也出者箇圈子不得出得出不得拈向一邊畢竟勝熱婆羅門今日說什麼法咄看渠五熱炙身時十虗猛燄同時發普說釋迦老子三大阿僧祇劫來做盡伎倆至於離兜率降王宮出母胎行七步分手指天地作大師子吼甚生氣槩洎十九逾城三十成道顛倒開口不得便乃脫珍御著弊垢起道樹詣鹿苑周旋三百法會之中大似泥裡洗土塊逗到精神用盡向靈山會上百萬眾前拈起一枝花不是大迦葉曲相成褫也好些無折合便乃乘者一笑而對眾曰我以正法眼藏涅槃妙心實相無相微妙法門付囑摩訶迦葉教外別行傳付將來無令斷絕元來從前做盡伎倆只為發明者一著子所謂鯨吞海水盡露出珊瑚枝便是者箇時節不是從前布置到羅紋結角處心眼相似力量一般未免勞而無功自滅度後聲教所至若師若徒多是不省得者箇意思各宗其宗各黨其黨各熱其說互相是非所謂師子身中蟲自食師子肉殊不知教之與禪只是一箇道理以要言之禪是教之父教是禪之爺毀父而譽爺非愚則狂耳前大慈雲屋瑞華嚴法師學該內外聲聞四馳自忘其大紆訪南堂區區以禪宗要旨為問自非高識遠見略去邊幅何能下人之若是雲屋既以真誠相及余雖衰繆又豈可不以真誠相報遂喝一喝云若向者一喝下便領得去可謂作家其或未然不免為蛇𦘕足去也吾宗自大迦葉二十八傳而至菩提達磨入此土為初祖良以真丹有大乘根器故不立文字直指人心見性成佛直接上根不論中下者斯蓋上承佛祖付授之重固非下劣種草所能擔荷垂一機示一境莫非發揚千聖頂𩕳上一著子是以簡繁剔冗自有不期然而然者若夫旁蹊曲徑普攝圓融則一大藏教已具又何俟別傳之說是以達磨西來十萬餘里逾沙越漠遠汎重溟三周寒暑至於中國游梁歷魏無所契合兀坐少林者九年不料撞著一箇渾鋼打就生鐵鑄成底硬脚禪和名曰慧可大師渠本是箇愽綜群書靈利座主左淘右汰莫稱己懷乃慨然曰周孔之教禮術風規莊老之言未盡妙理吾聞洛陽有菩提達磨者吾之師乎此志既發便有脫胎換骨之祥空神顯告之驗既至立深雪聞誨勵取利刀斷左臂以示懇切於是達磨示以安心法門遂登祖位又四傳而至六祖大鑑道滿天下其間青原南嶽兩枝尤盛又三四傳而五家宗派出焉實為龍驤虎驟鶻擊鷹揚靈機妙用可以神會難以事求子細看來大似箇賣卜樣子豈不見六祖謂南岳曰昔般若多羅語達磨曰震旦雖闊無別路要假兒孫脚下行金雞解衘一粒粟供養十方羅漢僧向後佛法從汝邊去出一馬駒蹈殺天下人去在病在汝心不須速說內卦已成更求外象先天二年居南岳般若寺開元中有沙門道一者在衡岳常習坐禪岳知是法器外象來也往問曰大德坐禪圖什麼一曰圖作佛行年在坎岳乃取一塊塼於菴前磨一曰磨作什麼岳曰磨作鏡一曰磨塼豈得成鏡家先作祟岳曰磨塼既不成鏡坐禪豈得成佛五鬼臨身一曰如何即是化紙燒錢岳曰如牛駕車車若不行打車即是打牛即是一校受領一無以對病在膏肓岳又曰汝學坐禪為學坐佛若學坐禪禪非坐臥若學坐佛佛非定相於無住法不應取捨汝若坐佛即是殺佛若執坐相非達其理動遭天羅一聞示誨如飲醍醐靜遭地網禮拜問曰如何用心即合無相三昧佛也救不得岳曰汝學心地法門如下種子我說法要譬彼天澤汝緣合故當見其道且試一服返魂湯又問道非色相云何能見岳曰心地法眼能見乎道無相三昧亦復然矣一曰有成壞否岳曰若以成壞聚散而見道者非見道也聽吾偈曰心地含諸種遇澤悉皆萠三昧華無相何壞復何成一蒙開悟心意超然死中得活有甚用處侍奉十秋日益玄奧後開法江西是為馬祖漢州什邡縣人也姓馬本邑羅漢寺出家容貌奇偉牛行虎視引舌過鼻足有二輪文祖既符懸記密受心印大弘玄化弟子堪為人師者一百三十九人自餘潛光匿跡者不可以數計洪州百丈海禪師初參馬祖一日侍行遊山次見一群野鴨子飛過去祖問曰是什麼丈曰野鴨子祖曰什麼處去丈曰飛過去祖遂扭丈鼻丈忍痛失聲祖曰又道飛過去那邊落節者裡本丈於言下有省却歸侍者寮中哀哀大哭等閑拋一釣驚起碧潭龍同事問曰憶父母耶丈曰無事曰被人罵耶丈曰無依實供通事曰哭作什麼丈曰我被和尚扭得鼻頭痛實問實對事曰有什麼因緣不契丈曰汝問取和尚出身猶可易脫體道應難同事往問馬祖祖曰是伊會也冬瓜印子汝去問取他撥轉船頭同事歸寮丈乃呵呵大笑者風顛漢事曰適來為什麼哭如今為什麼笑描也描不成丈曰適來哭如今笑𦘕也𦘕不就同事惘然後來松源和尚拈云當時若撞著聱頭說什麼百丈馬祖也須倒退大慧頌有時笑有時哭悲喜交并暗催促此理如何舉向人斷絃須是鸞膠續大慧和尚甚生氣槩猶向古人背後叉手薦福亦有一頌哭不徹笑不徹倒腹傾腸向君說父子非親知不知擡頭腦後三斤鐵松源老祖摟出心肝五臟也未出得他古人南堂不肖孫亦有一頌苦便哭樂便笑苦樂雙忘不同調高山流水少知音明月清風古皇道還委悉麼從前汗馬無人識只要重論蓋代功明日祖陞堂眾方集丈便卷却面前禮拜席生死根本祖便下座歸方丈丈隨至祖問曰我未曾說話汝因甚便卷却席何須更問丈曰昨日被和尚扭得鼻頭痛破也破也祖曰汝昨日向甚處留心探竿影草丈曰今日鼻頭又不痛也墮也墮也好與本分草料祖曰汝深明今日事砑郎當漢丈作禮而退異日再參次祖以目顧視繩床角拂子無風起浪丈曰即此用離此用也好與一拶祖曰汝已後開兩片皮將何為人就窠打劫丈取拂子竪起草本不勞拈出祖曰即此用離此用一箭中紅心丈掛拂子於舊處喪身失命祖震威一喝不為分外厥後開法於百丈山道化尤盛得法上首黃檗運禪師一日辭丈丈曰什麼處去檗曰欲禮拜馬祖去丈曰已遷化也檗曰未審有何言句丈遂舉再參因緣乃曰我當時被馬大師一喝直得三日耳聾檗聞之不覺吐舌見箇什麼丈曰汝已後莫承嗣馬祖麼甕裡何曾走却鼈檗曰不然今日因師舉得見馬大師大機之用且不識馬祖若嗣馬祖喪我兒孫赤土塗牛嬭丈曰如是如是見與師齊減師半德見過於師方堪傳授接得封皮作信傳檗便禮拜禍事禍事大慧和尚曰百丈被喝直得三日耳聾黃檗聞舉不覺吐舌百丈疑其承嗣馬祖後因臨濟三度問佛法的的大意三度被打六十拄杖便是與三日耳聾出氣日中陽𦦨臨濟始覺如蒿枝拂相似眼裡空華既是師承有據因甚用處不同會麼曹溪波浪如相似無限平人被陸沉也只分踈不下看他老大慧將他祖父子孫四世機緣只據自己見處與伊批判直是毫髮不差蓋妙得活祖師意自與尋常人不同也若是自家眼目不明便看他古人不破看他古人不破便是自家眼目不明自餘印板上打來模子裡脫出有甚共語處豈不見宋徽宗時太尉陳良弼設千僧齋圓悟勤祖法真一公慈受深公蹣菴成公及善華嚴等十大法師皆在會而善公遽起問諸禪曰吾佛設教自小乘至于圓頓掃除空有獨證真常然後萬德莊嚴方名為佛甞聞禪宗一喝能轉凡成聖則與諸經論似相違背今一喝若能入吾宗五教是為正說若不能入是為邪說把髻投衙抱贓呌屈圓悟以目顧蹣菴菴乃云承法師所問不足以勞三大禪師之答只淨因小長老亦可使法師無惑雷聲浩大雨點全無菴乃召善善應諾菴曰法師所謂吾法小乘教者乃有義也大乘始教者乃空義也大乘終教者乃不有不空義也大乘頓教者乃即有即空義也一乘圓教者乃不有而有不空而空義也如我一喝非唯能入五教至於工巧技藝諸子百家悉皆能入乃震聲喝一喝問善曰聞麼曰聞菴曰汝既聞則此一喝是有是能入小乘教良久又問善曰汝今還聞麼曰不聞菴曰汝既不聞則此一喝是無是能入始教遂顧善曰我初一喝汝既道有喝久聲銷汝復道無道無則元初實有道有則而今實無不有不無是能入終教我有喝之時有非是有因無故有無喝之時無非是無因有故無即有即無是能入頓教須知我此一喝不作一喝用有無不及情解俱忘道有之時纖塵不立道無之時橫徧虗空即此一喝入百千萬億喝百千萬億喝入此一喝是能入圓教善乃起再拜澤廣藏山理能伏豹菴復謂曰非唯一喝為然乃至一語一默一動一靜從古至今十方虗空萬象森羅六趣四生三世諸佛一切聖賢八萬四千法門百千三昧無量妙義契理契機與天地萬物一體謂之法身三界唯心萬法唯識四時八節陰陽一致謂之法性是故華嚴經云法性徧在一切處有相無相一聲一色全在一塵中含四義事理無邊周徧無餘參而不雜混而不一於此一喝中皆悉具足猶是建化門庭隨機方便謂之小歇場未至寶所殊不知吾祖師門下以心傳心以法印法不立文字見性成佛有千聖不傳底向上一路在空拳謼小兒善曰如何是向上一路莫妄想菴曰汝且向下會取放過一著善曰如何是寶所含元殿上猶問長安菴曰非汝境界灼然灼然善曰望禪師慈悲把手拽不入菴曰任從滄海變終不為君通可煞壁立萬仞善乃膠口而退遲八刻當時徽宗私幸目擊盛事皇情大悅將謂無人證明是你諸人要識善華嚴麼不是一番寒徹骨爭得梅花撲鼻香豈不見昔日周金剛名重西蜀於性相諸宗無所不達甞謂同學曰一毛吞海海性無虧纖芥投鋒鋒利不動學與無學唯我知焉洎聞南方禪宗大盛氣為不平乃曰出家兒千劫學佛威儀萬劫學佛細行不得成佛南方魔子敢言直指人心見性成佛我當摟其窟穴滅其種類以報佛恩遂擔一擔青龍疏鈔出至澧陽路上見一婆子賣餅因放下擔子買點心喫爛泥裏有刺婆指擔子曰者箇是什麼答云青龍疏鈔婆云講何經周云金剛經婆云有一問若答得施與點心若答不得且別處去經中道過去心不可得現在心不可得未來心不可得未審座主點那箇心生鐵蒺藜當面擲周無以對塞斷咽喉遂往龍潭至法堂曰久嚮龍潭及乎到來龍又不見潭又不見好箇消息潭於壁內引身出云子親到龍潭著忙作麼周無語當面蹉過遂放下擔子朝夕咨參一夕侍立次潭云更深何不下去周珍重便出却回云外面黑潭度紙燭與之擬接便吹滅周大悟便禮拜潭云子見箇什麼周云從今去不疑天下老和尚舌頭也玄沙道底來日潭陞座謂眾曰可中有箇漢牙如劍樹口似血盆一棒打不回頭向孤峯頂上立吾宗去在乞兒籮易滿周於是取疏鈔堆向法堂前舉火炬云窮諸玄辯若一毫置於太虗竭世樞機似一滴投於巨壑焚之而去始終作家李都尉云參禪須是鐵漢著手心頭便判直趣無上菩提一切是非莫管便是者般樣子也後來出世住德山其道大振示眾曰道得也三十棒道不得也三十棒臨濟聞得謂侍者洛浦曰汝去問他道得為什麼三十棒浦如教而問山便打浦接住與一送山便歸方丈浦回舉似臨濟濟云我從來疑著者漢雖然你還識德山麼浦擬議濟便打是精識精是賊識賊然而精金百煉要須本分鉗鎚若是鈍鐵頑銅堪作什麼山僧今日被雲屋法師輕輕一拶直得口似乞兒破席袋狼藉不少眾中忽有一箇傍不甘底出來拽下禪床爛椎一頓翻身一擲抹過太虗將他從上若佛若祖所有法門盡情拈向一邊教他盡大地人卸下膱脂帽子脫却鶻臭布衫非唯截斷小淨因脚跟抑且與善華嚴雪屈豈不快哉還委悉麼驚群須是英靈漢敵勝還他師子兒卓拄杖喝一喝
