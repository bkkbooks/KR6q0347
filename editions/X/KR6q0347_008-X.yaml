body:
  text: 法語小師比丘景毅大圓等編示欽維那士之慕於道者日用敻然與流俗異鞠其所存未始不由忱信痛敬而能致然者雖安利勉行之不同其為敬信則一也何則非敬則無以起信非信無以成敬始於一念終於永刧而莫我渝者其唯大丈夫哉嘉禾欽維那頃甞從予遊澹靖淳謹切切於斯乃以敬菴榜其室求余發其義以道其至庶幾不陷於邪妄之域予既憐其誠而壯其請謂之曰大哉敬乎三世聖人歷代開士莫不自此而出三千威儀八萬細行莫不自此而生神通光明辯才智慧菩提涅槃真如解脫莫不由斯而起三途六趣生死輪回煩惱塵勞無明惡業莫不由斯而斷斷無所斷無所不斷起無所起無所不起生無所生無所不生出無所出無所不出如是了知如是成就於法於心離諸執著所謂是真精進是名真法供養如來豈惟天台智者親見靈山一會儼然未散當知山僧即今與汝向多寶塔中平分半座如是如是雲開日出不如是不如是地裂天崩如是中有不如是不如是中却如是打失鼻孔換却眼睛欽維那惺惺著他時後日莫受人謾示寶藏主學此道者大貴精敏而沈潛精敏而不為物惑沉潛而不與物競不為物惑則虗而靈不與物競則寂而妙然精敏沉潛亦豈易至哉良由內見通明前境湛淨莫非夙有靈骨具大智慧觸境遇緣不待照燭而諸法自泯六根互用一體同觀不滯不著離諸色相所以觀自在行深般若而五蘊皆空度一切苦厄便是者个時節者个時節不從人得只消日用現行常自撿點世出世間何處有一法可得擔帶直是淨裸裸赤洒洒上無攀仰下絕己躬常光現前壁立萬仞如大火聚一切物近傍你不得如太虗空一切物栖泊你不得自家涵養資人鍛鍊却要就本色爐排惡辣鉗鎚發大勇猛不退不怯自然久久入妙堪為法器非惟自利亦可利人回入塵勞普攝群有總是菩薩不思議解脫境界又何佛法玄妙向上向下之足芥蔕耶古人道得坐披衣向後自看決非小緣却須努力示杲藏主學道之士為生死未明尋師決擇自非志量宏遠氣岸卓絕未免半信半疑半進半退終而無益李都尉云參禪須是鐵漢著手心頭便判直趣無上菩提一切是非莫管須是恁麼始得人身難得正法難逢既得人身又逢正法於此不堅確勇猛究竟到百了千當處誠為無知人也無知之人與草木何異以余觀之草木尚有用無知之人將焉用乎無用且置然而自暴自棄汩沒生死何時而出可痛惜也禪是斷生死底刀子禪是解執結底觽子禪是辯妍醜底鏡子禪是斬邪妄底劍子禪是伐荊棘林底斧子禪是破怨敵底䇿子禪是成佛作祖底本子以故佛祖依之而建立眾生由之而得度禪之功用若此可不盡心乎不盡心則不得其力不得其力則勞而無功勞而無功則不見禪之真體也不見禪之真體則無以為人無以為人則慧命斷絕慧命斷絕則何以為僧耶佛者覺也自覺覺他覺行圓滿可謂了事大丈夫矣今世學佛而不知佛道之廣大周備則誠為忝竊耳豈有奇男子肯為忝竊哉古德云設有一法過於涅槃吾說亦如夢幻自非得夢幻之真則不足以見涅槃之體涅槃之體尚不見況過於涅槃者耶除非知有莫能知之古人垂一言半句政在解黏去縛抽釘拔楔豈有實法繫綴於人多見學者執指為月求玄妙求解會以當宗乘深可憐憫所以此事在上根利智見不為難稍若機器陋劣加以怠墯棄本逐末則無有得期真自外也龐老云但願空諸所有慎勿實諸所無此語最好苟能以此為心則得無限力也心性無染本自圓成但離妄緣即如如佛迷則違真逐妄悟則舍忘歸真到得真妄雙融迷悟無寄然後隨緣消舊業任性樂天真興慈運悲拯濟孤露忘能所滅影象為過量人住過量境界作過量事豈不綽綽然有餘裕哉示快藏主王老師道盡大地覔个痴鈍人難得軒知此事不可以聦明靈利計較機謀而得學道之士死却偷心百不知百不會如土人木偶一念萬年去一條白練去古廟香爐去始有少分相應死得絕氣息了忽然猛省如睡夢覺如蓮華敷歷劫未明之事廓爾現前百千神通門百千三昧門乃至一切戒門定門慧門悉自具足然後靠著本色咬猪狗宗師相與入泥入水上刀山入火聚鼻孔相挨眉毛廝結徹頭徹尾同死同生拳來躍去喪却目前機脫去胸中物回視三世諸佛歷代開士天下老和尚所有伎倆不勘自敗等閑拈一莖草作丈六金身將丈六金身作一莖草收放自在殺活縱橫設使德山臨濟雲門趙州再出頭來也須斫額有分自餘半青半黃依草附木精靈望涯而退不在言也扶桑快藏主天資俊敏而能下遲鈍工夫蓋從道場雙峩大爐排中鍛鍊已久不妨是一枚法器將還本國接物利生卒未能相見欲得法語以助進修觀其趣向決不肯辱師友負初心乃為書此若是無智人前又安敢妄通消息哉示景維那古來行脚高士為生死未明尋師訪道賣却布單不問千里萬里但有本色宗匠可以依歸者杭深梯險不惜軀命以從之遊冀其一言開發蒙昧至於大安樂田地而後推以及物非所謂遊州獵縣看山門境致而已近日法道陵替居師位者出於僥倖不本宗猷歆艶浮名循習齷齪務多其類以為接人新進後生一乍入眾無所知覺撞入網中不能自出將謂宗門事止於此政如經鮑魚之肆不知與之俱化耳餘波末流靡所不至抑少室之道廢興有數乎然而諸方大剎星羅棊布又焉敢謂盡無作者以拯淪溺殆恐魔強法弱蔑如之何耳豈不見大愚和尚云大家相聚喫莖虀若喚作一莖虀入地獄如箭射者个便是楊岐金剛圈栗棘蓬底消息蓋從上諸祖垂一機示一境莫非與人解粘去縛抽釘拔楔初無二致所以雲峯悅禪師服勤既久用心益固及乎打破漆桶走上方丈忘納其屨大愚望見之便云維那且喜大事了畢看他先德一啐一直是透頂透底總似今時何處有宗門事耶建溪景維那方事徧參求語為龜鑑會余謝事杜門而請不已不覺引起葛藤亦何異靈龜曳尾哉示世侍者世出世間只一句子逆順縱橫無有不在此中也得之於心應之於手則八萬四千塵勞塵塵解脫八萬四千法藏法法全彰可以津濟四生可以梯航九有不著佛求不著法求不著僧求但能於趙州狗子佛性話上啐地折剝地斷自然百了千當矣其或未然莫道坐破七个蒲團走徧四天下於此事料掉沒交涉世侍者為者一句子使得來大唐國裡東尋西討大似趨越首燕不知不覺被人指到山僧處喫了多少鈍置看渠儘自耐得拳躍所謂大冶精金應無變色昔大隋參七十餘員善知識於其中間具大眼目者只有一二且作麼生是具大眼目者於斯了了始可罷參脫或躊躇鄉關萬里示煜藏主我觀如來大光明藏出生一切諸光明海若聖若凡情與無情無有不具此光明之體顯示此光明之用本末全收卷舒無碍自利利他無有窮盡如大日輪升于虗空普照一切無有分別能照所照二俱空寂而諸有情資其照臨各各成辦所作事業從始洎終各不相知亦不相借殆不知所以然而然而於日光明照無所虧減斯蓋本有靈明非從他得而昧者不悟豈終昧也夫儻能一念回光便同本得故曰道不遠人即心而證其不然哉示化主僧問雲門如何是塵塵三昧門云鉢裡飯桶裡水靈利漢向者裡驀提得去直饒攪長河為酥酪變大地作黃金供養你也未為分外其或未然幸有七佛已前一段奇特大事不妨信受奉行左穿通衢右入聚落拶透千門萬戶撞著一箇半箇徹底知音便見所作已辦滿載歸來教他一眾飽地去豈不快哉靈岩山中自圓照慈受闡化之後未曾有用這一著者山僧此來承乏比及三年方外高人來茲道聚朝鐘暮鼓粗成叢林不謂丁茲歉歲糧食既匱而戶外之屨益增却之弗可延之無術念念欲棄去忽思量妙喜樹倒胡猻散之語以告二三友忽徑山霖首座雪竇璉興二藏主翠山芾藏主珩琅殊維那等以持鉢為告余笑而謂之曰是豈爾輩所能為哉夫比丘之法內摧我慢外絕貢高方行等慈鋪心如地猶恐觸境遇緣有當不過處而況有生以來受用自在一旦屈己從人未見其可雖然東山有云至辱莫若乞至樂在無求苟得無求旨雖乞吾何羞淨名道於食等者於法亦等於法等者於食亦等汝能毀於佛謗於法不入眾數乃可受食行矣厚自愛示芾藏主識心達本元故號為沙門非徒方服圓顱之謂也然心體虗寂普應萬機終日作用而有不知之者舍而他求求佛求祖求禪求道誠為顛倒苟悟自心全體洞達則不為法縛不求法脫便見佛祖禪道皆具於我而無一法從外而至者真了事人也僧問趙州云狗子還有佛性也無州云無此箇公案流落叢林在學道之士未有不提撕參究之者於此悟入者固多而錯會者亦不少五祖和尚云趙州露刃劍寒霜光𦦨𦦨更擬問如何分身作兩段這箇便是見得他舌頭落處底樣子後來佛性泰和尚云只一露刃劍已一時頌了後面三句皆是展演之言妙喜深以為然以知得底人拈將出來不妨唱拍相投言氣相合若是承言滯句識情卜度之徒按圖索驥驢年去一大藏教是箇切脚且道切箇甚麼演祖云鉢囉娘者老漢初年行脚見浮山圓鑑和尚甞請益興化卒風暴雨話圓鑑云我有一箇喻子說與你三家村裡賣柴漢子肩頭夯一條檐却問中書堂今日商量什麼事演祖遂低頭云恁麼則大遠在因見白雲咬破一箇鐵酸餡直得百味具足便如師子返擲動是驚人一日三佛立問云佛身無為不墮諸數和尚作麼生說祖云譬如摩尼映於五色摩尼喻佛身五色喻數三佛退而議曰者老漢真是箇老大蟲若是我輩非數紙如何說得了殊不知過量人提持過量事自然不費力豈不見維摩會中三十二菩薩各說不二法門雲興缾瀉莫不自謂契理契機維摩默然無語文殊便乃讚云是知無言無說是真入不二法門咄識甚好惡要知向上宗門爪牙鮮不爾者無他見處透脫力量充足自然水到渠成風行草偃初不費氣力也其或見不透脫力量不充依墻傍壁終無自由分一大藏教總是療狂子之方書苟見徹本元狂心頓歇自然可發一笑矣雖然恩大難酬永嘉云了即業障本來空未了應須償夙債深有旨哉神光不昧萬古徽猷入此門來莫存知解古人之意終不教你坐在無魂必死之地須知不了之人妄認緣塵分別影事遺失真性流浪生死皆知解之咎若是超情離見洞達本元知解不存而無幽不燭如明眼人所見無碍而摸象之流雖競有多說皆可憫耳示道侍者大道只在目前要且目前難覩欲識大道真體不離聲色言語言語動用了無交涉畢竟大道真體在什麼處看他古來老宿提持箇事如日行空如風吹水靈利漢一見便見不假思惟而大道真體不間毫髮所謂啐地折曝地斷自然不借別人鼻孔出氣也佛祖出興莫過為爾作箇先道豈有法可傳授哉故曰大事替你不得小事各自承當阿難曰將謂世尊惠我三昧不知身心本不相代其不然哉二祖云我心未安乞師安心達磨云將心來吾與汝安二祖云覔心了不可得達磨云與汝安心竟政如推門入臼若是方鑿圓柄則無相應日子矣弟子求師易師求弟子難從上列祖於千萬人中撈漉一箇半箇何異披沙揀金將知真正衲僧端不易得黃梅會中有七百眾而衣盂獨付盧行者此事豈可麤心若是未得謂得未證謂證見勝進者心生嫉妬皆增上慢之流耳決欲究明千聖頂𩕳上一著除非具鐵石身心有吞佛祖底氣槩始堪持論豈不見大隋參七十餘員善知識具大眼目者只有一二以此言之則弟子求師亦不易也示琮藏主佛佛授手祖祖相傳莫非以心印心將法付法曾無一毫自外而至者唯是氣類相合機感相應發得出來自然出人意表蓋本於正因不染邪解如芬陀利華雖生淤泥中一點也霑他不著然而真性明妙本自天然一念回光便同諸佛豈不見大梅見馬祖只於即心是佛言下便得安樂水潦遭一蹈遂乃呵呵大笑至於雪峯輥毬俱胝竪指是皆向生佛未具已前揭示此箇無為宗旨豈有玄妙密室分付疑誤後學者哉近世法道不振邪解紛然各各自謂得上人法羅却千百眾胡言漢語如病狂相似全無愧恥而入眾兄弟既非正因皮下無血眼裡無筋將謂佛祖之道止如此相㳂襲蕪穢先宗良可大息除非宿有靈骨不受人謾超然頴脫不與俱化日用應緣唯以從上佛祖為標榜專一其心發弘誓願於此生中成就百千萬劫莫大之事親近一箇半箇真善知識入其爐鞴受得鉗鎚鍛鍊磨礱洞絕瑕纇方始是到家時節然後隨緣任運推以及人以報佛祖庶不虗來人間打一轉也示胤侍者真性心地藏無頭亦無尾應緣而化物方便呼為智其可以有作思惟而得之哉直須斷却心思意想於一切時中竪起脊梁卓卓地提持古德一則話頭善自消息放教精精靈靈不墮在昏沉掉舉處則廓徹靈通凝然湛寂更不起第二念所以道不與諸法作對便是無諍三昧永嘉云亦無人亦無物大千沙界海中漚一切聖賢如電拂若也麤心便謂得大安樂正是大病先聖目之為解脫深坑有氣息底終不坐在這裡真淨云活衮衮明落落拈便起把便撲直下似俊鷹快其肯打死兔耶真不掩偽曲不藏直虎步龍驟神號鬼泣明眼漢沒窠臼截鐵斬釘移星換斗僧問國師如何是本身盧舍那國師云與我過淨缾來僧度與淨缾國師云却安舊處著又理前問國師云古佛過去久矣擊石火閃電光搆得搆不得未免喪身失命豈似如今一等認驢前馬後以為極則提得一件便從頭穿鑿注解說將去豈知有宗門向上事耶且作麼生是宗門向上事咄只許老胡知不許老胡會聲前領旨猶迷顧鑑之端句後明宗尚昧識情之表絲毫繫念三途業因瞥爾情生萬劫羈鎻要須如獅子王哮吼一聲直使狐狸野干悉皆屏跡方可作本分道流若是隨群逐隊醉色沉聲一味踈狂謾神嚇鬼到處逢人亂呈懵袋道我能我解將他古人好言句都看壞了從而教人相欺誑凌滅宗風真是地獄種子也爾輩後生趁色力強健快須決擇教明白見此等人便合敬而遠之政不必與較得失也但念從無量劫來於生死海中頭出頭沒今幸為人遭逢聖教既披法服粗稱沙門試觀他釋迦老子出胎修道成佛度生所有法門自何而起自滅度後大法東漸諸祖迭興提持正印甚生標格只如道未離兜率已降王宮未出母胎度人已畢又云始從鹿野苑終至䟦提河於是二中間未甞說一字且四十九年三百餘會種種行相作麼生消遣到者裡一法不明翳汝眼睛眼睛不明世界崢嶸忽若一息不來便登鬼錄前路漫漫未知何往良可痛心故先德以生死事大無常迅速切切於懷大事未明如喪考妣大事已明如喪考妣豈有閑情安為雜事哉示興藏主宗門中事只貴真參實悟不消嗄地一聲自然透頂透底若未得這一解未免方寸間地不得快活譬如患病之人本為風寒所摶驀地得一服良劑出得一身白汗知他四大有許輕安耶既得輕安却須保養神氣平復方禁得磕𭣟萬一失守舊病復作則不可救也僧問雲門如何是佛門云乾屎橛這裡悟去豈不快哉儻涉思惟白雲萬里但得本莫愁末何謂本何謂末識心見性是本說禪說道是末你若識心見性了信口而說信脚而行無非禪道苟遺其本而取其末所謂業識茫茫無本可據學道之人不識真只為從前認識神無量劫來生死本癡人喚作本來人學者不善區別妄認識心以為自己教中所謂認賊為子其家財寶終不成就淨名云法離見聞覺知若行見聞覺知是則見聞覺知非求法也六祖大師云聞見覺知無障礙聲香味觸常三昧如鳥空中只麼飛無取無舍無憎愛這箇始是到家說話要得相應一念未興已前急著眼看咄學此道只貴脚蹈實地靠實而行若纖毫許掠虗總落魔界打頭一著且論見地明白不受境惑十二時中便得力也你若見不透脫如何做得過量邊事古德道設有一法過於涅槃吾說亦如夢幻若是己眼未開如何會得是他向上人行履處如金剛𦦨如猛火聚無你近傍分不是強為法如是故佛法本無玄妙只是自家本分事只為拋家失業竛竮日久一乍入門覺得奇特及乎穩坐家堂一切境界莫匪尋常自然不驚怪也臨濟云元來黃檗佛法無多子便是這箇消息耳佛道懸曠久受勤苦乃可得成不是見得會得了便休是他先聖入水入泥安住無功用大人境界其可麤心乎末世比丘逴得些子影響便謂百了千當經不看佛不禮一味貢高妄自尊大圖人贊歎以規利養相欺誑習以成風真可憐憫有志之士政須以古人為標榜慎勿隨順顛倒也示燈藏主從上佛祖開示此道無過使人各了本心本性不為外物所誘即是出世邊事非謂別有法可傳授也但於日用二六時中猛著精彩虗明寂照截斷諸緣澹泊無為而不碍汎應則工夫純熟打成一片不妨隨自己力量而行但有一毫利益於人之事勇而為之無利益事自不復作亦無能為所為之相迥絕功勛功勛絕則損益之念不興然而逆順境界不著照了當體寂滅矣祖師云心隨萬境轉轉處實能幽隨流認得性無喜亦無憂一種平懷泯然自盡是也古德提唱一言半句皆為慈悲之故發揮千聖著眼不及處一著子以破後昆之情執貴圖作箇洒洒落落底漢豈有毛髮玄妙可祕重哉後世庸妄素無知識將謂有佛有法有禪有道可以傳授奴郎不辨玉石不分東奔西馳隨聲逐色業緣成熟流入魔黨各各自謂得上人法𮞏相欺誑自悞悞他良可太息除非宿有靈骨不受渠謾直似玄珠下於濁水不與俱化則救得一半耳大凡學佛學祖直須所見所行出他一頭地始得脫或徒有其言而無其志所謂身雖出家心不入道究竟為邪師所攝無疑矣古人云為高必因丘陵為下必因川澤衲僧家一出一處可不慎哉示覺首座曹溪流非止水一滴忽來千波競起灼然是有這箇道理若是力敵勢均不言可知稍涉思惟白雲萬里如今未到箇般田地不免喚作移換人須知宗門中向上事斷斷是別直饒究竟到不疑之地苟大法不明總成土苴豈不見興化在三聖處作首座甞云我向南方行脚一遭拄杖頭未曾撥著一箇會佛法底雷聲浩大三聖聞得乃問你具什麼眼化便喝雨點全無聖云須是你始得是何心行化休去咄聖亦休去咄大覺聞得乃云爭得業風吹到大覺門下來化後到大覺覺請為院主蓋與大覺元是同參一日覺喚院主我聞你向南方行脚一遭拄杖頭未曾撥著一箇會佛法底你具什麼眼探竿影草化便喝不勞再勘大覺拈棒化擬議有甚用處覺便打矢在弦上不得不發化又喝棺木裡瞠眼覺又打灸瘡痕上重著艾炷化明日從法堂上過覺喚院主我直下不疑你昨日兩喝你為我說來為人須為切化云某甲於三聖邊得箇賓主句總被師兄折倒了也與某甲一箇安樂法門老鼠入牛角覺云者瞎漢來者裡納敗闕脫下衲衣痛與一頓殺人須見血化於棒下識得臨濟在黃檗處喫棒底道理精金百煉要須本分鉗鎚豈是麻纏紙裹底生活者一段說話蘊在𮌎中有年矣未曾敢容易對人拈出法姪本心覺首座自曹溪分座而來頂門正眼爍破四天下雨窻拈出以資法喜明日東還見老松月却煩借問如今何處有者箇消息不妨因風語我幸甚示暢藏主實際理地不受一塵理隨事變萬行門中不捨一法事得理融事得理融也寬廓非外理隨事變也寂寥非內古來達士學到聖凡情盡自然體露真常遇物應緣觸目無滯猶未是向上人行履處所以雲門大師道直得盡乾坤大地無纖毫過患猶是轉句不見一色始是半提更須知有全提時節一般漢認得些子影響便乃稱楊稱鄭眼空四海疑悞後學出佛身血若是眼裡有筋底終不肯受他籠絡舉一步抹過千聖頂門拈一機捩轉衲僧鼻孔豈特天魔外道窺覰無門便是四七二三斫額有分豈不見岩頭參德山纔跨門便問是凡是聖山便喝頭便禮拜洞山聞云不是奯公也大難承當頭聞云洞山老漢不識好惡我當時一手擡一手搦又不見德山見溈山直上法堂東西顧視云無無便下去至山門首復云也不得草草再具威儀上方丈相見便云和尚溈擬取拂子德便喝背却法堂著草鞋便行至晚溈問首座新到在麼座云當時便去也溈云此子已後向孤峯頂上盤結草菴呵佛罵祖去在你看他古人一挨一拶略露風規非唯虎驟龍驤直得天回地轉豈似今時叢林無著眼處政不知諸大老向什麼處去也雪竇暢藏主東嘉俊流有志相從江心無言春雨無際僊岩仲謀作偈督遣之業已成行以母病中止未幾會余謝事巖頂甚不自滿茲來南堂道義真切因出三老之偈余為和之既而又欲法語為隨身儆戒不惜口業忉忉怛怛寫此一絡索使其知有宗門體裁脫若一念相應蹈著實際理地遊戲萬行門中涵養磨鍊無滲漏絕依倚撞著咬猪狗手段千盤萬折透出金鎻玄關然後轉向德山巖頭洞山雲門心眼不及處插得手豈不是一員本色道人耶到者裡方知從始洎終未甞不與山僧把手共行矣又何親踈遠近之足云乎哉示祖灊首座大丈夫秉慧劍般若鋒兮金剛𦦨非但空摧外道心早曾落却天魔膽此永嘉大師見曹溪後顯發自得自證三昧以示後人之語也看他初到曹溪繞床振錫底氣象直是卓絕超邁故其所得不在一切人下雖與一切人同處一切人搆他不得除非同得同證者瞥爾相逢一挨一拶略露風規自然驚天動地豈似今時兄弟猥𤨏傝傍人門戶記持野狐涎唾到處討人商量貴圖口裡有得說手裡有得寫逞能逞解以當參學將謂少林直指之道如此而已誠為苦屈教中所謂棄却百千澄清巨海唯認一浮漚目為全潮可憐也哉當此法道下衰之秋全藉有志朋友發勇猛心立深重願將從前所蘊惡知惡覺盡情颺向他方世界外內不放出外不放入寂寂惺惺不與一法作對超然任運兀爾忘緣行住坐臥常將生死事大無常迅速時時舉覺脫或向眼不見鼻孔處見得眉毛在眼上則體本無生了即非速豈永嘉所得專美哉到此境界却須靠著本色宗匠爐鎚鍛鍊敲打出來不妨是箇法器堪以荷負宗門至於從上佛祖機緣無問平易險峻深密淺近相應不相應瞭然如人飲水冷暖有不俟言而知矣然後沉浸涵養日久歲深力量充足日用應緣縱橫得妙為人自為總在其中日損日益初無二致此乃文殊普賢大人境界決非陋劣種性所可企及者也示壽藏主先輩灰心泯志深山窮谷中木食㵎飲其為枯槁有不可勝言而處之自若者自非明見本體與佛祖同一受用其能致是哉蓋緣末上根脚下打辦得乾淨而宿有靈骨稟大智願一出頭來便自頴脫古今天地古今日月古今人倫何古人所能今人莫能彷彿耶且誵訛在什麼處竊甞觀之大凡今人自始至終鮮有且正因者剃染行脚撞入邪師惡友群類中見聞覺知無非聲色交互之事雖有菩提種子不能發生究竟熏鍊成熟築底是箇業識團子也所得既是不真觸著則是非人我得失欣厭交戰於胷中因循苟且相欺誑借使千佛出世也救不得除非自解猛省一刀截斷靠著本色師友動靜施為一以古來明眼尊宿為標榜直將生死事大無常迅速為念理會教徹頭徹尾然後發揮靈智開示後人則不負父母師友生成之德耳舍此則無所取矣見地明白履踐超詣但有所說自然契佛契祖契理契機離文字相離言說相坐斷千差不存途轍既非心意識境界自然風凜凜地耳雜華云知一切法即心自性成就慧身不由他悟固知心生則法生心滅則法滅一心不生萬法無咎苟不知有轉身句未免死在平地上故曰平地上死人無數過得荊棘林是好手虗而靈寂而妙非用功純一受用自在則不能到此境界心如工技兒意如和技者儻脚跟下不得力則二六時遭渠驅役直須一念不生前後際斷則胡猻子自死也胡猻子既死得絕氣息了自然觸目遇緣蕩蕩無礙方見道用玄言妙語道之末也識心見性道之本也古人得其本之大全發而為大機大用雷轟電掣日照天臨揭揚佛祖奧旨而使後學由是而入雖有言語莫非一期方便土苴緒餘奈何流俗摭拾寶重以為奇特棄本逐末何繆之甚余甞論之以箴近習之痼當知性體圓淨智照洞明一切語言文字義理之說或邪或正到家未到家判然無可疑者不然則為其惑耳山僧自幼行脚見善知識未甞有一點玄妙解會在𮌎次中但能於一切處一切時不受人欺耳惟其不受人欺故不自欺惟其不自欺所以不敢欺於人末上下梢只以正智獨照然而照中無智智中無照以要言之則古人所謂紅爐上一點雪便是者箇消息也
