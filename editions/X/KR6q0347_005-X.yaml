body:
  text: 頌古參學比丘文煥克明宗成等編世尊初生指天指地獨稱尊不是興家便滅門拋却金輪聖天子却來方外立乾坤世尊拈華鷲峯龍象數如麻獨有頭陀解笑華半座平分多子塔密傳金縷衲袈裟世尊陞座文殊白椎電卷星飛下一椎早成狼藉徧坤維靈山密意無人會秋後黃華自滿籬未離兜率已降王宮臘月華開火裡蓮神仙秘訣許誰傳一毛端上三千界買斷風光不費錢不問有言不問無言剪斷群機立問端舌頭拖地髑髏乾影鞭良馬知何往月上青山玉一團調達謗佛生陷地獄莫問今吾與故吾胡須赤對赤須胡吹毛未動頭先落烈漢元來是丈夫梵志献華兩手空來放下難一椎擊碎鬼門關堂堂大道如絃直白月清風任往還金棺自舉金棺三帀繞尸羅常與無常會也麼面皺只因陪笑得背駝偏為曲躬多阿難問迦葉金襴外別傳何物金襴之外傳何物問處分明答處端倒却門前剎竿著弟兄終是不相謾殃崛摩羅持鉢賢聖中來不殺生依言說與產家聽當時子母便分免佛法元來自有靈維摩示疾病入膏肓念未灰勞他佛子領徒來不消一服清凉散毛孔重重盡豁開善財南詢覺城東際太顢頇走得娘生兩腿酸樓閣門前一彈指念頭空盡髑髏乾阿育王問賓頭盧阿耨宮中請佛齋本來無位可安排只知隨例餐䭔子也得三文買草鞋廓然無聖廓然無聖全提正令撼動東土西乾拈却佛病祖病寶公既解賞音武帝何妨聽瑩折得莖蘆便度江老子從來太著忙少林一路如絃直五葉華聯劫外芳龐公問馬祖不昧本來身當陽不昧本來身直上何如直下親一曲無絃彈得妙只今誰是賞音人肅宗問國師十身調御十身調御露堂堂直蹈毗盧頂上行但見皇風成一片不知何處是封疆馬祖即心是佛肥不露肉瘦不露骨戲海獰龍捎空俊鶻明眼漢莫輕忽握金剛椎碎窠窟趙州勘婆衲僧脚下路通天舉目臺山總是煙婆子趙州俱勘破不教空費草鞋錢狗子佛性狗子佛性無狗子佛性有擊碎兩重關何處尋窠臼山頭木馬嘶海底泥牛吼堪笑堪悲老趙州黑黑明明三八九寒暑到來何處回避急切相投事有由臨川重下釣鼇鈎因看月掛松梢上不覺青天在屋頭百帀千重是何人境界當陽擊碎連城璧手面分開萬仞崖明月清風兩無價碧潭雲外絕安排俱胝竪指俱胝一指閙浩浩十方剎海俱掀倒如今浪靜風亦恬綠陰滿地無人掃趙州訪臨濟千金駿骨無尋處兩箇木人相耳語白雲飛盡海天高落華片片隨流水大禪佛到霍山集雲峯下四藤條夾鏡方瞳駿馬驕一抹煙沙幾千里相逢誰是霍嫖姚庭前栢樹子九九百百半青半白祖意西來庭前老栢日面佛月面佛名不得狀不得日面月面釋迦彌勒馬師病入膏肓證候鬼神莫測打瓦鑽龜數似麻除却耆婆有誰識有句無句樹倒藤枯意若何溈山特地笑呵呵布單賣却猶閑事惹起無風帀帀波僧問趙州晝昇兜率夜降閻浮為甚摩尼珠不現圓陀陀光爍爍影跡不留十虗昭廓往古來今幾箇知一聲天外黃金鐸臘月火燒山臘月燒山天寬地寬衲衣下事更不相瞞無影樹頭鶴驚殘夢不萌枝上春在曲闌推倒生公點頭石碧潭雲外不相關體露金風樹凋葉落體露金風雲收大野月皎長空華鯨殷殷鼉鼓逢逢神山中聳江漢朝宗如何是道墻外底大道透長安嚴冬日日寒少林深雪裡北斗面南看前三三後三三前三三與後三三數目分明不用參師子教兒迷子訣斷崖千尺倚層嵐丹霞燒木佛高燒木佛禦嚴寒和氣如春四體安自作要知當自受與他院主不相干丹霞燒木佛院主眉須墮古今競商量往往成口過壽山爐排開與君重註破重註破還知麼五熱炙身迷逢達磨夾山見船子明明法眼本無瑕不奈傍觀冷笑何撥轉船頭逢洛浦也能平地起風波德山托鉢德山托鉢小兒嬉賴有巖頭點破伊活得三年便遷化箇中消息幾人知仰山問溈山云大用現前請師辨別暗裡抽衡骨明中坐舌頭幸然平似鏡何用曲如鈎常在家舍不離途中家舍途中同一轍不論空劫與如今鬼神茶飯休拈出南北東西意自深法眼問覺鐵觜趙州栢樹子話暗去明來自有因莫將容易辯踈親鴛鴦繡出從君看不把金針度與人洞山恁麼道即易相續也大難覿面相呈道即難一毫端上萬重山直須坐斷毗盧頂堪與他家共往還鼇山雪夜胸襟流出始相應直得三千海岳崩描不成兮𦘕不就鼇山店裡喚師兄雪峯輥毬截嶺橫岡鼈鼻蛇遭他毒口數如麻無端更把三毬輥又是重添項上枷雪峯示眾大地撮來無粒粟毛端湧出須彌山晨朝打鼓普請看南海波斯念八還玄沙白紙白紙封來落二三鳴鐘集眾為開緘同風句在言詞外不是通人不易諳中原一寶中原一寶見還難不在張眉引手間金殿日高旗影轉一爐沈水萬機閑五祖室中舉小艶詩聲前句後太無端金鴨香消夜未闌一把柳絲收不得和煙搭在玉闌干鉢囉娘一大藏教是切脚東山直示鉢囉娘靈巖今日為君舉醉後添盃禮數長如何是佛肥從口入波波挈挈憨憨癡癡人情若好喫水也肥向上一路千聖不傳夫子不識字達磨不會禪脚跟不點地水底火燒天贊語參學比丘宗胤起宗等編出山相棄金輪位入深山麻麥無功歲又闌開得眼來天地闊斗杓正插鬼門關栴檀佛怛薩阿竭栴檀瑞像肇自優填造於智匠佛從天降像亦地升震旦之記廣利有情歷歲二千三百有七屆于皇元延祐三秩聖主仁宗眷茲聖容史臣奉詔纂緝始終勒文于石用昭聖德前聖後聖聖心允格善哉振鵬王氏之子慕君効忠摹刻以施譬諸滿月影現千江大光普照靡間遐荒瞻之仰之以欣以抃我作贊詞捕風追電有異比丘以金剛經寫成釋迦佛像高不五寸廣則半之可視不可讀為作贊曰三十二相金剛法寶色見聲求是行邪道應無所住而生其心夢幻露電功德之林縱橫倒植珠明玉潤毫端發揮攝入方寸如明鏡中而現色像善哉佛子顯此智藏高安陳茂卿書四大部經求贊善哉茂卿大居士深入諸佛法性海乘彼無始大願力而於一念了萬事隨順世間一切相不壞不雜悉平等與我法性無差互然此法性不可得彼諸世相亦無有以無有故無罣礙於一切處無順逆譬如虗空無所依為諸色相所依止不即不離無取舍具足成就一切法而於一切無作受若能若所寂靜故居士既入此法性無復發起世間想若利若祿如夢幻豈有智者於夢幻一毫端許生染著是名菩薩如幻智居士以此幻智力遊戲一切翰墨海於一微塵出經卷量等三千大千界開敷一切三昧華莊嚴諸佛法性土具足無上大智慧絕生死流到彼岸眾寶積聚如須彌涅槃自性無繫屬發起普賢諸大願於一切處為先導而此居士翰墨海瀰漫洶涌無有涯於一滴中具眾智一一滴中無不爾以一切智入一滴一切智智亦復然是為菩薩無盡藏於一切處作利益是為菩薩大法船於一切處作津濟是為菩薩精進幢於一切處無退屈一切諸佛淨天眼證我作此無畏說普願一切法界海與我所說無涉入令彼居士法性身與諸佛等菩薩等而於諸佛法末世興起廣大諸佛事普使沈溺諸有情同見自性天真佛何山復藏主血書法華募印藏教建殿曰毗盧性海我觀如來真法界清淨廣大如虗空若性若相悉平等故能建立於一切能作所作不可得而於諸法不染著善哉佛子證此法即見本身盧舍那三際洞然入一念不越一念了三際譬如皎月行太空不作明照一切想是為菩薩無功用於一切處作佛事交光相羅無壞雜體用涉入如帝網小溪不隔逝多林遮那不起菩提樹所以莊嚴大樓閣動念俱息開復閉於此不作奇特想亦復不作無奇特是為不捨根本智而能成就諸願海今觀佛子所建立始終不離如是義毫端顯示妙蓮華隨說而行血滴滴乘時破彼妄想塵全出無邊大經卷普為來者作饒益不出遮那同體悲自然常在於其中若經若行若坐臥求其實性不取相即是諸佛所受用我今隨喜說伽陀聊為太虗安耳穴作是觀者為正觀異是說者即邪說承天量維那集同志書雜華大經為十卷其二乃吾雪心所寫端楷入神求余題之說偈以贊曰毗盧遮那華藏海七處九會熾然說文字句義悉平等悲智行果所成就不起于座徧塵剎一切諸佛亦如是重重主伴互開演歷歷交參同帝網一經普攝一切經一義具足無量義言詞道斷心行滅此經真體即無寄是名華嚴大法界若理若事無有礙情與無情本一體能所動靜性空寂善哉心量十比丘智願弘廣北溟水安住無住氷雪心各於毫端現神變縮此大經八十一萃為十卷悉周備我觀如來本無說爾諸比丘未甞寫無說而說是真說不寫而寫是真寫受持讀誦與供養開示悟入亦復然佛子當作如是觀安住解脫不思議深入普賢行願海同證遮那根本智天台碧上人歸百丈山建楞嚴精舍求贊釋迦如來有顯訣直截根源最無比隨順一切群生心同入諸佛法性海諸佛性海無有涯群生心體亦如是無形無相不可名強而目之首楞嚴迷之背覺而合塵慶喜乃為魔所罥悟之背塵而合覺登伽即登無漏果不迷不悟非背合即修即證離證修善哉無上妙蓮華金剛寶覺無畏地此方教體在音聞彼觀自在從中證文殊師利擇法眼標顯實謂當其根審是五五圓通門豈以勝劣有取舍譬如良醫療眾病對病與藥無差互病去藥除心體空忽然超越十方界末世眾生善根少罕有知此勝法門唯此道友碧上人而於此法能信入能信能入不思議復能推廣利有情我觀赤城百丈山即是祇桓大精舍是中宜建堅固幢是中宜發光明藏是中宜集諸佛子一一圓通互開演而於如來滅度後令此慧命不斷絕我以父母所生口隨喜贊歎作是說聞者見者悉信受同乘普賢大願輪靈隱昇藏主書華嚴塔求贊毗盧遮那大經卷量等三千大千界書寫大千界中事一一事相各差別理隨事徧一即多事得理融多即一即多即一即事理交攝融通了無礙是為諸佛法性海儼然藏在一塵中有大比丘名可昇出生如來法末世發起廣大同體悲為欲饒益諸含識以淨天眼普觀察破此微塵出經卷書成廣大華嚴塔高顯挺特踰須彌圍繞重重香水海基陛下極金輪際相輪上徹有頂天五十二位列層級一百一十布闌楯十虗彌漫寶絲網流出一切供具雲覺樹開敷智慧華園池涌現功德藏佛之身光蔽日月菩薩聲聞眾無數而諸世主稱妙嚴一一雲集普光殿雖分七處與九會其實不離菩提場我此本師盧舍那與十方佛當不異我觀十方諸世尊所現身土悉平等而諸世尊剎網中應有比丘出經卷方便善巧總殊勝所作佛事無有別佛等剎等眾會等悲智行願亦復然如此無上窣堵波全是遮那法身王遮那法身入我性我性即與遮那合我願一切身眾雲咸具無量辯才海窮未來際贊此塔而與我今無有異我此言詞相寂滅懸契諸佛真如心若見若聞若隨喜各悟自性獲道記法華塔贊道人夏坐蓮華峯晨起為寫蓮華塔深入法華妙三昧旋而證得陀羅尼八萬四千毛孔中咸放光明照天地是身即塔塔即經離名離相絕能所十方諸佛皆懽喜異口同音贊善哉當知世尊釋迦文一代時教三百會開權顯實示真要難信難解唯此經當時靈山大會中甞以此經囑累汝是故佛子乘本願篤生五濁法末世通身被服精進鎧畢生扶植堅固意為滅荒唐癡暗獄耀此熾盛光明幢開廓自己神通門顯發諸佛知見海方其點畫未形初此塔徧界已充塞塔中古佛與今佛不從地涌從心現所以引筆與行墨行布圓融了無礙相輪層級甚高聳寶網香雲悉周徧天華繽紛雨新好法音清揚振金鐸若聞若見悟本智是名真法供如來咨爾天神及龍鬼在在處處為訶護令此寶塔鎮浩劫永為群生作饒益法華經塔為道藏主贊是法華經藏深固復幽遠開示與悟入彌綸大千界善哉道上人以無作妙智攝諸一毫端幻此大寶塔高廣至梵世綿亘恒沙劫無斷亦無滅不騫亦不崩仍於念念中興起諸佛事若見若供養疾得成佛道當知此寶塔全是芬陀利開權而顯實一切義成就是名經中王於塔最第一古佛與今佛常在於其中剎網互輝映而諸分身佛一時皆集會能說與所說言詞相寂滅無取亦無證脗合諸佛心能契此心者得法華三昧我為贊此塔說此妙伽陀以爾精進力激我懶墯意則知此上人是我善知識我觀十方國此經無不在諸佛法末世無不書此塔亦有贊塔者與我將不異安住四法故即具普賢道稽首釋迦文證我如是說王朋梅摹刻阿育王塔贊維阿育王有大因地昔為幼童聚沙嬉戲邂逅佛來拜瞻欣樂蔑以致誠奉沙為佛贊善哉即授其記再世當得鐵輪王位十善具足萬方臣服雖處世間而享天福造我寶塔八萬四千安我舍利廣利人天莊校嚴飾不舍晝夜驅役鬼神布諸天下佛滅度後果符宿緣凡所應作靡不皆然時有尊者名曰耶舍放五指光紛如箭射光所及處塔乃隨至華雨雜飛天龍森衛此真丹國會稽之東舍利所止是謂鄮峯感應道交非近非遠以劉薩訶而乃出現相輪五層觚稜四起高尺有四廣則半耳寶磬中懸聖像外設瑞采祥光玲瓏瑩徹由晉洎梁閱陳而唐吳越南宋靈異迭彰逮我皇元混一車書遂迎寶塔入于京都迭興大會為國祈福光燭禁庭耀奪群目百寮進賀龍顏大悅頂禮繞旋情均布髮曰咨爾眾佛慈等視攝化有方寧容久滯宜從護送歸奠于鄞永永萬萬以康吾民後四十載金華王氏殫伎厲精圖刻以施自東自西自南自北如法供養無量功德我觀十方惟一佛身而此舍利普現諸塵一一塵中含十方界佛身舍利無在不在胡隱而顯胡生而滅一念洞然空華水月我如是說真實不虗稽首世尊釋迦牟尼文殊大士大智非名真空絕跡凡聖兩忘體用雙寂眸閃閃而電輝髮披披而雲碧握利劍逼老瞿曇揮如意對維摩詰入泥入水道出常情非默非言義有所極暗裏藏機明中辯的墻壁瓦礫動地放光疥狗泥猪全威返擲漆眸炯炯紺髮垂垂執卷特立孤風凜而斥諸徒破碎大道弘正智掃蕩群疑是文殊非文殊雲開碧落出法界入法界月滿坤維龍蛇混雜兮凡聖同居草衣勃窣兮七佛之師我真文殊不可描貌無是文殊將錯就錯金毛師子奮全威等閑觸折祥麟角普賢大士心聞之宗願海之祖蓬𩯭蕭蕭草衣楚楚雖從寶威德藏王國而來不離毗盧遮那佛身而住通身是眼莫辯蹤由覿體全真那堪捕象王回處百華紅剎剎塵塵面相覩破一微塵出大經卷點畫未形文彩已現理隨事變日照天臨事得理融珠回玉轉體周沙界普眼猶迷心洞十方曼殊莫辯固知龍象蹴蹈非驢所堪宜其合水和泥而蓬頭垢面者也維摩居士彈偏擊小門風歎大褒圓宗旨示疾毗耶離城攪得五天鼎沸毛吞巨海斷妙喜如陶家輪芥納須彌有解脫名不思議靠倒文殊幾个知伸脚只在縮脚裡瘦骨崚嶒老懷虗曠文殊不來全無伎倆喚作金粟應身政是敲空取響堪笑靈山一會人个个望風先膽喪只个渾身沒奈何又持妙喜入娑婆不知一默酬人外截斷群機更有麼毗耶一默不二門開手提大千毫端往來觀音大士聞熏聞修精進力金剛三昧不思議六根互用真圓通善哉神力不共法一法具足一切法彌綸剎海不相礙似月行空空印水波波頓現非實相於此明達洞無際返觀自性悉平等惟物與我既不二乃能普運慈悲心一念智入無量劫無量劫智入一念前際不往後不來現在如如亦無住一身遍至十方界萬類交作而不勞十方界復入一身寂湛真常離喧雜即樂即苦非苦樂是謂如幻三摩提我此父母所生口含吐無量廣長舌流出一切言詞海發揮大士功德藏大士功德無有邊我此言詞亦無盡從旦至暮月至歲展轉聯屬不斷絕一處既爾諸處同見聞隨喜互相攝圓證無上妙蓮華安住金剛王寶覺吠琉璃椀天甘露漿無邊熱惱一味清凉證真圓通得大自在不動本際普應殊方峭壁巉巖空中鐵脊蚪枝橫出劫外春光發揮普門之妙境顯示如幻之金剛杲日麗天無幽不燭清風帀地厥德孔彰海岸乾坤自孤絕白華香雜紫檀香泛泛香水海屹屹金鼇背於心既無作於法得自在缾中甘露漿眼底眾生界如幻三摩提鐵椎打不壞精誠忽感通夢寐見光怪譬如磁石針合處無違碍又如大圓鏡形影自融會我不離大士大士不離我偉哉功德山面面長相對感夢而𦘕大圓照中滿月慈容六根互用一性融通香水海層層波浪寶蓮座帀帀祥風攝五濁全歸清泰發眾吼普迪群聾是所謂如幻聞熏聞修金剛三昧不動本際遍至十方而無來無去全始全終者也開圓通門說無畏法慈眼普視慈心普攝毫端十方剎那萬劫是所謂被精進鎧發堅固意於生死暴流之中為舟為楫而不退不怯者也從聞思修證觀自在開示不思議解脫法門入一切眾生喜見三昧直行徑前妙轉不退六根互用而非正非偏剎海同觀而無向無背法門圓通三昧如幻一念了知十方溥現惟此大士善巧方便摶人天龍置涅槃岸坐斷巍巍萬仞崖地右旋兮天左轉髧彼兩髦屈斯五指得真圓通普施無畏龍護法而不潛鳥䘖華以頻至璚崖玉樹寶光浮碧海無雲天在水三無漏學大哉普門耳根圓證眼裡同聞竭群生之業海布萬德之慈雲五蘊本空猶用照滿身泥水若為分圓通入正觀層崖落飛水大千一毛端三際小彈指業海無邊涯悲心豈得已寂照兩俱忘念念從緣起金剛三昧圓通法門不以耳聽而以眼聞入諸佛智應眾生根巖前懸水三千丈落落聲光貫碧雲六用圓通一機獨露覿面相呈了無回互說甚三十二應入國土身檢點將來政是秤錘蘸醋此方真教體清淨在音聞良哉觀自在發此妙耳門峭壁懸崖同一舌寶雲香篆滿乾坤萬法圓通門一月千江影心精自遺聞性相悉平等峭壁懸崖露半身巍巍坐斷毗盧頂妙辯如飛流定力若山岳六用總圓通諸塵洞昭廓生佛由來體本同白牯狸奴成正覺漚生漚滅自起自倒瀑能說法石解體道大悲行相寂而常照照亦何有白日杲杲海印發光玉壺寥廓月滿滄州風生碧落普門示現妙力無作絕毫絕𨤲如山如嶽縞衣不重蓮舟素輕耳中觀色眼裡聞聲善財一去無消息覺海風休月自明廓圓通門握菩提印眼耳同觀智悲獨運銀山鐵壁露全機業海無邊空一瞬峭壁懸崖春容月影極萬法源徹千聖頂小白華開大劫前繁興永處那伽定正觀無我垂手為誰六根互用一等慈悲圓通法界空三際剎剎塵塵普應時寶石玲瓏玉壺寥廓一根返元六用無作童真相好月輪孤海岸風清夜潮落根塵同元動靜無二耳色眼聲見聞超詣萬仞崖前獨露身普門境界非天地孰動孰靜匪泉匪石孰見孰聞匪聲匪色童真稽首兩忘言六用圓通自空寂一月在天影含眾水大慈悲行只這便是擬議還同萬仞崖擡眸早已三千里願海無邊一葉蓮普門方便廓心天耳根不借眼根力此是圓通自在禪返聞聞後竟何為回首塵勞未有時獨倚蒼崖看飛瀑春風不在綠楊枝眾生界上相逢少五欲波中獨運遲無我無人亦無佛此心那許善財知金剛石上水天開童子南詢遠遠來八萬四千煩惱海浪頭高處是塵埃六根互用三昧海一切眾生喜見身脉脉流泉遶蒼石黃金地上不栖塵坐而倚俯而視從聞思修入三摩地絕壁春回薜茘椿滄溟月輾瑚樹籃裡金鱗始褪潮尋聲回首入塵勞自緣今日無行市莫道奴奴索價高善應無方自在身縞衣蓬𩯭不栖塵一般經紀難將就只合和聲送與人放下魚籃便展經白蓮華帶錦鱗腥玉鈎掣斷紅絲線水漾金沙月滿汀碧崖丹嶂玉樹瑤草圓通法門紅日杲杲空華無蔕願海有船按膝俯視朝宗百川琅玕寶石栴檀香風大慈悲行月影春容童真妙相滿月慈容反聞自性懸水生風六用休復一真圓通蒼崖古木劫外春風圓通法門洞無邊表石裂崖崩聊露一竅釵橫𩯭亂口是心非賣不著主提取魚歸耳見眼聞諸法無㝵大圓照中金剛三昧六用無作一機獨露師子嚬呻象王回顧布袋和尚倒拈金錫穩靠布袋低眉斂目袒肩露背成佛尚隔一生且入瞌睡三昧料想龍華會中也無如此自在拄杖頭邊有照有用破布囊中無罅無鏠拋却兜率陀天愛向人間賣弄稽首彌勒世尊何得與麼鄭重指端光怪本相現肚皮雖大眼已眩放浪多遊族姓家一个布囊推不轉挈挈波波走市逢人伸手乞文錢杖頭日月明中去囊裡乾坤暗裡旋楖栗短長布囊輕重寬著肚皮一笑自奉布袋魚籃同㡧長汀水邊金沙灘上一種風流十分孟浪破布袋有甚珍珠無底籃好些魚樣全肩擔荷狹路相逢赤手提持是行不放如斯顯異惑人合喫手中拄杖寒拾二大士混俗威儀出塵標格見个甚麼自笑自拍明月清風三百篇流落人間無處著展開經卷橫看竪看脚瘦鞋寬頭髼眼眩萬行門中一法無手面神機日千變兩眼地隻手指天應得好拍走不上前國清寺裡齋鐘響孤負巖西瀑布泉一笑相看兩弟兄面皮塵土髮鬅鬙驚人有句無題目說與森羅萬象聽阿羅漢六內祕外現陸飛空走龍獰而降虎猛不驟猴果于前鹿花其後跏趺忽作象王回噴嚏也成師子吼深則厲淺則揭有許周章老者負少者携無他怪醜明朝又赴娑竭齋想得人間未曾有山高尚可登水深實難渡下有不測淵蹈著蛟龍怒神通不用時欣厭情盡露豈無小歇場未是安身處前者勿作得度想後者要君為榜樣石罅雲根急轉頭日輪正照高山上乘虗誰言落空度水自賴濕脚龍王宮殿雖深羅漢應供不薄天上人間知未知夜叉頭上擎雙角攫霧拏雲漫作狂忽看平陸浪翻江是何尊者從何至彈指聲中即受降一嘯腥風生百谷垂頭妥尾向應真傍觀不用多驚訝人若無心虎自馴三明六通天上天下一點水墨千變萬化朝陽對月凍日含春霜風劈箭綿密工夫竹針麻線半舒半卷如癡若呆一笑自領月滿瑤臺四睡閉眉合眼人如虎伏爪藏牙虎似人夢裡乾坤無彼我綠鋪平野草成茵咄哉豐干抱虎而睡拾得寒山正在夢裡可憐惺惺人未能笑得你達磨大師五下視竺乾平欺震旦直指單傳胡揮亂揎掉三寸舌而電掃六宗蹈一莖蘆而風生兩岸劫外春光喚得回五葉千葩何爛爛倒拈鐵錫側佩金環屠龍有伎𦘕虎無班不得宋雲輕捉敗誰知隻履竟西還目前起浪脚下生風西天可著東土難容羚羊掛角處遍界絕行蹤碧眼胡天下無赤兩脚蹈莖蘆為愛洛陽春色好長江不管浪頭麤齒缺不關風眉粗膽氣雄一言曾觸諱無面見江東栽松道者放下長鑱繼祖燈重來恰值嶺南能一絲倒引千鈞重說與兒孫幾个聽八十翁翁七歲心一機括盡去來今钁頭邊事知多少不似頭陀用力深破頭山下荷鉏翁笠底乾坤不世同但得髯郎霑寸土不愁無地著春風栽松粥薪圖落照蒼黃路欲迷擔頭薪重首頻回荷鉏有語君知否我出頭時汝用來李習之見藥山和尚雲在青霄水在缾客來無火強敲氷無絃琴上無生曲不是知音不易聽白樂天見鳥窠和尚夷險忘來樹上身無邊風月自為隣使君問法休驚訝行得方為說得人李軍容見溈山和尚破壁蕭條自上泥不知背後客官來看他轉笏相成處直得虗空笑滿腮呂洞賓見黃龍禪師幕阜山前陷虎機且無雷厲與風飛不徒剖破葫蘆去收得雙雙寶劍歸三笑圖攢眉不作入社客送別乃復過虎溪一笑三人幾絕倒廬山高壓楚天低德山和尚未離西川有些柄把洎到南方全無說話白棒一揮天上天下佛被訶祖遭罵神見神憎鬼見鬼怕不是岩頭點破伊爭得三年便遷化船子和尚一蓑一笠老生涯獨向江干理釣車𢬵得滿船空載月直鈎端不在魚蝦普化和尚木鐸震吼蒲扇生風打个筋斗何處尋蹤自初祖至先保寧凡二十八世日東壽藏主各求一贊歸而圖之刻諸楞伽院十萬西來亦苦辛逆鱗一批便翻身九年面壁成何事五葉華敷劫外春覔心無處即心安大地山河鉄一團一曲胡笳吹不徹和腔留與後人看皖公山下人中寶玉葉聯芳繼斷肱接得沙彌年十四白頭能許再來僧六十餘年脇不床九天三詔自回翔紫雲鎻斷雙峯頂七歲人來付鉢囊濁港江頭夢未回黃梅峯頂白蓮開傳衣只作小兒戲勾得新州獦獠來把定西乾屈眴衣曹溪吞海百川歸群機普應三千界萬鍛爐中片雪飛坐禪成佛釘根楔作鏡磨塼陷虎機點得髑髏雙眼活車行更不打牛兒即心佛非心佛清冷雲中雷光拂即此用離此用疾雷破山海水涌耳聾吐舌顯宗風風從虎兮雲從龍頭嶄岩耳卓朔哭一落笑一落酌古準今制禮作樂奇特事難描貌獨坐大雄峯車輪生八角大雄山下插翼虎文彩斑斑牙爪露親遭一口可憐生說與傍人須照顧咄咄咄噓噓噓凌辱宗風个是渠這小廝兒是白拈賊不往河南便往河北糾合克符普化建立黃檗宗乘熱謾三聖瞎驢覆滅老胡種族令行吳越付兒孫六六依然三十六紫羅帳裡撒真珠八角磨盤空裡轉雷厲風飛法戰場棒了罰錢趂出院八華九裂無縫塔壁立千仞赤肉團餓虎投崖鬼爭桶盲枷瞎棒太無端大用現前不拘小節駕鉄牛機雷奔電掣木雞啼處韻出青霄芻狗吠時光吞皓月是渠親見作家來哮吼一聲魔膽裂白兆堂前收草賊和贓捉敗豈徒然一言截斷千江口萬仞峯頭始得玄龍袖拂開全體露現象王行處狐兔潛藏酒肉僧不堪師法亡父母特地為殃皮膚脫盡海印發光築底六人成大器灼然門戶冠諸方西河師子嚬呻句佛與眾生一口吞鉄額銅頭元不會黃河九曲出崑崙老楊岐無旨的栽田愽飯招人喫拋金圈擲栗棘和麩糶成狼藉三脚驢子弄蹄行十影神駒追不及出茶陵門入楊岐室少減多添多虗少實情盡圓明一顆寒得錢買个油糍喫辛辛辣辣婆婆和和接來機用錄公手段操蜀語唱綿州巴歌丹霄彩鳳古路鉄蛇惟其克肖滅門破家本色川藞苴用處不雷同壞東山家法滅臨濟正宗棒頭擒虎兕喝下辯蛇龍獨立乾坤外那知萬馬空於菟肉醉呼不覺腥風蕭騷撼林壑長安路上斷人行頷下金鈴除不落出家行脚總是正因氣吞佛祖眼蓋乾坤妙喜徑山禪師太白叔姪相望二甘露門衲衣有托佛日再暾檢點將來成什麼三家村裡臭胡猻破沙盆正法眼掀天紀截地維青山九鎻兮中峯巍巍開口不在舌明眼人落井禿帚攪滄溟魚龍俱乞命把住楊岐黑黲衣兩耳聾來呼不應平生一味督黃牙不解成家只破家郎罷耳聾兒口吃眼頭何處辯金沙鄮峯崛起定綱宗一旦追回萬古風猊血真堪化驢乳此心能有幾人同虗空為口萬象為舌寄妙辯於風霆致方來于氷雪橫身異類中何處尋途轍轉身蹴折大龍橋千古鳳臺高嵽嵲龐居士吸得西江徹底乾說難說易太無端大兒却倚長鑱立一曲希聲不用彈靈運淵明邂逅相逢處論心不自欺永嘉為郡後彭澤賦歸時只許通人會難教俗子知有僧堪結社無酒却攢眉黃山谷參晦堂和尚老桂吹香打失鼻孔黔南道中開眼作夢從茲倒跨青石牛貫華散作天女供顧陸百巧𦘕不得六月黃河連底凍大慧禪師湛堂室中口鑼舌沸逮見勤巴無出氣處薰風殿閣白汗通流生擒虎項活捉蛇頭黑漆竹篦掀翻海岳白日青天雷霆雪雹前佛性命後佛紀綱本色草料衡陽梅陽宏智禪師丹霞克家真歇畏友顯君臣相向之機具正偏不犯之手平高就下知清稅之未貧捨短從長愛曹山之顛酒是所謂隰州古佛笑談而起洞上宗風顧盻而碎邪師窠臼者也臞菴超禪師臥壑松枯懷雲石臞雙領山中再來古佛隰州會裡兩脚書厨白晝喚回空劫夢元來鼻孔大頭垂野菴禪師播揚大教埏埴後昆捫空揣骨斫水求痕由大仰而大溈聲喧海岳既入魔而入佛道滿乾坤末後句若為論午夜寒蟾出海門無準和尚中峯再世破菴嫡傳宗通眼活鑑地輝天真四川本色藞苴結七世衲子生冤萬仞龍門饒峻險不妨袖手看風煙先保寧和尚無住為本妙有為用入佛入魔百發百中碎惡叉聚樹金剛幢不離本際普應殊方一柱擎天三關巨闢東山瓦鼓歌少林無孔笛為天柱住無住贊咄哉休居若為描𦘕三尺竹篦天上天下便是補處慈尊也須勘過了打只个破沙盆索起遼天價秋林十萬莫學渠學渠和我遭人罵為兜率挂秋林贊滅却正法眼平生恣拍盲面南看北斗當午打三更此闕詔不起西丘話大行扶桑東畔看萬國日輪明為日本感出玖石室贊虹光貫地氣衝天肋下真堪築痛拳黑漆竹篦掀海岳正宗滅向瞎驢邊為興聖琦元璞贊文廟御書大光明藏四字僧光獲一明字求贊日月合璧光耀九天毫端發揮萬象爭妍以明繼明明終無盡何以致之篤於自信睿哲文明過於日月覆盆之下罔不昭徹元首明哉股肱良哉庶事康哉夫豈日月之可方哉高峯幻住千岩三翁同㡧僧傅請贊目視雲霄心空佛祖不出死關全是活路獅岩吞却伏龍山夜半日輪高卓午虗谷和尚真梅長老請贊聲震雷霆氣吞寰宇合眼驗人點頭自許四藤條令不虗行三轉語總是活句凌霄峯頂白浪滔天師子窟中兒孫遍地曇芳和尚真鉄佛燈自明請贊堂堂師表凜凜風骨道契梁王衣傳鉄佛振金剛王之寶杵碎野狐精之窠窟掃鍾阜龍河之劫灰幻玉殿瓊樓之突兀九天飛下御爐煙八面清猋香弗弗壽昌別源和尚真天童亢明請贊若此菴有功宗教掃蕩邪說開闢正道暮翁休居異曲同調屈信千古俛仰一笑別源秀出分座玉峯月犀雷象風虎雲龍簫臺巍巍雙溪浩浩鉢水投針長庚橫曉妙性元明離諸名相我作贊詞捫空追響聖壽敬叟諲和尚真景德雲海請贊神機絕倫駿骨空群大坐當軒風行草偃橫揮短拂電卷雷奔發天泉見東平為兩浙之義虎虗半座俟雲海猶靈樹之雲門賣弄黑豆法鏗鍧破沙盆是所謂峨峯庸叟之真子徑塢虗舟之嫡孫者也南楚和尚真為延聖剛中贊無面目漢未描先像黑漆竹篦不可近傍盡云打得剛中痛不知被渠𭺗著痒只好奪來拗作兩截且看老漢有甚伎倆既然放過合如何深炷栴檀為供養掛角羚羊沒處尋岌岌龍門五峯上珩琅一關和尚真小師雲渺首座請贊渺渺滄溟汪汪襟度即之煦日非春激之雷霆不怒架大屋養閑漢開大口吞佛祖知之者謂是本色白拈不知者謂是再來杯渡眉間長劍倚天寒手面鉄蛇橫古路開福月菴老衲月林無門法燈高山凡七世日東久藏主繪其像請贊以歸春山青春雨晴白雲三片四片黃鳥一聲兩聲賣弄東山家法閙熱開福門庭咄大悲不展手通身是眼睛奚仲造車一百輻拈却兩頭除却軸只因錯認定盤星正音往往無人續無人續六六依然三十六控佛祖大機廓人天正眼鮎魚上竹竿巴蛇入蘆管咄物相本無何用斷一門超出是烏回喝下曾經海岳摧竺國不傳唐土信薰風吹得桂華開白日青天迅雷激電萬象耳聾虗空眼眩須彌𨁝跳舞三臺千古無門八字開正眼洞明真風卓邁親見無門話行天下八十二載脇不印床三百餘人入大爐鞴髮毛爪齒動地放光青紫緇黃望塵再拜是所謂日本國九十九歲法燈國師火後摩尼珠鉄鎚打不壞高山仰止景行行止大名之下不可久處賓則全賓主則全主三千里外定誵訛打破鏡來相見去仙岩仲謀和尚真敬藏主請贊甘露室中打失鼻孔鳳皇臺畔換得眼睛坐斷杜城廣揚大教掀翻曠古撲滅真燈百草頭邊全正令三姑潭上鼓雷霆自贊大雲志長老請贊作者相逢未言先契譬如大雲普覆一切卷而藏之不過膚寸散而六合豈曰逾分或為風霆或為霖雨萬化蠢蠢各得其所雖有是作其本無心雲兮雲兮唯吾與爾能以此道自任者也長蘆毅長老請贊會塵剎為保社莫羈汝身廓十虗為度門靡愜汝意時緣既稔乘興而來氣象政嘉興盡即去德山之棒未折臨濟之喝未匱以此扶樹達磨正宗以此接引大乘根器大似真州望長蘆何啻九十餘里吁傲睨萬物徜徉一丘芳聯𦦨屬赤縣神州慶善皓長老請贊松源室中三轉語今古無人敢插觜驀然突出委羽山一口吸盡西江水沒巴鼻有來由揭翻大洋海重整釣鼇鈎世首座請贊大虗為體萬象為用日照月臨風行雷動即此見靈岩劃波尋罅縫離此見靈岩喚鍾將作甕不離不即兩忘言鵲巢飛出丹山鳳杲藏主請贊大象隱於無形大音匿於希聲發揮混沌未分消息𭣟瞎金剛頂門眼睛把住則虗室生白放行而百川沸騰摵碎少林心地印杲杲赤日懸青冥壽藏主請贊平生肆口說禪知他有甚憑據華擘臨濟三玄掃除洞山五位壽姪摘撮編來灊姪鼓合刊去只好一坑埋却免得遞相鈍置那堪更把丹青𦘕出个般面觜大元國土雖寬何處著落得你咄掛向扶桑日本東管取光明照天地度藏主請贊終日說法無法可說畢世度生無生可度揭翻第二義門別有向上一路坐斷孤峯正令行雲從龍也風從虎碩藏主請贊碩大無朋廓焉妙明截群機而獨運混萬化而忘形謂其流出胸襟播揚大教無乃愛忘其醜聲聞過情謂其退藏於密粗安晚節較之以身徇禍而辱其先者或有半月之程二俱列下美從肚裡生驀過弱流三萬里海天日上夜潮平明岩康長老請贊德山鼻孔臨濟眼睛雲門抽顧早不惺惺孰謂寒拾流殊途乃同轍咄無物堪比倫教我如何說梨洲興長老請贊口如木𣔻眼似鼓椎懸羊賣狗討盡便宜凌滅宗風更是誰一雙紅杏換消梨明因道長老請贊道非物外物外非道一語不投鞭石雷吼笠澤風清獅峯月皎坐斷全吳正令行何用將身藏北斗寶藏主請贊中原一寶若為酬價堪笑同光熱謾興化天長地久山高水深本來無物何處求心提破沙盆用黑荳法土面灰頭輥出時四生九有和根拔
