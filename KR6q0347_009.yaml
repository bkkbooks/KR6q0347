body:
  text: 題跋師姪比丘海壽祖灊等編羅漢圖內祕菩薩行外現是聲聞少欲厭生死亦自淨佛土住世應真五百一十六開士莫不皆然若夫深山大澤實聖賢所都決非凡夫肉眼能見獨天台方廣靈異顯著畫者得以圖之然又烏得其倣佛哉以要言之聚沙為塔爪畫為佛不失為入道之漸況精妙若此者乎一衲寶之宜矣苟能返觀自心之體廣大悉備四聖六凡由之建立三昧六通由之發現乾坤日月江海山川由之出生便可掩卷一笑余尚何言佛果禪師書佛祖傳持大事所謂三要正印也自非根性猛利智願宏遠曷致機感相應而能荷負哉歷觀先世的的相承耀古騰今輝天鑑地豈苟然耶法運垂季人根益劣假名竊位以芘無似之身者比比有之未免互相欺誑所學既已無本安知有建法立宗剎生接物始終一節之要哉拜讀佛果老祖所答詔公嗣書不勝感慨竺芳首座授受有自惟勵精力行之則古道或尚可見也大慧和尚墨迹三才高謗起法盛魔強此草堂以為妙喜南遷之兆也因思五祖謂能大師曰夫傳法者命若懸絲今妙喜帖中後語勿使天魔知之又設巧便矣可不慎哉參學兄弟未有正見而務外學故先德有雜毒入心之誡老妙喜榜之於門罰及鄰案在洋嶼一夏打發一十三人夫豈偶然雪峯龍岩翁得此榜時以示人不為無補妙喜親書別帖是亦殘編斷簡却有別峯無準兩代古佛批判二百年後得之夜光明月不換於乎道德之能取重於人如此而人自不能力致之者又將奚算五尊宿真迹天上無雙日人間只一僧此慈雲哭四明之語也吾於慈雲無間然矣妙喜隰州同唱斯道於玉几太白千載一時不可復見玉山雖後於兩翁而道德文采曾不少讓石溪能傳聵祖不傳之衣亦一代宗工也此五真迹生氣凜然在在當有神物護持耳妙喜禪師聖徒首座二帖少時閲大慧禪師廣録知參禪之難觀聖徒顏公釋難文知為僧之不易自是兩翁風度常在心目間明公從妙喜於衡陽所得亦不少已嘗以大禪稱之逮授衣之際叮嚀戒飭乃曰如將梵位直授凡庸你也須生慚患始得又知付授之難如此近世庸妄視同兒戲大法之微有所自也於此未嘗不淚下聖徒道德才思一狐之腋所遺敬如菴小帖詞語溫雅筆意精熟無在而不妙也德侍者其寶之宋孝廟賜佛照禪師御札自昔帝王存誠佛道者蓋常有之矣然而日應萬機兢兢業業而不敢少忽至於涵養圓熟染淨不二迥離四病者其惟孝廟歟伏讀所賜佛照御札敘所得若此後世臣子不學無知妄肆毀斥者可憫也夫佛照禪師墨迹柏岩為洞山下得一轉語好遂開粥相延則檀林無雜樹也育王以之故能慎擇以警遊惰又謂看經不必多但研窮法理以悟為則至於收拾精神理會臘月三十日生死公案直欲攻其兄出淤泥而登彼岸爾老佛照此書百世師法也別峯塗毒二禪師手澤別峯塗毒其道德位望並驅爭先是皆人龍僧鳳也此偈此簡皆肆口而説肆筆而書曾不經意深足以發明言外之旨彼膠於情識者方以雕蟲篆刻為事覩之未始不茫然自失也悲夫塗毒禪師墨迹湛堂昔因決渠水濺衣豁然大悟以白真淨淨詬曰此中乃可容藞苴耶今觀䇿禪師與勤道者小簡才有肯重便成滲漏之語自得之妙暗合孫吳然元酒大羮固非常流所能知味大圓智公不可謂不知人也佛燈珣和尚墨迹昔妙喜謂佛燈為臨濟頂中髓楊歧眼裡睛棒頭明殺活喝下辨踈親以此而罵佛罵祖卒滅吾宗於罵天乎何有贈規之偈舐犢之情於此見佛燈何異水中撈月識者辨之長靈卓和尚手帖靈源出晦堂之門其粹密巖正真萬世師範長靈克家子也是以荷負正宗之心咄咄不輟口猶自謂筋疲力苶止可暖熱些些門庭而已若覔委托大緣誠未易得也讀至此俯仰今古為之慨然至於應涉事事與世相反警救不逮惟恐混而為流俗之旨真藥石之言也慈受深禪師偈老慈受散慧林之席為台山之遊靈岩專使於天封寺訪尋得之圓照故隱遂為中吳禪學都會居三年而有蔣山之命不赴四明太守以阿育王山招之亦不赴未幾蔣山專使再至不得已從其請復還三佛舊觀吁何其盛哉及謝事歸洞庭包山若將終焉猶於靈岩似未能忘情因其僧堂之落成故有我亦老來思舊隱異時去借板頭眠之句余晚生無狀備員灑掃者三年覩境懷人實深仰止之歎覺維那出視手澤謹拜手以識應菴和尚送中峯偈堆雲鉢袋子已是當面拈出因甚却道未曾分付所謂吾有末後著待歸要汝遵元來老子得與麼絮拜觀此卷不覺凜然張魏公所書心經摩訶般若波羅密多梵語也此翻大智慧到彼岸所謂達佛心宗之徑也觀自在即能行之之人也照見五蘊皆空即此智慧之力也度一切苦厄即到彼岸之時也至於空色互明理事俱遣即佛與衆生同一體處處皆同真法界受用自在三昧也紫岩公印心於佛果擴充於妙喜以之致君唐虞中興王業觀其腕頭盛有回天之力者其觀自在之流亞與故其筆是經以壽後世即自覺覺他之道無有窮也然未易與儒墨自卦者議陸放翁所製無用禪師語録序百丈得大機黃檗得大用兼而有者是為德山臨濟觀其棒喝交馳主賓互換莫非揭示此個宗旨豈下劣種草所得而與哉老妙喜於圓悟室中得此機用應菴謂其黑漆竹篦掀翻海嶽從頭打過雖是死馬醫就中要妙固是抓著渠癢處劄著渠痛處撿點將來大似普州人送賊天童全禪師出妙喜之後啓迪學者用而無用語録行世未始有言也今覽陸務觀所作序文提水放火大段可畏至於識破韓潮州正是説得宜其與無用同參者矣雪間寶此遺墨慕賢尊祖之意歷歷可佳夫豈徒為耳目之玩哉密菴和尚墨迹密菴老祖任少室正宗之寄鼓一破沙盆震驚天地若塗毒鼓然宜其燕坐高堂四事供養以應來學而猶不免於持鉢奔走艱難萬狀吾不知造物之待人固如何哉豈必欲其顯發吾先佛軌儀以為後世竊服踞位妄自尊大者之戒乎燈侍者當視其迹明其心則破沙盆遺音可繼也松源老祖家書澄照天寧迫而後進緣法不順飄然去之方事歸寧遽聞師訃哀慕追修克盡孝道觀此幾著則其平生事事可法也宜其位冠諸方德尊百代中峯臨行囑以編集語録付以法衣一頂此衣昔楊岐以付白雲三傳而至妙喜喜不付諸子而付其姪應菴應菴再傳而及師所云此個擔子實難承當而明告其親者亦欲其知責任不輕也所謂在家出家各有所務不能兩全者乃謙之至耳豈有承父之命出家弘法光明盛大若是而於其親猶有遺恨哉特不能區區盡歡於菽水之奉然而立身揚名以顯父母雖曾閔之孝無以易也烏在而不全乎若夫用黑豆法換盡天下衲僧眼睛使東山正宗與天地相終始固非不肖孫所得言其倣佛矣此書流落叢林百有餘載卒為永嘉昱首座寶而有之遂為傳家之券雖萬金不售也以法義出以相視頓首九拜謹志乎下方云中峯老祖廣録五年前溫之能仁昱首座携所蓄鷲峯聵祖所寄父親之書來靈岩求跋其中正言密菴和尚書至俾其編次語録又付以楊歧之衣遂有此箇簷子實難簷荷之説今此録乃是未經刪定者較之刊本十無二三焉枯禪以付寂窗窗付梅屋屋授之道場晉翁翁死不得其傳保寧祺藏主偶於南屏亡僧故紙堆中獲之珍祕有年茲以相示且命志之因謂之曰爾為直下子孫蓋物有所屬耳豈偶然哉然鴆毛落水魚鱉俱死於此換却髑髏不消一滴尚其勉旃無準和尚筆迹五祖下出三佛佛眼最為謹密日用唯恐有失故切切自省如此老無準書之豈無意乎不幸脫去前二段環溪能補之知父莫若子在首座寶其迹而究其心則不虗矣苟徒尚其迹而遺其心亦何益於事哉余因是迹觀是心而作是説者且以自警而復警在也正續老師居五峯法席之盛不下妙喜時也衆多糧少而重罹回祿故奔走四方不能自已伏讀此帖可以想見其曲折苟非以荷負正宗為心則安能籧篨若此耶近世羡癡福踞大方坐圍千衆口無所説心無所思傲然自足以謂師道之尊莫過受用隨意而已安知有荷負正宗之説哉吁西丘和尚朴翁禪師吟藁佛照禪師居鄮峯時道福相勝學者景從天目老祖上方朴翁尤嶄嶄出頭角者老祖因僧自薦福來聞松源舉風幡話豁然有省徑有鄱陽之行朴翁晚年亦為葛天氏之民今觀兩翁中見鄮峯途中唱和之什因記得黃龍出泐潭遇慈明時事惜無懷翁不得而與焉紛紛末流尚以詩之江拙而議其迹之不齊是何足以語至道哉此菴師祖手帖育王師祖老腕有回天之力一洗澆漓頓還淳古所與妙勝長老小帖雖尋常數語無一點俗氣而況筆意精妙不可及啓侍者既入保福一菴之室寶之宜矣山寮雜言嶽林栯堂禪師曰靈源大士居昭默橫川老師居山寮高風相去三百載人世南朝自北朝烏呼堂翁已為古人此偈殆將無聞敬書於固侍者所藏山寮雜言之後使觀者知先哲所存也溫日觀手書大慧禪師過移忠小詞妙喜過東坡影堂作偈云力將正説排邪説夢到黃州與惠州竹屋數椽容老貌大江千古只東流今觀過秦檜之墓則云路傍一對新華表見説昔年官不小爭知道冷煙寒雨埋荒草其發忠正誅姦邪乃天性之常或謂妙喜遊乎方之外而未能絶世俗之好惡是豈知師哉日觀書之以傳於世其知師者乎幻住禪師贈高麗瀋王十偈懶殘方出芋魁無暇為天使收涕趙州危坐一室莫知二王在前千載之下稗沙門失其所守汲汲於公卿長者之門烏知兩翁不動聲色卒能致宗門于九鼎之重哉今觀幻住之於瀋王庶無愧古人耳十偈之作各有深旨語溪壽上人求余著語時當初夏槐陰晝清一展玩間不覺師子岩壁立萬仞矍然起立卷而還之古林和尚小參休居老人平生説法如雲如雨而實無元字腳可得澤維那何從得此紙踊躍珍祕不翅夜光明月之珠持以示余所謂向上更有事在露出師子爪牙其間別有商量未免當門按劍於乎只者靈鋒阿誰敢擬後三十年當有於此喪盡伎倆者庶幾可以同唱下水船曲子也江山萬里圖未達境唯心毛端萬里達境唯心已萬里毛端作是盡者政如世人追憶夢事於諸夢境作真實想以夢意識運夢筆寫夢所見高為山嶽深為江河險為劍閣連雲惡為瞿塘灔澦城邑聚落舟車往來煙雲蔽虧千態萬狀能作所作均一夢中復有夢人覩相生愛而珍玩之噫三界擾擾孰非夢耶本淨明妙誰為覺者我作是説當有拊卷而作者矣孤雲翁書雲峯禪師小參昔黃太史謂雲峯悅禪師之語青山白雲開遮自在碧潭明月撈漉方知今觀孤雲所書小參不啻青天怒雷霜弓劈箭讀未終卷幾何不膽飛心碎也倘或皮下無血眼裡無筋究竟總成虗設耳何山壽藏主得之出以相示政須猛省力行仰不愧天俯不怍人劄斷此老舌頭則不妨與天下衲僧出一口氣矣佛果老祖示沖老法語佛果老祖圓悟如來無上知見如麗天杲日故其所説了無疑滯使夫聞者見者身意及心皆同灰燼然而咳唾掉臂盡是祖師西來意豈虗語哉觀此七段法語何止特為嵩少沖公發耶政如閙市裡揚碌磚著者當自知耳題跋終癡絶和尚書應菴師祖法語此吾應菴老祖示作禪者之語也癡翁因偉上人之請而書之偉亦佳衲子與流落叢林僅二百年雖紙墨微蠧精彩猶新四明臨藏主能寶之而求余題二宗師三學者出處有後先而所存一也以古視今益重余之感慨靈源癡絶二禪師二帖黃龍昭默禪師德尊一代雖士大夫登其門者未嘗假以辭色觀此慰帖謂既了大事必間居味道內遣則亦入室之人也若夫言簡而意足善於文字者皆能之必欲見此老人當在此帖之外著眼可也癡翁所示道書記法語病多諳藥性經驗始傳方習藏主其深味之陸放翁小簡放翁先生南渡師儒也雅從育王佛照徑山別峯塗毒靈隱松源老祖遊其深得吾宗之蘊故發而為翰墨猶虎而角者也此帖特其土苴緒餘而覽者方且贊詠之不暇苟知其大全之體豈又當如何哉陸放翁所作海淨大師塔銘東坡先生平時不肯與人作塔銘其與俗儒之索米作佳傳者蓋有間矣若使如放翁為此海淨大師之文略無愧詞雖作何傷大體耶嘉興路萬壽山南堂四禪菴師姪比丘祖灊募緣入梓日東比丘海壽書天台周東山刊時至正己亥春起手明年庚子春畢工應安戊申重刊京臨川禪寺慈雲普濟禪師了菴欲公行道記翰林學士亞中大夫知制誥兼修國史金華宋濂撰至正癸卯秋八月二十五日辛酉了菴禪師示寂於嘉禾千佛慈雲塔院九月朔日丁卯闍維菩提園中當火之方熾有紅白二圓光盤旋龕頂浮空而滅及火餘頂骨舌根齒牙俱不壞設利滿地不可以數計七日癸酉其從子比丘祖灊遂奉函櫝啓塔而藏焉生平行業既見國史危公所撰銘文其得法大弟子文康復謂師之道德正而明慈而能威坦坦乎八達之通衢也皎皎乎行天之素月也鞫鞫乎啓蟄之震霆也初何厭乎言之詳千里致書徵濂為行道記會濂總修元史久未暇為文康將住福之開元必欲得濂文以行乃申前請為尤力濂不敢辭禪師諱清欲字了菴族朱氏台之臨海人世居大雄山下大父元善父松孫皆為善士其母黃氏夢沙門飛錫而至既寤生師九歲而孤隨仲父茂上人入雙徑山為童子年十六依虎岩伏公試經得度希白明藏主自育王來一見以法器期之提誘辨詰無所不至且謂之曰子氣鋭甚非佛性茂公不足為子師今在蘇之開元曷往見之師即謁佛性佛性問云近離何處師云徑山佛性云船來陸來師云二俱不涉佛性云汝安得到此師便喝佛性云雖是後生却堪雕琢他日佛性又問汝豈不是徑山來師云是佛性云山上有鯉魚井底有蓬塵作如何會師云和尚何處得此消息佛性云欽師因何猶被馬師所惑師云不可少和尚一分佛性云參禪須是此子方可師乃掩耳而出師自是前後際斷疑情盡釋動靜之間無非妙用繼往從東嶼海公於楓橋東州永公於虎丘二公皆一時宿德名重東南與師相扣擊見師吐言如青天白日氣象鮮朗了無染著或謂擔荷正法將於師是賴師之聞譽翕然聞於諸方矣皇慶初佛性被上旨復居開元四衆推師為入院侍者繼司藏鑰居亡何還栖徑山虗谷陵公從大仰來主其席選師為後堂首座江南行御史臺具書幣延佛性住建業之保寧師與佛性分座説法臺之大臣聞師提引頂禮贊歎謂得未曾有天曆己巳出世溧水之開福元統癸酉遷嘉興之本覺一坐十春秋帝師大寶法王尤企師之道賜以金襴法衣及慈雲普濟禪師之號湖之巨剎有訟於行宣政院者鑒察御史檄師讞之師曰吾林下人耳豈能效法家之深刻哉即日升堂檛鼓退居寺之南堂御史大夫高公特枉駕過師謂之曰榮名人之所尚師何棄之如土芥耶嘉嘆久之而去至正乙酉起應吳中靈岩之請閲三年復歸隱南堂未幾寺於兵南堂亦不存師處之怡然祖灊念師無所栖止謀於𭬥李亭之北三里築室以居師師不得已從之即所謂慈雲塔院是已師凡三坐道場緇素瞻依如逢古佛出世香華供養所至雲擁師日以最上一乘相與激揚霆馳飈行絶無留礙其高者則纏縛頓解一超直入其下者則有所持循而不涉末伽外道之見利益所及可謂鴻且博矣然於世相事為之際亦未嘗不經意所蒞之處棟宇壓者新之器物闕者補之侵疆之久者歸之早夜孜孜唯恐有不及辛丑之夏江浙行省左丞相康里公遣使者起師將使領大伽藍師堅臥不動作三偈酬之有軒蓋林中不得來之句丞相知其道高不敢強師日坐松雲間如出水蓮華倚風獨笑而不知老之將至其參學祖杲請續雪竇拈古之作師初峻拒已而曰道本無言然非言不足以顯道為著一百則授之一旦感微疾默而不言方索筆書偈云七十六年無後無先聖凡情盡明月中天適通守陳公時來候疾謂師曰和尚東南大法幢也時既至矣能無一言啓迪我輩乎師瞪目大笑聲振百步外遂泊然而逝闍維之夕送者幾萬餘人無不摧慕嗚呼若師者可謂一代之偉人者矣師慈和粹沖不立城府接人渾在春風中遇事有不可為輒萬夫不能奪然惓惓於大法唯恐其失墜方佛性續修宗門統要之書師力勸同袍良猷相成之至今盛行于世師世壽七十有六僧臘六十度弟子若干人其參學門人分燈海內者若干人夫自教外有別傳之旨竺乾聖人心法授之東土諸師歷年既多不能無弊至於宋季纖巧卑陋厭厭如欲絶之人生氣殆盡橫川珙公特起於衰微之際如大獅王哮吼一聲百獸為之震掉君子謂之佛道中興橫川示寂佛性以偉特之量紹而承之佛性入滅而師以慧辨之學演而昌之三世之間重徽疊照揭日月於中天作舟航於東海猗歟休哉向使橫川無賢子孫若師者出一再傳間或失其真未必光明俊偉若斯之盛也濂雖不敏竊獲師三會語觀之益知叢林所評辨才無礙類妙喜機鋒峻拔類德山雲門者當可信不誣也於是備書師之群行勒諸堅珉而復述伽陀一章以贊之其辭曰大哉諸佛涅盤心遍覆三千大千界迦葉拈華微笑間三際洞然一時了菩提達磨流真丹掃空義學一不立此如長空孤月朗萬水千山皆見月此如空谷傳音聲欲覓其蹤無處所此如春行大地中物物生成匪雕刻是為如來光明藏諸相無不具足故更無一相之可見大法久傳弊則有厖雜叢濊可怖駭流入末伽外道類橫川起執摩尼珠放五色光照群有銷彼黑暗如紅日佛性繼之得真印九逵雖異車轍同伊誰振錫乘願輪托胎直至大雄山中吳一見即相契水陸二塗俱不涉及至機鋒相觸時如逢金剛王寶劍掩耳急走無留行自茲出語絶功用無邊功用總現前初無一事可指名三坐道場振法音海潮東來極澎湃無敢舉目睨視者時來欲入般涅槃示以一默顯法相默中有聲如怒霆大笑直振於林木有因音聲而入者亦可直到解脫門矧於聲聲未嘗聲方信無聞無不聞圓光浮空共盤旋設利纍纍向空聚窣堵波中藏靈異天龍八部共護持達磨之道大以彰豈非法力所攝故大風則止有縣讖燈燈續𦦨願無窮我今頂禮述贊詞一切衆生起誠信蘇州靈岩了庵清欲禪師別號南堂遺老台之臨海大雄山朱氏母黃九歲而孤仲父茂上人引登徑山為童子依虎岩試經得度受具希白明藏主亦師之叔父自育王橫川會中來一見以法器期之提誘辨詰無所不至謂曰子氣鋭甚非佛性不足為師今在蘇之開原往見不可後師即謁佛性性問曰近離何處師曰徑山性云船來陸來師云二俱不涉性云汝安得到此師便喝性云雖是後生却堪雕琢他日性又問汝豈不是徑山來師云是性云山上有鯉魚井底有蓬塵作麼生師云和尚甚處得這消息來性云欽師因甚猶被馬師惑師云也少和尚一分不得性云參禪須是些子始得師乃掩耳而出皇慶初佛性被旨復住開原師為入院侍者繼掌藏教還徑山虗谷陵選為後堂首座佛性遷建業保寧分第一座説法天曆乙巳出世漂水開福元統癸酉遷嘉禾本覺帝師大寶法王有旨賜金襴衣并慈雲普濟禪師號居十年退居南堂至正乙酉應中吳靈岩請衲子聞風而萃室中垂語云文殊普賢起佛見法見貶向二鐵圍山則固是且道釋迦老子還有過也無良久云休上堂一大藏教束之高閣長期短期無繩自縛莫更紛紛紜紜直須灑灑落落楊岐一頭驢只有三隻腳潘閬倒騎歸攧殺黃幡綽五味拈來饡稱鎚別有香風滿寥廓喝一喝上堂前無釋迦後無彌勒中無自己鐘樓上念讚床腳下種菜甜瓜徹蒂甜苦瓠連根苦閲五載復歸南堂時江浙行省丞相遣使延請師堅臥不起作三偈答之有緑蘿窗下垂垂老軒蓋林中不得來之句癸卯秋八月十三日感微疾默而不言至草五日索筆書偈云七十六年無後無先聖凡情盡明月中天適通守陳公元禮來候疾謂師曰和尚東南大法幢也時既至矣可無一言啓迪我輩乎師瞪目大笑遂泊然而逝闍維火未盛有紅白二圓光盤旋龕頂良久浮空而滅頂骨舌齒俱不壞舍利無算姪僧祖灊等收而藏之南堂即千佛塔院敬觀了菴禪師禪録如獅子王哮吼獅子兒聞之悉皆勇健三世諸佛窺無門六代祖師額有分擲大千於方外納須彌於芥中不可思議解脫法門盡在是矣至正丙戌莫春前育王老師弟正印拜題南堂和尚語録續集序中至仁淡居藁古林禪師出東南以無礙辨才開大法施使臨濟之道震耀天下若雷霆若日月真所謂命世宗師也嗣興者南堂禪師尤能大其聲以鳴其道三坐道場學者雲奔海馳學士大夫莫不聞風起敬雖退而聞處猶蟻慕而不釋也師咸酌其機器飫以禪悅法喜俾各怡然自得釋然心悟而去故禪師言滿天下嘗有集而刊之者矣今日本壽上人又以其遺餘續鋟諸梓而傳之乃徵豫言以辨其首因得詳而觀焉其辨悉類妙喜其峻峭類德山雲門其雄偉如怒猊擇石金翅擘海其神變超忽如泰山之雲始於膚寸不崇朝而雨天下其浩博汪洋如江如海茫乎其莫涯涘也嗚呼盛哉其源蓋有自矣宋季有大禪師曰橫川珙公倡松源西丘之道于育王當是時天下之言禪者惟浮靡纖巧是尚其弊有不可勝言者禪師奮起一變時習俾宗綱復正卓然還禪道於高古至今學者遵之以為楷模也一傳而古林再傳而南堂信乎世濟其美者矣嗚呼盛哉不有岷嶓於其前孰能江漢於其後歟茲因上人之請特著其授受源委以昭示末葉使知有所宗仰焉禪師天台人名清欲號了庵脫築南堂於醉李之本覺以佚其老學者不敢名遂以南堂稱之壽其猶子也願而好道乃吾友竺仙仙公弟子仙嗣古林道化盛行日本云無言住能仁江南堂疏皇天曠蕩麗日月以長明厚地渾沉振江河而不泄故知大法所繫實有斯人存焉某學冠九流德尊一代肆辨袞袞若百川之赴滄溟有陳堂堂如衆峯之繞天柱回狂瀾於既倒栗棘蓬金剛圈洗佛日以重光蓬蒿箭鐵絲網從渠吞透屬我箕裘盍登故丘而謁舊廬四海交明屬望抑下喬木而入幽谷一時公論攸歸龍湫宴坐鴈蕩經行飛天華之蔌蔌鴛渚凄涼鷗波浩蕩渺煙水之重重一宗主護國同門茲審前席台之天封一宗和尚高臨西菴下視塵世本路諸山虗護國名剎用選法共聞院堂以起之檄文既至而公不少屈如法道何吾黨敬用聰公排闥故事緝詞以激其勇庶幾幡然而作幸莫大焉天地位焉萬物育焉三峯巋然上雲雨梧桐生矣鳳凰鳴矣百鳥不敢啼春風此菴聯佛果之燈握全機而正斯席堆雲佩虎丘之印分半座以固宗盟清振一時曾謂境因人勝話行千古抑知人以道尊某衆香薝蔔之英列宿景星之瑞入甘露室黑豆法早得其傳樹金剛幢破沙盆重增高價有是父宜有是子難其弟亦難其兄何期季世之間膺公選踞雄剎見此一門之盛著錦衣輝故鄉所至蔚有成功誰不爭先快覩膏車秣馬喜動乎中同氣連枝言之罔既則方岩住圓覺三宗教有辨臻禪稱璉嵩東坡紀熙豐人物野入青徐雲連海岱大元混南北堤封空五天竺缺而取耆英善彈冠相慶與無上法王而同教授喜解絃更張某真碧落是古罍洗十萬胸中燈火讀陶冶一乘五千卷內名句身筌蹄諸部優鉢示明時之瑞不離教乘而超越教乘白蓮敷浩劫之春具足圓覺而住持圓覺故復進出一頭地在我輩流寧較等差於名位只堪捧腹四衆觀典刑出處攬轡慨垂一身佩佛法安危矢詞羅扒石室住育王大覺一疏而來高風未泯妙喜兩居此地芳躅愈光是為栴檀叢林固合龍象圍繞某具透關眼用劈箭機驅萬象於筆端文章有印驗來機於喝下縱奪臨時出海門國觀浙江潮閲卷狂瀾之既倒踞飛雪岩指烏石嶺抹過疊障之崚嶒是五世三大老故家乃四明八吉祥勝地振頽綱爭須敏手物論攸歸揚大教欲赴昌時且評有在上延睿算下副輿情南堂住靈岩嘉興諸楚石疏車之用在輪輪不滯則周行天下鑑之功照物物無遺而炳現目前兩忌取捨之心天人列請一泯異同之論泉石增光某衣得其傳辨如所證碌碌盆盎古罍洗偈千言不少衰啾啾烏群孤鳳皇金百煉無重礦住山久矣傳舍視之靈嶽降靈宜踞靈岩之頂法身説法普聞法界之中仰瞻南斗愈明旁挹太湖非小青山步障贈君二百里之白雲紫玉茶鍋分我三萬頃之明月開南堂和尚語録板天目再傳而得休居翁如師子踞地百獸震駭開福一出而遷靈岩主若洞庭粘天萬派混流故駕馭昂枿之人必慕了菴殺活擒縱凡鑽仰堅高之士願刊語録代別拈提明明照古照今此日不繡諸梓的的契佛契祖他時慮失其真昔汾陽現入傳燈勸動西河道俗況海內移多君子樂轉南堂法輪會齧鏃機展揮金手了菴和尚續集之終
